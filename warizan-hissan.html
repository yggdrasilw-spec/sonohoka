        <div class="control-panel">
            <div class="narration-card" id="narration"></div>
            <div class="brain-card" id="brain-work" style="display: none;"></div>
            <div class="btn-group">
                <button class="btn-nav" id="btn-prev" disabled>もどる</button>
                <button class="btn-nav" id="btn-next" disabled>すすむ ＞</button>
            </div>
        </div>
    </div>
<script>
function sanitizeInput(str) {
    let half = str.replace(/[０-９]/g, function(s) {
        return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
    });
    half = half.replace(/[．。]/g, '.');
    return half.replace(/[^0-9.]/g, '');
}

function parseNumberMeta(numStr) {
    const dotIdx = numStr.indexOf('.');
    if (dotIdx === -1) {
        return { digits: numStr, dotAfter: numStr.length, hasDot: false, decimalPlaces: 0 };
    } else {
        return { digits: numStr.replace('.', ''), dotAfter: dotIdx, hasDot: true, decimalPlaces: numStr.length - 1 - dotIdx };
    }
}

function parseGaisuConfig(value) {
    switch (value) {
        case "decimal-0":
            return { mode: "decimal", digits: 0, label: "一の位までの概数" };
        case "decimal-1":
            return { mode: "decimal", digits: 1, label: "小数第一位までの概数" };
        case "decimal-2":
            return { mode: "decimal", digits: 2, label: "小数第二位までの概数" };
        case "sig-1":
            return { mode: "significant", digits: 1, label: "上から1けたまでの概数" };
        case "sig-2":
            return { mode: "significant", digits: 2, label: "上から2けたまでの概数" };
        default:
            return { mode: "decimal", digits: 1, label: "小数第一位までの概数" };
    }
}

function normalizeDigitArray(rawDigits) {
    return rawDigits.map(q => {
        if (q === "" || q === "✕" || q === null || q === undefined) return 0;
        const n = parseInt(q, 10);
        return Number.isNaN(n) ? 0 : n;
    });
}

function formatNumberFromPowerOfTen(integerDigitsStr, shift) {
    const normalized = (integerDigitsStr || "0").replace(/^0+/, "") || "0";
    if (normalized === "0") return "0";
    if (shift >= 0) {
        return normalized + "0".repeat(shift);
    }
    const pointPos = normalized.length + shift;
    if (pointPos > 0) {
        return normalized.slice(0, pointPos) + "." + normalized.slice(pointPos);
    }
    return "0." + "0".repeat(Math.max(0, -pointPos)) + normalized;
}

function roundDigitsWithCarry(digits, roundingDigitIndex, carryStartIndex = 0) {
    const out = digits.slice();
    if ((out[roundingDigitIndex] || 0) >= 5) {
        let idx = roundingDigitIndex - 1;
        let carry = 1;
        while (idx >= carryStartIndex && carry > 0) {
            const sum = (out[idx] || 0) + carry;
            out[idx] = sum % 10;
            carry = Math.floor(sum / 10);
            idx--;
        }
        while (idx >= 0 && carry > 0) {
            const sum = (out[idx] || 0) + carry;
            out[idx] = sum % 10;
            carry = Math.floor(sum / 10);
            idx--;
        }
        if (carry > 0) out.unshift(carry);
    }
    return out;
}

function formatRoundedDecimalQuotient(rawDigits, integerDigits, decimalPlaces) {
    const digits = normalizeDigitArray(rawDigits);
    const keepDigits = integerDigits + decimalPlaces;
    while (digits.length < keepDigits + 1) digits.push(0);

    const roundingDigit = digits[keepDigits] || 0;
    let kept = digits.slice(0, keepDigits);

    if (roundingDigit >= 5) {
        let idx = kept.length - 1;
        let carry = 1;
        while (idx >= 0 && carry > 0) {
            const sum = kept[idx] + carry;
            kept[idx] = sum % 10;
            carry = Math.floor(sum / 10);
            idx--;
        }
        if (carry > 0) kept.unshift(carry);
    }

    while (kept.length < integerDigits) kept.unshift(0);

    let intPart = kept.slice(0, integerDigits).join("") || "0";
    let decPart = kept.slice(integerDigits, integerDigits + decimalPlaces).join("");

    intPart = intPart.replace(/^0+/, "") || "0";
    return decimalPlaces > 0 ? `${intPart}.${decPart}` : intPart;
}

function formatRoundedSignificantQuotient(rawDigits, integerDigits, sigDigits) {
    const digits = normalizeDigitArray(rawDigits);
    const firstNZ = digits.findIndex(d => d !== 0);
    if (firstNZ === -1) return "0";

    const exponent = integerDigits - firstNZ - 1;
    while (digits.length < firstNZ + sigDigits + 1) digits.push(0);

    const roundingDigitIndex = firstNZ + sigDigits;
    const rounded = digits.slice(firstNZ, roundingDigitIndex);
    const roundingDigit = digits[roundingDigitIndex] || 0;

    let adjusted = rounded.slice();
    if (roundingDigit >= 5) {
        let idx = adjusted.length - 1;
        let carry = 1;
        while (idx >= 0 && carry > 0) {
            const sum = adjusted[idx] + carry;
            adjusted[idx] = sum % 10;
            carry = Math.floor(sum / 10);
            idx--;
        }
        if (carry > 0) adjusted.unshift(carry);
    }

    const adjustedStr = adjusted.join("") || "0";
    const shift = exponent - (sigDigits - 1);
    const formatted = formatNumberFromPowerOfTen(adjustedStr, shift);
    return formatted.includes(".")
        ? formatted.replace(/0+$/, "").replace(/\.$/, "")
        : formatted;
}

function formatRoundedQuotient(rawDigits, integerDigits, gaisuConfig) {
    if (!gaisuConfig) return formatRoundedDecimalQuotient(rawDigits, integerDigits, 1);
    if (gaisuConfig.mode === "significant") {
        return formatRoundedSignificantQuotient(rawDigits, integerDigits, gaisuConfig.digits);
    }
    return formatRoundedDecimalQuotient(rawDigits, integerDigits, gaisuConfig.digits);
}

function buildRoundOffMeta(rawDigits, integerDigits, gaisuConfig) {
    const digits = normalizeDigitArray(rawDigits);
    if (!gaisuConfig) return null;

    if (gaisuConfig.mode === "significant") {
        const firstNZ = digits.findIndex(d => d !== 0);
        if (firstNZ === -1) {
            return { checkIdx: 0, firstNZ: 0, roundingDigit: 0, carryStartIndex: 0, shiftStartIndex: 0 };
        }
        const checkIdx = firstNZ + gaisuConfig.digits;
        while (digits.length <= checkIdx) digits.push(0);
        return {
            checkIdx,
            firstNZ,
            roundingDigit: digits[checkIdx] || 0,
            carryStartIndex: 0,
            shiftStartIndex: firstNZ
        };
    }

    const checkIdx = integerDigits + gaisuConfig.digits;
    while (digits.length <= checkIdx) digits.push(0);
    return {
        checkIdx,
        firstNZ: 0,
        roundingDigit: digits[checkIdx] || 0,
        carryStartIndex: 0,
        shiftStartIndex: 0
    };
}

function buildRoundOffMeta(rawDigits, integerDigits, gaisuConfig) {
    const digits = normalizeDigitArray(rawDigits);
    if (!gaisuConfig) return null;

    if (gaisuConfig.mode === "significant") {
        const firstNZ = digits.findIndex(d => d !== 0);
        if (firstNZ === -1) {
            return { checkIdx: 0, firstNZ: 0, roundingDigit: 0, carryStartIndex: 0, shiftStartIndex: 0 };
        }
        const checkIdx = firstNZ + gaisuConfig.digits;
        while (digits.length <= checkIdx) digits.push(0);
        return {
            checkIdx,
            firstNZ,
            roundingDigit: digits[checkIdx] || 0,
            carryStartIndex: 0,
            shiftStartIndex: firstNZ
        };
    }

    const checkIdx = integerDigits + gaisuConfig.digits;
    while (digits.length <= checkIdx) digits.push(0);
    return {
        checkIdx,
        firstNZ: 0,
        roundingDigit: digits[checkIdx] || 0,
        carryStartIndex: 0,
        shiftStartIndex: 0
    };
}

function buildEarlySignificantRoundMeta(rawDigits, sigDigits, uptoIndex) {
    const digits = normalizeDigitArray(rawDigits.slice(0, uptoIndex + 1));
    const firstNZ = digits.findIndex(d => d !== 0);
    if (firstNZ === -1) return null;

    const checkIdx = firstNZ + sigDigits;
    if (uptoIndex < checkIdx) return null;

    while (digits.length <= checkIdx) digits.push(0);
    return {
        checkIdx,
        firstNZ,
        roundingDigit: digits[checkIdx] || 0,
        carryStartIndex: 0,
        shiftStartIndex: firstNZ
    };
}


function buildVerticalMultiplicationHtml(divisorInt, multiplierInt, productInt, titleText, options = {}) {
    const topStr = String(divisorInt);
    const bottomStr = String(multiplierInt);
    const productStr = String(productInt);
    const width = Math.max(topStr.length, bottomStr.length + 1, productStr.length);

    const line1 = topStr.padStart(width, " ");
    const line2 = "×" + bottomStr.padStart(width - 1, " ");
    const line3 = "―".repeat(width);
    const line4 = productStr.padStart(width, " ");

    const wrongOverlay = options.wrong
        ? `
            <div style="position:absolute; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center;">
                <div style="position:absolute; width:92%; height:4px; background:#dc2626; transform:rotate(-18deg);"></div>
                <div style="position:absolute; width:92%; height:4px; background:#dc2626; transform:rotate(18deg);"></div>
                <div style="position:absolute; left:10px; top:6px; font-size:54px; font-weight:900; color:#dc2626; line-height:1;">✕</div>
            </div>`
        : "";

    const borderStyle = options.wrong
        ? "border:2px solid #fca5a5;background:#fff1f2;"
        : "border:1px solid #fed7aa;background:#fff7ed;";

    return `
        <div style="position:relative;margin-top:10px;${borderStyle}border-radius:10px;padding:10px 12px;">
            ${wrongOverlay}
            <div style="font-size:13px;font-weight:800;color:#c2410c;margin-bottom:6px;">${titleText}</div>
            <div style="font-family:'Courier New', monospace;font-size:22px;line-height:1.15;color:#0f172a;white-space:pre;text-align:right;padding-right:2px;">
${line1}
${line2}
${line3}
${line4}
            </div>
        </div>`;
}

function buildTrialHistoryHtml(trialHistory) {
    if (!Array.isArray(trialHistory) || trialHistory.length === 0) return "";
    let html = `<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;">`;
    for (const attempt of trialHistory) {
        html += buildVerticalMultiplicationHtml(
            attempt.divisorInt,
            attempt.multiplierInt,
            attempt.productInt,
            attempt.titleText || "仮商の筆算",
            { wrong: !!attempt.wrong }
        );
    }
    html += `</div>`;
    return html;
}

function generateBrainWorkHtml(currentTargetValue, divisorInt, trialQuotient, trialHistory = null) {
    if (currentTargetValue === 0 || currentTargetValue < divisorInt) return "";

    const trueQuotient = Math.floor(currentTargetValue / divisorInt);

    // ── 1桁のわる数: 九九リスト ──────────────────────────────
    if (divisorInt < 10) {
        let html = `<div style="font-size:14px; color:#334155;">
            <b>🧠 あたまの中の九九 (${divisorInt}のだん)</b>
            <div style="margin-top:6px; padding-left:10px; border-left:3px solid #0284c7; line-height:1.8;">`;
        for (let k = 1; k <= 9; k++) {
            let p = divisorInt * k;
            let isAnswer = (k === trueQuotient);
            let isTrial  = (trialQuotient !== undefined && k === trialQuotient && trialQuotient !== trueQuotient);
            if (isTrial) {
                html += `<div style="background:#fee2e2;border:2px solid #ef4444;display:inline-block;padding:2px 8px;margin:2px 0;border-radius:4px;font-weight:bold;color:#b91c1c;">
                            ✕ ${divisorInt} × ${k} = ${p}（大きすぎ）</div><br>`;
            } else if (isAnswer) {
                html += `<div style="background:#fef08a;border:2px solid #eab308;display:inline-block;padding:2px 8px;margin:2px 0;border-radius:4px;font-weight:bold;color:#854d0e;">
                            ★ ${divisorInt} × ${k} = ${p} ✓</div><br>`;
            } else if (p > currentTargetValue) {
                html += `<div style="color:#cbd5e1;margin:2px 0;">${divisorInt} × ${k} = ${p}</div>`;
            } else {
                html += `<div style="color:#64748b;margin:2px 0;">${divisorInt} × ${k} = ${p}</div>`;
            }
        }
        html += `</div></div>`;
        return html;
    }

    // ── 2桁以上のわる数: 仮商計算パネル ────────────────────────
    const divisorStr = divisorInt.toString();
    const d1 = parseInt(divisorStr[0], 10);
    const topLen = divisorStr.length;
    const topVal = Math.floor(currentTargetValue / Math.pow(10, topLen - 1));

    const displayTrial = (trialQuotient !== undefined) ? trialQuotient : trueQuotient;
    const trialProduct = divisorInt * displayTrial;
    const trialStart   = Math.max(displayTrial, trueQuotient);
    const trialEnd     = trueQuotient;

    let html = `<div style="font-size:14px;color:#334155;">
        <b>🔍 仮商を見つけよう！</b>
        <div style="margin-top:8px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:8px 12px;line-height:1.9;">
            <div style="color:#0369a1;">
                わる数 <b>${divisorInt}</b> の上1けた ＝ <b>${d1}</b>
            </div>
            <div style="color:#0369a1;">
                わられる数 <b>${currentTargetValue}</b> の上${topLen}けた ＝ <b>${topVal}</b>
            </div>
            <div style="margin-top:4px;color:#334155;">
                <b>${topVal} ÷ ${d1}</b> で見当をつける ➜ 仮の商 <b style="color:#f97316;">${displayTrial}</b>
            </div>
        </div>`;

    if (Array.isArray(trialHistory) && trialHistory.length > 0) {
        html += buildTrialHistoryHtml(trialHistory);
    } else {
        html += buildVerticalMultiplicationHtml(
            divisorInt,
            displayTrial,
            trialProduct,
            trialQuotient !== undefined && trialQuotient !== trueQuotient
                ? "仮の商の筆算"
                : "商の筆算"
        );
    }

    html += `<div style="margin-top:8px;padding-left:10px;border-left:3px solid #f97316;line-height:1.8;">`;

    for (let k = trialStart; k >= Math.max(1, trialEnd - 1); k--) {
        let p = divisorInt * k;
        let isTrial  = (k === trialStart && k !== trueQuotient);
        let isAnswer = (k === trueQuotient);
        if (isTrial) {
            html += `<div style="background:#fee2e2;border:2px solid #ef4444;display:inline-block;padding:2px 10px;margin:2px 0;border-radius:4px;font-weight:bold;color:#b91c1c;">
                        ✕ ${divisorInt} × ${k} = ${p}（${currentTargetValue}より大きい）</div><br>`;
        } else if (isAnswer) {
            html += `<div style="background:#fef08a;border:2px solid #eab308;display:inline-block;padding:2px 10px;margin:2px 0;border-radius:4px;font-weight:bold;color:#854d0e;">
                        ★ ${divisorInt} × ${k} = ${p} ✓（ちょうどよい）</div><br>`;
        } else {
            html += `<div style="color:#cbd5e1;margin:2px 0;">${divisorInt} × ${k} = ${p}</div>`;
        }
    }

    html += `</div></div>`;
    return html;
}

class AdvancedDivisionEngine {
    static checkWillDivideOut(dividendStr, divisorStr) {
        const divParse = parseNumberMeta(divisorStr);
        const dvdParse = parseNumberMeta(dividendStr);
        let baseDvdDigits = dvdParse.digits;
        const finalDvdDotAfter = dvdParse.dotAfter + divParse.decimalPlaces;
        if (finalDvdDotAfter > baseDvdDigits.length) {
            baseDvdDigits += "0".repeat(finalDvdDotAfter - baseDvdDigits.length);
        }
        const divisorInt = parseInt(divParse.digits, 10);
        let currentRem = 0;
        for(let i=0; i<baseDvdDigits.length; i++) {
            let currentDivStr = (i === 0 && currentRem === 0) ? baseDvdDigits[i] : (currentRem.toString() + baseDvdDigits[i]);
            currentRem = parseInt(currentDivStr, 10) % divisorInt;
        }
        let extra = 0;
        while (currentRem > 0 && extra < 6) {
            currentRem = (currentRem * 10) % divisorInt;
            extra++;
        }
        return (currentRem === 0);
    }

    static generateSteps(dividendStr, divisorStr, route, gaisuConfig) {
        const divParse = parseNumberMeta(divisorStr);
        const dvdParse = parseNumberMeta(dividendStr);
        const D = divParse.decimalPlaces; 

        let baseDvdDigits = dvdParse.digits;
        const finalDvdDotAfter = dvdParse.dotAfter + D;
        if (finalDvdDotAfter > baseDvdDigits.length) {
            baseDvdDigits += "0".repeat(finalDvdDotAfter - baseDvdDigits.length);
        }

        const divisorInt = parseInt(divParse.digits, 10);
        let extraZeros = 0;

        const isRemainderRoute = (route === "remainder");

        if (isRemainderRoute) {
            extraZeros = 0;
        } else if (route === "advance" && gaisuConfig !== null) {
            let requiredDigitsLength = finalDvdDotAfter + (gaisuConfig.mode === "significant" ? gaisuConfig.digits + 3 : gaisuConfig.digits + 1);
            if (baseDvdDigits.length < requiredDigitsLength) {
                extraZeros = requiredDigitsLength - baseDvdDigits.length;
            }
        } else {
            let currentRem = 0;
            for(let i=0; i<baseDvdDigits.length; i++) {
                let currentDivStr = (i === 0 && currentRem === 0) ? baseDvdDigits[i] : (currentRem.toString() + baseDvdDigits[i]);
                currentRem = parseInt(currentDivStr, 10) % divisorInt;
            }
            while (currentRem > 0 && extraZeros < 6) {
                currentRem = (currentRem * 10) % divisorInt;
                extraZeros++;
            }
        }

        let dvdDigits = baseDvdDigits + "0".repeat(extraZeros);
        const M = divParse.digits.length;
        const N = dvdDigits.length;

        const steps = [];
        const initialCells = [];

        for(let j=0; j<M; j++) initialCells.push({ r: 1, c: j, char: divParse.digits[j] });
        for(let j=0; j<dvdParse.digits.length; j++) initialCells.push({ r: 1, c: M + j, char: dvdParse.digits[j] });

        const showDotsInThisProblem = dvdParse.hasDot || divParse.hasDot || (route === "advance");

        const baseDots = {
            divOriginal: (divParse.hasDot && showDotsInThisProblem) ? divParse.dotAfter : null,
            divCurrent: (divParse.hasDot && showDotsInThisProblem) ? divParse.dotAfter : null,
            dvdOriginal: (showDotsInThisProblem) ? dvdParse.dotAfter + M : null,
            dvdCurrent: (showDotsInThisProblem) ? dvdParse.dotAfter + M + D : null,
            quotient: null, remainder: null, remainderRow: null, isMoved: false,
            showDvdOrigInit: dvdParse.hasDot && showDotsInThisProblem
        };

        let currentMaskFromCol = null;

        steps.push({
            phase: "init",
            description: `まずは筆算の形に数字を書きましょう。`,
            dots: { ...baseDots }, writeCells: [], maskFromCol: currentMaskFromCol, pulseBoxes: []
        });

        let currentDots = { ...baseDots };
        const zerosFromMove = finalDvdDotAfter > dvdParse.digits.length ? finalDvdDotAfter - dvdParse.digits.length : 0;

        if (D > 0 && showDotsInThisProblem) {
            currentDots.divCurrent = M;
            currentDots.dvdCurrent = dvdParse.dotAfter + M + D;
            currentDots.isMoved = true;
            const writeCells = [];
            if (zerosFromMove > 0) {
                for (let j = 0; j < zerosFromMove; j++) {
                    writeCells.push({ r: 1, c: M + dvdParse.digits.length + j, char: "0", isNewZero: true });
                }
            }
            steps.push({
                phase: "move-dots",
                description: `【小数点のいどう】わる数を整数にするために小数点を右に移します。`,
                dots: { ...currentDots }, writeCells: writeCells, maskFromCol: currentMaskFromCol, pulseBoxes: []
            });
        }

        let currentRemainder = 0;
        let currentDividendStr = "";
        let currentRow = 2;
        let hasFirstQuotientStarted = false;
        let quotientPositions = Array(N).fill("");
        // hasFirstQuotientStarted が false のうちに ✕ を書いた列番号を記録する
        // 小数点を確定するタイミングで、必要な列だけ 0 に直すために保持する
        let skippedCols = [];
        let firstQuotientCol = null;

        // あまりを出す4年生ルートなら、一の位（finalDvdDotAfter）に達した時点で商をたてるループを抜ける
        let stopI = isRemainderRoute ? finalDvdDotAfter : N;

        for (let i = 0; i < stopI; i++) {
            const currentDigit = dvdDigits[i];
            currentDividendStr = (i === 0 && currentRemainder === 0) ? currentDigit : (currentRemainder.toString() + currentDigit);
            const currentTargetValue = parseInt(currentDividendStr, 10);
            const targetCol = M + i;
            // 仮商を先に計算してbrainHtmlに渡す
            let preTrialQ = undefined;
            if (divisorInt >= 10) {
                const _d1 = parseInt(divParse.digits[0], 10);
                const _topVal = Math.floor(currentTargetValue / Math.pow(10, divParse.digits.length - 1));
                const _trial = Math.min(9, Math.floor(_topVal / _d1));
                const _true  = Math.floor(currentTargetValue / divisorInt);
                preTrialQ = (_trial > _true) ? _trial : _true;
            }
            const brainHtml = generateBrainWorkHtml(currentTargetValue, divisorInt, preTrialQ);

            currentMaskFromCol = targetCol + 1;

            if (i === dvdParse.digits.length && currentDigit === "0") {
                steps.push({
                    phase: "zero-fill",
                    description: `【0を補う】空いているマスに0を書いて、${currentTargetValue}と見ます。`,
                    dots: { ...currentDots },
                    writeCells: [{ r: 1, c: targetCol, char: "0", isNewZero: true }],
                    pulseBoxes: [{ r: 1, c: targetCol }],
                    maskFromCol: currentMaskFromCol
                });
            }

            let hideText = "";
            if (divisorInt < 10) {
                hideText = `【ひらめき九九チェック】 ${divisorInt} のだんの九九で、 ${currentTargetValue} をこえない一番近い数を頭の中で見つけよう！`;
            } else {
                hideText = `【かくして見当をつける】 ${currentTargetValue} の中に ${divisorInt} がいくつあるか、わる数の上1けたを見て見当をつけよう。`;
            }

            steps.push({
                phase: "hide",
                description: hideText,
                dots: { ...currentDots }, maskFromCol: currentMaskFromCol, brainHtml: brainHtml, pulseBoxes: []
            });

            if (currentTargetValue < divisorInt) {
                if (!hasFirstQuotientStarted) {
                    // まだ商が立っていない段階での ✕ → 列番号を記録するだけで描画はここでは行う
                    skippedCols.push(targetCol);
                    steps.push({
                        phase: "skip",
                        description: `商は立ちません。次の桁をいっしょに見ます。`,
                        dots: { ...currentDots }, writeCells: [{ r: 0, c: targetCol, char: "✕", isGuide: true }],
                        maskFromCol: currentMaskFromCol, pulseBoxes: []
                    });
                    currentRemainder = currentTargetValue;
                } else {
                    quotientPositions[i] = "0";
                    steps.push({
                        phase: "build-zero",
                        description: `【たてる】商に「0」を書きます。`,
                        dots: { ...currentDots }, writeCells: [{ r: 0, c: targetCol, char: "0", isGuide: false }], 
                        pulseBoxes: [{ r: 0, c: targetCol }], maskFromCol: currentMaskFromCol
                    });
                    if (i < stopI - 1) {
                        const nextDigit = dvdDigits[i + 1];
                        const isExtraZero = (i + 1 >= baseDvdDigits.length);
                        const dropCells = [{ r: currentRow, c: targetCol + 1, char: nextDigit }];
                        if (isExtraZero) dropCells.push({ r: 1, c: targetCol + 1, char: "0", isNewZero: true });
                        steps.push({
                            phase: "drop",
                            description: `【おろす】次の位をおろします。`,
                            dots: { ...currentDots }, writeCells: dropCells, 
                            pulseBoxes: dropCells.map(dc => ({ r: dc.r, c: dc.c })), maskFromCol: currentMaskFromCol
                        });
                        currentRow++; 
                    }
                    currentRemainder = currentTargetValue;

                    if (route === "advance" && i < stopI - 1) {
                        const nextDigitForAdvance = dvdDigits[i + 1];
                        const isExtraZeroForAdvance = (i + 1 >= baseDvdDigits.length);
                        if (isExtraZeroForAdvance && nextDigitForAdvance === "0") {
                            steps.push({
                                phase: "decimal-zero",
                                description: `【0をくわえる】わられる数の小数第1位に「0」を書き加えてから、次の計算に進みます。`,
                                dots: { ...currentDots },
                                writeCells: [{ r: 1, c: targetCol + 1, char: "0", isNewZero: true }],
                                pulseBoxes: [{ r: 1, c: targetCol + 1 }],
                                maskFromCol: currentMaskFromCol
                            });
                        }
                    }
                }
                continue; 
            }

            hasFirstQuotientStarted = true;

            let trueQuotient = Math.floor(currentTargetValue / divisorInt);
            let trialQuotient = trueQuotient;

            const divDigitsStr = divParse.digits;
            if (divisorInt >= 10) {
                let d1 = parseInt(divDigitsStr[0], 10);
                let topVal = Math.floor(currentTargetValue / Math.pow(10, divDigitsStr.length - 1));
                trialQuotient = Math.floor(topVal / d1);
                trialQuotient = Math.min(9, trialQuotient);
            }

            let trialHistory = [];

            if (trialQuotient > trueQuotient) {
                let trialProduct = trialQuotient * divisorInt;
                trialHistory.push({
                    divisorInt,
                    multiplierInt: trialQuotient,
                    productInt: trialProduct,
                    titleText: "仮の商の筆算",
                    wrong: true
                });

                let tpStr = trialProduct.toString();
                let trialMultiplyCells = [];
                for (let j = 0; j < tpStr.length; j++) {
                    trialMultiplyCells.push({ r: currentRow, c: targetCol - (tpStr.length - 1) + j, char: tpStr[j], borderBottom: true });
                }

                steps.push({
                    phase: "trial-build",
                    description: `【仮の商をたてる】わる数の上1けたを見て、まずは仮の商「${trialQuotient}」をたててみます。`,
                    dots: { ...currentDots },
                    writeCells: [{ r: 0, c: targetCol, char: trialQuotient.toString() }],
                    pulseBoxes: [{ r: 0, c: targetCol }],
                    brainHtml: generateBrainWorkHtml(currentTargetValue, divisorInt, trialQuotient, trialHistory),
                    maskFromCol: currentMaskFromCol
                });

                steps.push({
                    phase: "trial-multiply",
                    description: `【かけて確認】 ${divisorInt} × ${trialQuotient} の筆算で ${trialProduct} になります。あ！わられる数の ${currentTargetValue} より大きくてひき算ができません！`,
                    dots: { ...currentDots },
                    writeCells: trialMultiplyCells,
                    pulseBoxes: trialMultiplyCells.map(mc => ({ r: mc.r, c: mc.c })),
                    brainHtml: generateBrainWorkHtml(currentTargetValue, divisorInt, trialQuotient, trialHistory),
                    maskFromCol: currentMaskFromCol
                });

                while (trialQuotient > trueQuotient) {
                    let oldQuotient = trialQuotient;
                    trialQuotient--;

                    steps.push({
                        phase: "trial-fix",
                        description: `【商の修正】 「${oldQuotient}」では大きすぎたので、商を1小さくして「${trialQuotient}」に直します。`,
                        dots: { ...currentDots },
                        writeCells: [
                            { r: 0, c: targetCol, char: "" },
                            ...trialMultiplyCells.map(mc => ({ r: mc.r, c: mc.c, char: "", borderBottom: false }))
                        ],
                        maskFromCol: currentMaskFromCol,
                        brainHtml: generateBrainWorkHtml(currentTargetValue, divisorInt, oldQuotient, trialHistory)
                    });

                    if (trialQuotient > trueQuotient) {
                        trialProduct = trialQuotient * divisorInt;
                        trialHistory.push({
                            divisorInt,
                            multiplierInt: trialQuotient,
                            productInt: trialProduct,
                            titleText: "修正版の仮の商の筆算",
                            wrong: true
                        });

                        let tpStr = trialProduct.toString();
                        trialMultiplyCells = [];
                        for (let j = 0; j < tpStr.length; j++) {
                            trialMultiplyCells.push({ r: currentRow, c: targetCol - (tpStr.length - 1) + j, char: tpStr[j], borderBottom: true });
                        }
                        steps.push({
                            phase: "trial-build",
                            description: `【もう一度仮の商】 新しい仮の商「${trialQuotient}」をたててみます。`,
                            dots: { ...currentDots },
                            writeCells: [{ r: 0, c: targetCol, char: trialQuotient.toString() }],
                            pulseBoxes: [{ r: 0, c: targetCol }],
                            brainHtml: generateBrainWorkHtml(currentTargetValue, divisorInt, trialQuotient, trialHistory),
                            maskFromCol: currentMaskFromCol
                        });
                        steps.push({
                            phase: "trial-multiply",
                            description: `【かけて確認】 ${trialQuotient} × ${divisorInt} ＝ ${trialProduct} 。まだ大きくてひけません！`,
                            dots: { ...currentDots },
                            writeCells: trialMultiplyCells,
                            pulseBoxes: trialMultiplyCells.map(mc => ({ r: mc.r, c: mc.c })),
                            brainHtml: generateBrainWorkHtml(currentTargetValue, divisorInt, trialQuotient, trialHistory),
                            maskFromCol: currentMaskFromCol
                        });
                    }
                }
            }

            const quotientDigit = trueQuotient;
            quotientPositions[i] = quotientDigit.toString();
            if (firstQuotientCol === null) {
                firstQuotientCol = targetCol;
            }

            const correctAttempt = trialHistory.length > 0
                ? {
                    divisorInt,
                    multiplierInt: quotientDigit,
                    productInt: quotientDigit * divisorInt,
                    titleText: "正しい筆算",
                    wrong: false
                }
                : null;
            const buildBrainHtml = trialHistory.length > 0
                ? generateBrainWorkHtml(currentTargetValue, divisorInt, quotientDigit, [...trialHistory, correctAttempt])
                : generateBrainWorkHtml(currentTargetValue, divisorInt, quotientDigit);
            steps.push({
                phase: "build",
                description: divisorInt >= 10 
                    ? `【たてる】これでバッチリ！正しい商 「${quotientDigit}」 が立ちます。`
                    : `【たてる】商に 「${quotientDigit}」 が立ちます。`,
                dots: { ...currentDots }, writeCells: [{ r: 0, c: targetCol, char: quotientDigit.toString() }], 
                pulseBoxes: [{ r: 0, c: targetCol }], brainHtml: buildBrainHtml, maskFromCol: currentMaskFromCol
            });

            const product = quotientDigit * divisorInt;
            const productStr = product.toString();
            const multiplyCells = [];
            for (let j = 0; j < productStr.length; j++) {
                multiplyCells.push({ r: currentRow, c: targetCol - (productStr.length - 1) + j, char: productStr[j], borderBottom: true });
            }
            steps.push({
                phase: "multiply",
                description: `【かける】 ${quotientDigit} × ${divisorInt} ＝ ${product} を書きます。`,
                dots: { ...currentDots }, writeCells: multiplyCells, 
                pulseBoxes: multiplyCells.map(mc => ({ r: mc.r, c: mc.c })), maskFromCol: currentMaskFromCol,
                brainHtml: buildBrainHtml
            });
            currentRow++;

            currentRemainder = currentTargetValue - product;
            const isLastDigit = (i === stopI - 1);
            const subtractCells = [];
            const remStr = currentRemainder.toString();
            for (let j = 0; j < remStr.length; j++) {
                subtractCells.push({ r: currentRow, c: targetCol - (remStr.length - 1) + j, char: remStr[j] });
            }
            steps.push({
                phase: "subtract",
                description: `【ひく】 ${currentTargetValue}-${product}＝${currentRemainder}です。`,
                dots: { ...currentDots }, writeCells: subtractCells, 
                pulseBoxes: subtractCells.map(sc => ({ r: sc.r, c: sc.c })), maskFromCol: currentMaskFromCol,
                brainHtml: buildBrainHtml
            });

            if (route === "advance" && gaisuConfig !== null && gaisuConfig.mode === "significant") {
                const earlyRoundMeta = buildEarlySignificantRoundMeta(quotientPositions, gaisuConfig.digits, i);
                if (earlyRoundMeta) {
                    break;
                }
            }

            if (!isLastDigit) {
                const nextDigit = dvdDigits[i + 1];
                const isExtraZero = (i + 1 >= baseDvdDigits.length);
                const dropCells = [{ r: currentRow, c: targetCol + 1, char: nextDigit }];
                if (isExtraZero) dropCells.push({ r: 1, c: targetCol + 1, char: "0", isNewZero: true });
                steps.push({
                    phase: "drop",
                    description: `【おろす】 下の位をおろして計算を続けます。`,
                    dots: { ...currentDots }, writeCells: dropCells, 
                    pulseBoxes: dropCells.map(dc => ({ r: dc.r, c: dc.c })), maskFromCol: currentMaskFromCol
                });
                currentRow++;
            }
        }

        // 4年生あまりルートの時、残った小数位の数字をノートの下へ一気にまとめて下ろし、元の位置に点を入れる処理
        let finalRemainderStr = currentRemainder.toString();
        let remainderNeedsLeadingZero = false;
        if (isRemainderRoute) {
            let dvdNum = parseFloat(dividendStr);
            let divNum = parseFloat(divisorStr);
            let movedDvdInt = Math.floor(dvdNum * Math.pow(10, D));
            let movedDivInt = Math.round(divNum * Math.pow(10, D));
            let qInt = Math.floor(movedDvdInt / movedDivInt);
            let remNum = dvdNum - divNum * qInt;
            finalRemainderStr = remNum.toFixed(Math.max(dvdParse.decimalPlaces, divParse.decimalPlaces));
            if (finalRemainderStr.indexOf('.') !== -1) {
                finalRemainderStr = finalRemainderStr.replace(/0+$/, '').replace(/\.$/, '');
            }

            remainderNeedsLeadingZero = /^0\./.test(finalRemainderStr);

            if (finalDvdDotAfter < N) {
                const dropCells = [];
                for (let k = finalDvdDotAfter; k < N; k++) {
                    dropCells.push({ r: currentRow, c: M + k, char: dvdDigits[k] });
                }
                steps.push({
                    phase: "remainder-drop",
                    description: `【おろす】あまりを出すために、残りの小数位の数字をそのまま下におろします。`,
                    dots: { ...currentDots }, writeCells: dropCells,
                    pulseBoxes: dropCells.map(dc => ({ r: dc.r, c: dc.c })), maskFromCol: currentMaskFromCol
                });
            }

            if (dvdParse.hasDot) {
                currentDots.remainder = dvdParse.dotAfter + M;
                currentDots.remainderRow = currentRow;

                const remainderWriteCells = [];
                if (remainderNeedsLeadingZero) {
                    // 0.4 のように、0 を書く
                    remainderWriteCells.push({ r: currentRow, c: currentDots.remainder - 1, char: "0" });
                }

                steps.push({
                    phase: "remainder-dot",
                    description: remainderNeedsLeadingZero
                        ? `【あまりの小数点】あまりが 0.4 の形になるときは、0 を書いたあと、もとの小数点からまっすぐ下におろして打ちます。`
                        : `【あまりの小数点】わられる数の「もとの小数点」からまっすぐ下におろして打ちます。`,
                    dots: { ...currentDots }, maskFromCol: currentMaskFromCol, pulseBoxes: [],
                    writeCells: remainderWriteCells,
                    pulseBoxes: remainderWriteCells.map(cell => ({ r: cell.r, c: cell.c }))
                });
            }
        }

        if (route === "advance" && showDotsInThisProblem) {
            currentDots.showDvdOrigInit = true;
            currentDots.quotient = finalDvdDotAfter + M;

            let quotientDotWriteCells = [];
            const onesPlaceCol = currentDots.quotient - 1;
            const onesPlaceIdx = onesPlaceCol - M;
            const shouldRestoreOnesZero = (
                firstQuotientCol !== null &&
                firstQuotientCol >= currentDots.quotient &&
                onesPlaceIdx >= 0 && onesPlaceIdx < quotientPositions.length &&
                quotientPositions[onesPlaceIdx] === "" &&
                skippedCols.includes(onesPlaceCol)
            );

            if (shouldRestoreOnesZero) {
                quotientDotWriteCells = [{ r: 0, c: onesPlaceCol, char: "0", isGuide: false }];
                quotientPositions[onesPlaceIdx] = "0";
            }

            const divisorDotWasMoved = (
                currentDots.divOriginal !== null &&
                currentDots.divCurrent !== null &&
                currentDots.divCurrent !== currentDots.divOriginal
            );

            let quotientDotDescription = divisorDotWasMoved
                ? `【小数点】移動したあとの小数点から、商の小数点へまっすぐ上にのぼります。`
                : `【小数点】商の小数点を、わられる数の小数点の真上に打ちます。`;

            if (shouldRestoreOnesZero) {
                quotientDotDescription += ` 必要な位の✕を0に直します。`;
            }

            steps.push({
                phase: "quotient-dot",
                description: quotientDotDescription,
                dots: { ...currentDots },
                writeCells: quotientDotWriteCells,
                maskFromCol: currentMaskFromCol,
                pulseBoxes: quotientDotWriteCells.map(cell => ({ r: cell.r, c: cell.c }))
            });
        }

        let finalGaisuCells = [];
        if (route === "advance" && gaisuConfig !== null) {
            let roundMeta = buildRoundOffMeta(quotientPositions, finalDvdDotAfter, gaisuConfig);
            let roundedDigits = normalizeDigitArray(quotientPositions);
            let checkIdx = roundMeta ? roundMeta.checkIdx : (finalDvdDotAfter + 1);
            while (roundedDigits.length <= checkIdx) roundedDigits.push(0);

            let checkDigit = roundedDigits[checkIdx] || 0;
            let targetName = (gaisuConfig.mode === "significant")
                ? `上から${gaisuConfig.digits}けた`
                : (gaisuConfig.digits === 0 ? "一の位" : gaisuConfig.digits === 1 ? "小数第一位" : "小数第二位");

            let isRoundUp = (checkDigit >= 5);
            let description = `【概数にする】${targetName}までの概数にするために、一つ下のマスの「${checkDigit}」を四捨五入します。`;
            description += isRoundUp ? ` 「5以上」なので【切り上げ】です！` : ` 「4以下」なので【切り捨て】です！`;

            finalGaisuCells.push({
                r: 0, c: M + checkIdx, char: checkDigit.toString(),
                hasSlash: true, topChar: "0", isRedBorder: true
            });

            if (isRoundUp) {
                let idx = checkIdx - 1;
                let carry = 1;
                while (idx >= 0 && carry > 0) {
                    let d = parseInt(roundedDigits[idx], 10);
                    if (isNaN(d)) d = 0;
                    let newD = d + carry;
                    if (newD >= 10) {
                        finalGaisuCells.push({
                            r: 0, c: M + idx, char: d.toString(),
                            hasSlash: true, topChar: "0"
                        });
                        roundedDigits[idx] = 0;
                        carry = 1;
                    } else {
                        finalGaisuCells.push({
                            r: 0, c: M + idx, char: d.toString(),
                            hasSlash: true, topChar: newD.toString()
                        });
                        roundedDigits[idx] = newD;
                        carry = 0;
                    }
                    idx--;
                }
            }

            steps.push({
                phase: "round-off",
                description: description,
                dots: { ...currentDots },
                writeCells: [...finalGaisuCells],
                maskFromCol: currentMaskFromCol,
                pulseBoxes: finalGaisuCells.map(fc => ({ r: fc.r, c: fc.c }))
            });
        }

        const completeWriteCells = [];
        if (finalGaisuCells.length > 0) {
            finalGaisuCells.forEach(cell => completeWriteCells.push({ ...cell }));
        }

        // finalQuotientStr: quotientPositions（dvdDigits の各桁に対応）から
        // 人間が読める商の文字列を組み立てる。
        // 4年生ルートはそのままの商、概数ルートは四捨五入した表示にする。
        let finalQuotientStr = (() => {
            if (route === "advance" && gaisuConfig !== null) {
                return formatRoundedQuotient(quotientPositions, finalDvdDotAfter, gaisuConfig);
            }

            const rawDigits = quotientPositions.map(q => (q === "" || q === "✕") ? "0" : q);
            let intPart = rawDigits.slice(0, finalDvdDotAfter).join("") || "0";
            let decPart = rawDigits.slice(finalDvdDotAfter).join("");
            intPart = intPart.replace(/^0+/, "") || "0";
            decPart = decPart.replace(/0+$/, "");
            return decPart.length > 0 ? `${intPart}.${decPart}` : intPart;
        })();

        steps.push({
            phase: "complete",
            description: route === "remainder"
                ? `【完成！】これ以上おろす数がないので、ここで終わりです！ 商は ${finalQuotientStr}、あまりは ${finalRemainderStr} になります。`
                : (gaisuConfig !== null
                    ? `【完成！】指定した方法で四捨五入した商が求められました！商は約${finalQuotientStr}です。`
                    : `【完成！】わり進めた商が求められました！商は ${finalQuotientStr} です。`),
            dots: { ...currentDots },
            writeCells: completeWriteCells,
            maskFromCol: currentMaskFromCol, pulseBoxes: []
        });

        return { initialCells, steps, totalRows: currentRow + 2, totalCols: M + N, M, N };
    }
}

let appState = null;
let currentStepIdx = 0;
let gridData = [];
let quotientDotAnimFrame = null;
let uiHintsEnabled = true;

function applyUiHintsState() {
    const panel = document.getElementById('step-panel');
    const button = document.getElementById('btn-toggle-hints');
    document.body.classList.toggle('ui-hints-off', !uiHintsEnabled);

    if (panel) {
        panel.style.display = uiHintsEnabled ? 'block' : 'none';
    }
    if (button) {
        button.textContent = uiHintsEnabled ? '循環カード・背景ヒント：ON' : '循環カード・背景ヒント：OFF';
        button.classList.toggle('is-off', !uiHintsEnabled);
    }
    if (!uiHintsEnabled) {
        document.body.style.backgroundColor = '#f7f9fa';
    }
}

function toggleUiHints() {
    uiHintsEnabled = !uiHintsEnabled;
    applyUiHintsState();
    if (appState && appState.steps && appState.steps[currentStepIdx]) {
        updateStepFlow(appState.steps[currentStepIdx]);
    }
}

function cancelQuotientDotAnimation() {
    if (quotientDotAnimFrame !== null) {
        cancelAnimationFrame(quotientDotAnimFrame);
        quotientDotAnimFrame = null;
    }
}

function initSimulation() {
    const dividendInput = document.getElementById('num-dividend');
    const divisorInput = document.getElementById('num-divisor');

    dividendInput.value = sanitizeInput(dividendInput.value.trim());
    divisorInput.value = sanitizeInput(divisorInput.value.trim());

    const dividendStr = dividendInput.value;
    const divisorStr = divisorInput.value;
    if (!dividendStr || !divisorStr) return;

    const questionZone = document.getElementById('question-zone');
    const gaisuSubRow = document.getElementById('gaisu-sub-row');
    const calcRoute = document.getElementById('calc-route');

    // 内部で先に整数商を最後まで計算し、余りの有無→割り切れるか、の順で分岐
    const divParse = parseNumberMeta(divisorStr);
    const dvdParse = parseNumberMeta(dividendStr);
    const scale = Math.pow(10, divParse.decimalPlaces);
    const scaledDividend = Math.round(parseFloat(dividendStr) * scale);
    const scaledDivisor = parseInt(divParse.digits, 10);

    const integerRemainder = scaledDividend % scaledDivisor;
    const dividesOut = AdvancedDivisionEngine.checkWillDivideOut(dividendStr, divisorStr);

    // 選択肢を作り直す前の値を保持して、再初期化で強制的に戻らないようにする
    const previousRoute = calcRoute.value || 'remainder';

    if (integerRemainder !== 0) {
        questionZone.style.display = 'flex';
        calcRoute.innerHTML = `
            <option value="remainder">あまりを出す 【4年生向け】</option>
            <option value="advance">わり進める 【5年生向け】</option>
        `;
        calcRoute.value = (previousRoute === 'advance') ? 'advance' : 'remainder';

        if (calcRoute.value === 'advance' && !dividesOut) {
            gaisuSubRow.style.display = 'flex';
        } else {
            gaisuSubRow.style.display = 'none';
        }
    } else if (!dividesOut) {
        questionZone.style.display = 'flex';
        calcRoute.innerHTML = `
            <option value="advance">小数でわり進める</option>
        `;
        calcRoute.value = 'advance';
        gaisuSubRow.style.display = 'flex';
    } else {
        questionZone.style.display = 'none';
        gaisuSubRow.style.display = 'none';
    }

    const route = calcRoute.value;
    const gaisuConfig = (route === 'advance' && !dividesOut) ? parseGaisuConfig(document.getElementById('gaisu-target').value) : null;
    appState = AdvancedDivisionEngine.generateSteps(dividendStr, divisorStr, route, gaisuConfig);
    currentStepIdx = 0;

    gridData = Array(appState.totalRows).fill(null).map(() => 
        Array(appState.totalCols).fill(null).map(() => ({ 
            char: "", isGuide: false, borderTop: false, borderBottom: false, isNewZero: false,
            hasSlash: false, topChar: "", isRedBorder: false, isDropping: false, dropDistance: 0
        }))
    );

    appState.initialCells.forEach(cell => { gridData[cell.r][cell.c].char = cell.char; });
    for (let c = appState.M; c < appState.totalCols; c++) { gridData[1][c].borderTop = true; }

    renderGridStructure();
    applyStepUI();
    updateButtons();
}

function renderGridStructure() {
    const gridEl = document.getElementById('division-grid');
    gridEl.innerHTML = "";
    gridEl.style.gridTemplateColumns = `repeat(${appState.totalCols}, 46px)`;
    for (let r = 0; r < appState.totalRows; r++) {
        for (let c = 0; c < appState.totalCols; c++) {
            const cellMeta = gridData[r][c];
            if (!cellMeta) continue;
            const cellDiv = document.createElement('div');
            cellDiv.classList.add('grid-cell'); cellDiv.id = `cell-${r}-${c}`;
            if (cellMeta.borderTop) cellDiv.classList.add('border-top-solid');
            if (cellMeta.borderBottom) cellDiv.classList.add('border-bottom-solid');
            if (cellMeta.isNewZero) cellDiv.classList.add('added-zero');
            if (cellMeta.isRedBorder) cellDiv.classList.add('red-border');

            const container = document.createElement('div');
            container.classList.add('cell-container');

            const topNum = document.createElement('div');
            topNum.classList.add('top-num');
            topNum.innerText = cellMeta.topChar || "";
            if (cellMeta.topChar === "0") {
                topNum.style.color = "#ef4444"; 
            } else if (cellMeta.topChar) {
                topNum.style.color = "#22c55e"; 
            }

            const mainNum = document.createElement('div');
            mainNum.classList.add('main-num');

            if (cellMeta.isDropping) {
                mainNum.classList.add('digit-dropping');
                mainNum.style.setProperty('--drop-start-y', `-${cellMeta.dropDistance}px`);
            }

            if (cellMeta.isGuide) {
                mainNum.innerHTML = `<span class="gray-guide">✕</span>`;
            } else {
                mainNum.innerText = cellMeta.char;
            }

            const slash = document.createElement('div');
            slash.classList.add('slash-line');
            if (cellMeta.hasSlash) {
                slash.style.display = "block";
            }

            container.appendChild(topNum);
            container.appendChild(mainNum);
            container.appendChild(slash);
            cellDiv.appendChild(container);

            gridEl.appendChild(cellDiv);
        }
    }
}

function clearSvg() {
    const svg = document.getElementById('hint-svg');
    svg.innerHTML = `
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto">
                <path d="M 0 1 L 10 5 L 0 9 z" fill="#2196f3"/>
            </marker>
            <marker id="dot-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
                <path d="M 0 1 L 10 5 L 0 9 z" fill="#f97316"/>
            </marker>
        </defs>
    `;
}

function drawDropArrow(fromR, fromC, toR, toC) {
    const svg = document.getElementById('hint-svg');
    const containerRect = document.getElementById('notebook-container').getBoundingClientRect();

    const fromCell = document.getElementById(`cell-${fromR}-${fromC}`);
    const toCell = document.getElementById(`cell-${toR}-${toC}`);
    if (!fromCell || !toCell) return;

    const fromRect = fromCell.getBoundingClientRect();
    const toRect = toCell.getBoundingClientRect();

    const x = (fromRect.left + fromRect.right) / 2 - containerRect.left;
    const yStart = fromRect.bottom - containerRect.top - 5; 
    const yEnd = toRect.top - containerRect.top + 2; 

    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", x);
    line.setAttribute("y1", yStart);
    line.setAttribute("x2", x);
    line.setAttribute("y2", yEnd);
    line.setAttribute("stroke", "#2196f3");
    line.setAttribute("stroke-width", "2.5");
    line.setAttribute("stroke-dasharray", "4,3");
    line.setAttribute("marker-end", "url(#arrow)");
    svg.appendChild(line);
}

function applyStepUI() {
    document.querySelectorAll('.grid-cell').forEach(el => el.classList.remove('active-target'));
    cancelQuotientDotAnimation();
    clearSvg(); 
    document.getElementById('fusen').style.display = "none";
    if (!appState || appState.steps.length === 0) return;

    for (let r = 0; r < appState.totalRows; r++) {
        for (let c = 0; c < appState.totalCols; c++) {
            if (gridData[r] && gridData[r][c]) {
                gridData[r][c].isDropping = false;
            }
        }
    }
    for (let c = 0; c < appState.totalCols; c++) {
        if (gridData[0] && gridData[0][c]) {
            gridData[0][c].hasSlash = false;
            gridData[0][c].topChar = "";
            gridData[0][c].isRedBorder = false;
            // ★バグ修正: 「もどる」ボタン時にも isGuide をリセット対象に含める
            // （row=0のisGuideは毎ステップ再適用されるため、ここで一旦クリアしても問題ない）
            gridData[0][c].isGuide = false;
        }
    }

    drawDivisionCurve();

    const step = appState.steps[currentStepIdx];
    document.getElementById('narration').innerText = step.description;
    updateStepFlow(step);

    const brainCard = document.getElementById('brain-work');
    if (step.brainHtml) {
        brainCard.innerHTML = step.brainHtml;
        brainCard.style.display = "block";
    } else {
        brainCard.style.display = "none";
    }

    if (step.writeCells) {
        step.writeCells.forEach(wc => {
            if (gridData[wc.r] && gridData[wc.r][wc.c]) {
                gridData[wc.r][wc.c].char = wc.char;

                // ★バグ修正: isGuideフラグを正しく上書きする。
                // "✕"以外の文字（"0"など実際の商）が書き込まれるときは必ずisGuideをfalseにリセットする。
                // これにより、先にskipで✕が書かれたマスに後からbuild-zeroで"0"が書かれても
                // ✕として描画されてしまうバグが解消される。
                if (wc.isGuide) {
                    gridData[wc.r][wc.c].isGuide = true;
                } else {
                    // isGuideが明示されていない＝普通の数字なので、必ずfalseにリセット
                    gridData[wc.r][wc.c].isGuide = false;
                }

                if (wc.borderBottom) gridData[wc.r][wc.c].borderBottom = true;
                if (wc.isNewZero) gridData[wc.r][wc.c].isNewZero = true;

                if (wc.hasSlash) gridData[wc.r][wc.c].hasSlash = true;
                if (wc.topChar) gridData[wc.r][wc.c].topChar = wc.topChar;
                if (wc.isRedBorder) gridData[wc.r][wc.c].isRedBorder = true;

                if ((step.phase === "drop" || step.phase === "remainder-drop") && wc.r > 1) {
                    gridData[wc.r][wc.c].isDropping = true;
                    gridData[wc.r][wc.c].dropDistance = (wc.r - 1) * 46; 
                }
            }
        });
        renderGridStructure();
    }

    if ((step.phase === "drop" || step.phase === "remainder-drop") && step.writeCells) {
        step.writeCells.forEach(wc => {
            if (wc.r > 1) {
                drawDropArrow(1, wc.c, wc.r, wc.c); 
            }
        });
    }

    drawDecimalDots(step);

    if (step.pulseBoxes && step.pulseBoxes.length > 0) {
        step.pulseBoxes.forEach(box => {
            const target = document.getElementById(`cell-${box.r}-${box.c}`);
            if (target) target.classList.add('active-target');
        });
    }

    if (step.maskFromCol !== null && step.maskFromCol < appState.totalCols) {
        const fusen = document.getElementById('fusen');
        const containerRect = document.getElementById('notebook-container').getBoundingClientRect();
        const startCellRect = document.getElementById(`cell-0-${step.maskFromCol}`).getBoundingClientRect();
        const endCellRect = document.getElementById(`cell-${appState.totalRows-1}-${appState.totalCols-1}`).getBoundingClientRect();

        if (startCellRect && endCellRect) {
            fusen.style.left = (startCellRect.left - containerRect.left) + "px";
            fusen.style.top = (startCellRect.top - containerRect.top) + "px";
            fusen.style.width = (endCellRect.right - startCellRect.left) + "px";
            fusen.style.height = (endCellRect.bottom - startCellRect.top) + "px"; 
            fusen.style.display = "block";
        }
    }
}

function drawDivisionCurve() {
    const svg = document.getElementById('hint-svg');
    const divisorLen = appState.M;
    const targetCell = document.getElementById(`cell-1-${divisorLen}`);
    if (!targetCell) return;
    const containerRect = document.getElementById('notebook-container').getBoundingClientRect();
    const cellRect = targetCell.getBoundingClientRect();
    const x = cellRect.left - containerRect.left;
    const yTop = cellRect.top - containerRect.top;
    const yBottom = cellRect.bottom - containerRect.top;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${x} ${yTop} Q ${x + 12} ${(yTop + yBottom)/2} ${x} ${yBottom}`);
    path.setAttribute("stroke", "#1e293b"); path.setAttribute("stroke-width", "3"); path.setAttribute("fill", "none"); svg.appendChild(path);
}

function drawDecimalDots(step) {
    const svg = document.getElementById('hint-svg');
    const containerRect = document.getElementById('notebook-container').getBoundingClientRect();

    function getBoundary(r, c) {
        let cell = c > 0 ? document.getElementById(`cell-${r}-${c-1}`) : document.getElementById(`cell-${r}-${c}`);
        if (!cell) return null; 
        const rect = cell.getBoundingClientRect();
        return { 
            x: c > 0 ? (rect.right - containerRect.left) : (rect.left - containerRect.left), 
            y: rect.bottom - containerRect.top - 7 
        };
    }

    function drawDot(pt, fill, opacity = 1) {
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", pt.x); c.setAttribute("cy", pt.y); c.setAttribute("r", "4.5");
        c.setAttribute("fill", fill); c.setAttribute("opacity", opacity);
        svg.appendChild(c);
    }

    function drawMovedDot(ptFrom, ptTo, color) {
        // 元の位置: 薄く打ち消し線
        const cross = document.createElementNS("http://www.w3.org/2000/svg", "line");
        cross.setAttribute("x1", ptFrom.x - 6); cross.setAttribute("y1", ptFrom.y - 6);
        cross.setAttribute("x2", ptFrom.x + 6); cross.setAttribute("y2", ptFrom.y + 6);
        cross.setAttribute("stroke", "#94a3b8"); cross.setAttribute("stroke-width", "2"); svg.appendChild(cross);
        const cross2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
        cross2.setAttribute("x1", ptFrom.x + 6); cross2.setAttribute("y1", ptFrom.y - 6);
        cross2.setAttribute("x2", ptFrom.x - 6); cross2.setAttribute("y2", ptFrom.y + 6);
        cross2.setAttribute("stroke", "#94a3b8"); cross2.setAttribute("stroke-width", "2"); svg.appendChild(cross2);

        // 移動先 → 現在の点
        drawDot(ptTo, color);

        // 矢印（元→先）
        if (Math.abs(ptTo.x - ptFrom.x) > 4) {
            const mx = (ptFrom.x + ptTo.x) / 2;
            const my = ptFrom.y - 18;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", `M ${ptFrom.x} ${ptFrom.y} Q ${mx} ${my} ${ptTo.x} ${ptTo.y}`);
            path.setAttribute("stroke", color); path.setAttribute("stroke-width", "2");
            path.setAttribute("fill", "none"); path.setAttribute("marker-end", "url(#dot-arrow)"); svg.appendChild(path);
        }
    }

    function drawVerticalArrow(ptFrom, ptTo, color = "#0284c7") {
        const arrow = document.createElementNS("http://www.w3.org/2000/svg", "line");
        arrow.setAttribute("x1", ptFrom.x);
        arrow.setAttribute("y1", ptFrom.y);
        arrow.setAttribute("x2", ptTo.x);
        arrow.setAttribute("y2", ptTo.y);
        arrow.setAttribute("stroke", color);
        arrow.setAttribute("stroke-width", "2.5");
        arrow.setAttribute("stroke-dasharray", "5,4");
        arrow.setAttribute("marker-end", "url(#arrow)");
        svg.appendChild(arrow);
    }

    function animateDotMovement(ptFrom, ptTo, arrowColor, dotColor, directionLabel) {
        drawVerticalArrow(ptFrom, ptTo, arrowColor);

        const finalDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        finalDot.setAttribute("cx", ptTo.x);
        finalDot.setAttribute("cy", ptTo.y);
        finalDot.setAttribute("r", "4.5");
        finalDot.setAttribute("fill", dotColor);
        finalDot.setAttribute("opacity", "0");
        svg.appendChild(finalDot);

        const motionDot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        motionDot.setAttribute("cx", ptFrom.x);
        motionDot.setAttribute("cy", ptFrom.y);
        motionDot.setAttribute("r", "5");
        motionDot.setAttribute("fill", arrowColor);
        motionDot.setAttribute("opacity", "0.95");
        svg.appendChild(motionDot);

        const duration = 850;
        const startTime = performance.now();

        function step(now) {
            const t = Math.min(1, (now - startTime) / duration);
            const eased = 1 - Math.pow(1 - t, 3);
            const x = ptFrom.x + (ptTo.x - ptFrom.x) * eased;
            const y = ptFrom.y + (ptTo.y - ptFrom.y) * eased;
            motionDot.setAttribute("cx", x);
            motionDot.setAttribute("cy", y);

            if (t < 1) {
                quotientDotAnimFrame = requestAnimationFrame(step);
            } else {
                finalDot.setAttribute("opacity", "1");
                if (motionDot.parentNode) motionDot.parentNode.removeChild(motionDot);
                quotientDotAnimFrame = null;
            }
        }

        cancelQuotientDotAnimation();
        quotientDotAnimFrame = requestAnimationFrame(step);
    }

    const dots = step.dots;
    const isMoved = dots.isMoved;
    const quotientDotAnim = (step.phase === "quotient-dot");
    const remainderDotAnim = (step.phase === "remainder-dot");

    // 商は「移動した後の小数点」から、あまりは「動かす前の小数点」から動かす
    const quotientSourceCol = dots.dvdCurrent;
    const remainderSourceCol = dots.dvdOriginal;

    // わる数の小数点
    if (dots.divOriginal !== null) {
        if (isMoved && dots.divCurrent !== null && dots.divCurrent !== dots.divOriginal) {
            const ptFrom = getBoundary(1, dots.divOriginal);
            const ptTo   = getBoundary(1, dots.divCurrent);
            if (ptFrom && ptTo) drawMovedDot(ptFrom, ptTo, "#f97316");
        } else {
            const pt = getBoundary(1, dots.divOriginal);
            if (pt) drawDot(pt, "#334155");
        }
    }

    // わられる数の小数点
    if (dots.dvdOriginal !== null) {
        const ptOrig = getBoundary(1, dots.dvdOriginal);
        if (isMoved && dots.dvdCurrent !== null && dots.dvdCurrent !== dots.dvdOriginal) {
            const ptTo = getBoundary(1, dots.dvdCurrent);
            if (ptOrig && ptTo) {
                drawMovedDot(ptOrig, ptTo, "#f97316");
            }
        } else {
            if (ptOrig) drawDot(ptOrig, "#334155");
        }
    }

    // 商の小数点
    if (dots.quotient !== null) {
        const ptQuot = getBoundary(0, dots.quotient);
        if (ptQuot) {
            const ptSource = quotientSourceCol !== null ? getBoundary(1, quotientSourceCol) : null;
            if (quotientDotAnim && ptSource) {
                animateDotMovement(ptSource, ptQuot, "#0284c7", "#ef4444", "up");
            } else {
                drawDot(ptQuot, "#ef4444");
            }
        }
    }

    // あまりの小数点
    if (dots.remainder !== null && dots.remainderRow !== undefined) {
        const ptRem = getBoundary(dots.remainderRow, dots.remainder);
        if (ptRem) {
            const ptSource = remainderSourceCol !== null ? getBoundary(1, remainderSourceCol) : null;
            if (remainderDotAnim && ptSource) {
                animateDotMovement(ptSource, ptRem, "#0284c7", "#ef4444", "down");
            } else {
                drawDot(ptRem, "#ef4444");
            }
        }
    }
}

function updateStepFlow(step) {
    const panel = document.getElementById('step-panel');
    const badge = document.getElementById('step-status-badge');
    if (!panel || !badge) return;

    const phase = step && step.phase ? step.phase : "init";
    let activeKey = "tateru";
    let bg = "#f7f9fa";
    let accent = "#3b82f6";
    let soft = "rgba(255,255,255,0.96)";
    let label = "たてる";

    if (phase === "move-dots") {
        activeKey = "none";
        bg = "#ffffff";
        accent = "#64748b";
        soft = "#ffffff";
        label = "小数点のいどう";
    } else if (["multiply", "trial-multiply"].includes(phase)) {
        activeKey = "kakeru";
        bg = "#dcfce7";
        accent = "#16a34a";
        soft = "#f0fdf4";
        label = "かける";
    } else if (["subtract", "trial-fix"].includes(phase)) {
        activeKey = "hiku";
        bg = "#fee2e2";
        accent = "#dc2626";
        soft = "#fff1f2";
        label = "ひく";
    } else if (["drop", "remainder-drop", "decimal-zero", "remainder-dot", "zero-fill"].includes(phase)) {
        activeKey = "orosu";
        bg = "#ffedd5";
        accent = "#ea580c";
        soft = "#fff7ed";
        label = "おろす";
    } else if (phase === "complete") {
        activeKey = "tateru";
        bg = "#f7f9fa";
        accent = "#64748b";
        soft = "#ffffff";
        label = "完成";
    } else {
        activeKey = "tateru";
        bg = "#dbeafe";
        accent = "#2563eb";
        soft = "#eff6ff";
        label = "たてる";
    }

    if (!uiHintsEnabled) {
        document.body.style.backgroundColor = "#f7f9fa";
        panel.classList.remove("phase-tateru", "phase-kakeru", "phase-hiku", "phase-orosu", "phase-neutral");
        panel.classList.add("phase-neutral");
        panel.style.setProperty("--phase-accent", "#64748b");
        panel.style.setProperty("--phase-soft", "rgba(255,255,255,0.96)");
        badge.textContent = "いまの工程：表示OFF";
        panel.querySelectorAll(".step-node").forEach(node => {
            node.classList.remove("active");
        });
        return;
    }

    document.body.style.backgroundColor = bg;
    panel.classList.remove("phase-tateru", "phase-kakeru", "phase-hiku", "phase-orosu", "phase-neutral");
    panel.classList.add(activeKey === "none" ? "phase-neutral" : (phase === "complete" ? "phase-neutral" : `phase-${activeKey}`));
    panel.style.setProperty("--phase-accent", accent);
    panel.style.setProperty("--phase-soft", soft);
    badge.textContent = `いまの工程：${label}`;

    panel.querySelectorAll(".step-node").forEach(node => {
        node.classList.toggle("active", activeKey !== "none" && node.dataset.step === activeKey);
    });
}

function updateButtons() {
    document.getElementById('btn-prev').disabled = (currentStepIdx === 0);
    document.getElementById('btn-next').disabled = (currentStepIdx >= appState.steps.length - 1);
}

document.getElementById('num-dividend').addEventListener('input', function(e) {
    e.target.value = sanitizeInput(e.target.value);
});
document.getElementById('num-divisor').addEventListener('input', function(e) {
    e.target.value = sanitizeInput(e.target.value);
});

document.getElementById('btn-init').addEventListener('click', initSimulation);
document.getElementById('btn-toggle-hints').addEventListener('click', toggleUiHints);
document.getElementById('calc-route').addEventListener('change', initSimulation);
document.getElementById('gaisu-target').addEventListener('change', initSimulation);
document.getElementById('btn-next').addEventListener('click', () => {
    if (currentStepIdx < appState.steps.length - 1) { currentStepIdx++; applyStepUI(); updateButtons(); }
});
document.getElementById('btn-prev').addEventListener('click', () => {
    if (currentStepIdx > 0) {
        currentStepIdx--; const targetIdx = currentStepIdx; applyUiHintsState();
initSimulation();
        while(currentStepIdx < targetIdx) { currentStepIdx++; applyStepUI(); }
        updateButtons();
    }
});
initSimulation();
</script>
