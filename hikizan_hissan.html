<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ひき算の ひっ算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;}
body{background:#f5f0e8;font-family:'Noto Sans JP',sans-serif;min-height:100vh;overflow-x:hidden;}

.app-header{background:linear-gradient(135deg,#ff8a5c,#e35d3a);color:#fff;text-align:center;
  padding:10px 16px 8px;box-shadow:0 3px 10px rgba(0,0,0,.15);}
.app-header h1{font-size:20px;font-weight:900;letter-spacing:2px;}

.input-area{background:#fff;border-bottom:2px solid #ddd;padding:10px 12px;}
.input-row{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;}
.input-row label{font-size:13px;font-weight:bold;color:#555;}
.num-input{width:72px;padding:6px 8px;font-size:18px;font-weight:bold;text-align:center;
  border:2px solid #aaa;border-radius:8px;font-family:'Noto Sans JP',sans-serif;}
.num-input:focus{border-color:#e35d3a;outline:none;}
.minus-label{font-size:22px;font-weight:bold;color:#e35d3a;}
.gen-btn{padding:7px 20px;font-size:14px;font-weight:bold;border:none;border-radius:20px;
  background:linear-gradient(135deg,#ff8a5c,#e35d3a);color:#fff;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;box-shadow:0 2px 6px rgba(227,93,58,.3);transition:all .2s;}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(227,93,58,.4);}
.preset-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:6px;}
.problem-btn{padding:4px 11px;font-size:12px;font-weight:bold;border:2px solid #ccc;
  border-radius:16px;background:#fff;cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;}
.problem-btn.active{background:#e35d3a;color:#fff;border-color:#c44a2a;}
.problem-btn:hover:not(.active){background:#ffe9e0;border-color:#e35d3a;}
.bridge-toggle{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:6px;align-items:center;}
.bridge-toggle label{font-size:11px;color:#888;}
.method-btn{padding:3px 10px;font-size:11px;font-weight:bold;border:1.5px solid #ccc;
  border-radius:14px;background:#fff;cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;}
.method-btn.active{background:#7f3fbf;color:#fff;border-color:#6a2fa0;}
.err-msg{color:#e74c3c;font-size:12px;font-weight:bold;text-align:center;margin-top:4px;display:none;}

.main-area{display:flex;gap:12px;padding:12px;max-width:980px;margin:0 auto;align-items:flex-start;}

/* ===== タイル図エリア：<table>で列位置を保証 ===== */
.tile-area{flex:0 0 auto;background:#fff;border-radius:12px;
  box-shadow:0 4px 14px rgba(0,0,0,.08);position:relative;overflow:visible;}

#tile-table{border-collapse:collapse;table-layout:fixed;border-radius:12px;overflow:hidden;}

/* col要素は表示/非表示と幅をJSが一括設定する。
   theadとtbodyが同じ<col>を共有するため、列のズレは構造的に発生しない。*/
#tile-table col.col-label{width:28px;}
#tile-table col.col-hyaku{width:124px;}
#tile-table col.col-juu{width:124px;}
#tile-table col.col-ichi{width:110px;}

#tile-table thead th{
  font-size:10px;font-weight:bold;padding:6px 0;height:30px;
  box-sizing:border-box;border-bottom:2px solid #ddd;
}
#tile-table th.th-label{background:#fafafa;}
#tile-table th.th-hyaku{background:#cce8f4;color:#1a5276;}
#tile-table th.th-juu  {background:#fff9cc;color:#6b5700;}
#tile-table th.th-ichi {background:#fce4ec;color:#880e4f;}

#tile-table tbody td{
  position:relative;text-align:center;vertical-align:middle;
  box-sizing:border-box;height:86px;border-bottom:1px dashed #e0e0e0;
}
#tile-table tbody tr:last-child td{border-bottom:none;}
#tile-table tbody tr.tile-result-row td{border-top:3px solid #444;height:94px;}

#tile-table td.td-label{font-size:15px;font-weight:bold;color:#4a9eff;background:#fff;}
#tile-table td.td-label.minus{color:#e35d3a;}
#tile-table td.td-label.equals{color:#27ae60;font-size:17px;}

#tile-table td.td-hyaku{background:#e8f4fb;}
#tile-table td.td-juu  {background:#fffde7;}
#tile-table td.td-ichi {background:#fce4ec;}

/* 列の縦の仕切り線（border-rightをセル単位で。theadとtbodyの両方に同じ値を指定）*/
#tile-table th.th-hyaku,#tile-table td.td-hyaku{border-right:2px solid #85c1e9;}
#tile-table th.th-juu,  #tile-table td.td-juu  {border-right:2px solid #f0d800;}

/* 答え行で、まだその位にタイルが無い（くり上がり前）ときだけ薄い斜線の予告枠を重ねる */
#tile-table td.is-empty{
  background-image:repeating-linear-gradient(
    45deg, transparent, transparent 6px,
    rgba(0,0,0,.05) 6px, rgba(0,0,0,.05) 12px
  );
}

#anim-layer{position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;overflow:visible;z-index:100;}

.right-panel{flex:1;display:flex;flex-direction:column;gap:10px;min-width:190px;}
.hissan-box{background:#fff;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);
  padding:10px 14px 14px;}
.hissan-title{font-size:12px;font-weight:bold;color:#666;margin-bottom:4px;text-align:center;}
.hissan-inner{display:flex;justify-content:center;}
#hissan-svg{display:block;}

.step-box{background:#fff;border-radius:12px;box-shadow:0 4px 14px rgba(0,0,0,.08);
  padding:12px 14px;min-height:100px;}
.step-number{display:inline-block;background:#4a9eff;color:#fff;border-radius:50%;
  width:24px;height:24px;line-height:24px;text-align:center;font-size:13px;
  font-weight:bold;margin-right:6px;}
.step-title{font-size:14px;font-weight:bold;color:#333;margin-bottom:8px;display:flex;align-items:center;}
.step-desc{font-size:13px;color:#444;line-height:1.9;}
.step-desc .ic{color:#c2185b;font-weight:bold;}
.step-desc .jc{color:#b7950b;font-weight:bold;}
.step-desc .hc{color:#1a5276;font-weight:bold;}
.step-desc .sc{color:#555;font-weight:bold;}
.step-desc .cc{color:#e74c3c;font-weight:bold;}
.step-desc .ac{color:#1a7f37;font-weight:bold;}
.step-desc .rc{color:#7f3fbf;font-weight:bold;}

.nav-area{display:flex;justify-content:center;align-items:center;gap:12px;
  padding:10px 12px;background:#fff;border-top:2px solid #eee;}
.nav-btn{padding:10px 24px;font-size:15px;font-weight:bold;border:none;border-radius:25px;
  cursor:pointer;transition:all .2s;font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 3px 8px rgba(0,0,0,.12);}
.nav-btn.prev{background:#eee;color:#666;}
.nav-btn.prev:hover{background:#ddd;}
.nav-btn.next{background:linear-gradient(135deg,#4a9eff,#2d7dd2);color:#fff;}
.nav-btn.next:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(74,158,255,.35);}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.step-indicator{font-size:13px;color:#888;font-weight:bold;min-width:80px;text-align:center;}

@keyframes popIn{
  0%{opacity:0;transform:scale(.2);}
  65%{opacity:1;transform:scale(1.2);}
  100%{opacity:1;transform:scale(1);}
}
.pop-in{animation:popIn .4s cubic-bezier(.34,1.56,.64,1) forwards;}

@keyframes glowPulse{
  0%{filter:drop-shadow(0 0 0px #fff176) brightness(1);}
  40%{filter:drop-shadow(0 0 14px #fff176) drop-shadow(0 0 22px #ffeb3b) brightness(1.6);}
  100%{filter:drop-shadow(0 0 0px #fff176) brightness(1);}
}
.glow-pop{animation:glowPulse .5s ease-out forwards;}

@media(max-width:640px){
  .main-area{flex-direction:column;}
  .tile-area{flex:none;width:100%;}
}
</style>
</head>
<body>
<div class="app-header"><h1>ひき算の ひっ算</h1></div>

<div class="input-area">
  <div class="input-row">
    <label>ひかれる数：</label>
    <input type="number" id="inp-a" class="num-input" value="47" min="1" max="999">
    <span class="minus-label">－</span>
    <label>ひく数：</label>
    <input type="number" id="inp-b" class="num-input" value="18" min="1" max="999">
    <button class="gen-btn" onclick="generateFromInput()">説明生成 ▶</button>
  </div>
  <div id="err-msg" class="err-msg">1〜999の整数を入力してください（ひく数はひかれる数より小さくしてください）</div>
  <div class="preset-row">
    <span style="font-size:12px;color:#888;align-self:center;">れい：</span>
    <button class="problem-btn active" onclick="setProblem(47,18)">47－18</button>
    <button class="problem-btn" onclick="setProblem(35,12)">35－12</button>
    <button class="problem-btn" onclick="setProblem(63,27)">63－27</button>
    <button class="problem-btn" onclick="setProblem(243,127)">243－127</button>
    <button class="problem-btn" onclick="setProblem(305,148)">305－148</button>
    <button class="problem-btn" onclick="setProblem(623,378)">623－378</button>
  </div>
  <div class="bridge-toggle">
    <label>くり下がりの 計算方法：</label>
    <button class="method-btn active" id="btn-bridge" onclick="setMethod('bridge')">ブリッジ方式（10からひく）</button>
    <button class="method-btn" id="btn-direct" onclick="setMethod('direct')">そのままひく方式</button>
  </div>
</div>

<div class="main-area">
  <div class="tile-area" id="tile-area">
    <table id="tile-table">
      <colgroup>
        <col class="col-label">
        <col class="col-hyaku" id="colgrp-hyaku">
        <col class="col-juu">
        <col class="col-ichi">
      </colgroup>
      <thead>
        <tr>
          <th class="th-label"></th>
          <th class="th-hyaku" id="hdr-hyaku">ひゃくのくらい</th>
          <th class="th-juu"   id="hdr-juu">じゅうのくらい</th>
          <th class="th-ichi">いちのくらい</th>
        </tr>
      </thead>
      <tbody>
        <!-- A行：ひかれる数 -->
        <tr id="row-a">
          <td class="td-label" id="lbl-a"></td>
          <td class="td-hyaku" id="col-hyaku-a"><svg id="svg-hyaku-a" width="124" height="86" viewBox="0 0 124 86"></svg></td>
          <td class="td-juu">                   <svg id="svg-juu-a"   width="124" height="86" viewBox="0 0 124 86"></svg></td>
          <td class="td-ichi">                  <svg id="svg-ichi-a"  width="110" height="86" viewBox="0 0 110 86"></svg></td>
        </tr>
        <!-- B行：ひく数 -->
        <tr id="row-b">
          <td class="td-label minus">－</td>
          <td class="td-hyaku" id="col-hyaku-b"><svg id="svg-hyaku-b" width="124" height="86" viewBox="0 0 124 86"></svg></td>
          <td class="td-juu">                   <svg id="svg-juu-b"   width="124" height="86" viewBox="0 0 124 86"></svg></td>
          <td class="td-ichi">                  <svg id="svg-ichi-b"  width="110" height="86" viewBox="0 0 110 86"></svg></td>
        </tr>
        <!-- 答え行 -->
        <tr class="tile-result-row" id="row-ans" style="display:none;">
          <td class="td-label equals">＝</td>
          <td class="td-hyaku is-empty" id="col-hyaku-ans"><svg id="svg-hyaku-ans" width="124" height="94" viewBox="0 0 124 94"></svg></td>
          <td class="td-juu">                                  <svg id="svg-juu-ans"   width="124" height="94" viewBox="0 0 124 94"></svg></td>
          <td class="td-ichi">                                 <svg id="svg-ichi-ans"  width="110" height="94" viewBox="0 0 110 94"></svg></td>
        </tr>
      </tbody>
    </table>
    <svg id="anim-layer"></svg>
  </div>

  <div class="right-panel">
    <div class="hissan-box">
      <div class="hissan-title">ひっ算</div>
      <div class="hissan-inner">
        <svg id="hissan-svg" width="210" height="230" viewBox="0 0 210 230"></svg>
      </div>
    </div>
    <div class="step-box">
      <div class="step-title">
        <span class="step-number" id="step-num">1</span>
        <span id="step-title-text"></span>
      </div>
      <div class="step-desc" id="step-desc"></div>
    </div>
  </div>
</div>

<div class="nav-area">
  <button class="nav-btn prev" id="btn-prev" onclick="goStep(-1)">◀ もどる</button>
  <span class="step-indicator" id="step-ind">1 / 1</span>
  <button class="nav-btn next" id="btn-next" onclick="goStep(1)">すすむ ▶</button>
</div>

<script>
// ============================================================
// SVG ユーティリティ
// ============================================================
const NS='http://www.w3.org/2000/svg';
const U=5.5;
const FC='#f5c542', SC='#c8960a', SC5='#7a5500';

function mk(tag,a,parent){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(a))e.setAttribute(k,v);
  if(parent)parent.appendChild(e);
  return e;
}
function eio(t){return t<.5?2*t*t:-1+(4-2*t)*t;}

// ===== 十の位：棒1本 =====
function drawStick(parent,cx,cy,u,alpha,strokeColor){
  alpha=alpha??1; u=u??U; strokeColor=strokeColor??SC;
  const G=u*.15,S=u+G,H=10*u+9*G;
  const ox=cx-u/2,oy=cy-H/2;
  for(let i=0;i<10;i++)
    mk('rect',{x:ox,y:oy+i*S,width:u,height:u,fill:FC,stroke:strokeColor,'stroke-width':.6,rx:.3,opacity:alpha},parent);
  mk('line',{x1:ox-1,x2:ox+u+1,y1:oy+5*S-G/2,y2:oy+5*S-G/2,stroke:SC5,'stroke-width':1.2,opacity:alpha},parent);
  mk('rect',{x:ox-1,y:oy-1,width:u+2,height:H+2,fill:'none',stroke:strokeColor,'stroke-width':.8,rx:1,opacity:alpha},parent);
}

// ===== 百の位：正方形タイル1枚 =====
// PNG画像を<image>1枚で配置（格子100個のSVG描画をやめて軽量化）。
// くり上がりの強調表示(strokeColor指定時)は、画像の外周にreact枠を重ねて表現する。
function drawHyakuScaled(parent,cx,cy,u,alpha,strokeColor){
  alpha=alpha??1;
  const G=u*.15,TW=10*u+9*G,TH=10*u+9*G;
  const ox=cx-TW/2,oy=cy-TH/2;
  mk('image',{href:IMG_HYAKU,x:ox,y:oy,width:TW,height:TH,opacity:alpha,
    'preserveAspectRatio':'none'},parent);
  if(strokeColor && strokeColor!==SC){
    // くり上がり等の強調色が指定された場合のみ、外枠を重ねて目立たせる
    mk('rect',{x:ox-1,y:oy-1,width:TW+2,height:TH+2,fill:'none',
      stroke:strokeColor,'stroke-width':2,rx:3,opacity:alpha},parent);
  }
}

// ===== 千の位：百タイル10枚重ねの束 =====
// PNG画像(立体的な重なり・テープを描き込み済み)を<image>1枚で配置。
function drawSenScaled(parent,cx,cy,u,alpha,strokeColor){
  alpha=alpha??1;
  // 画像自体に奥行き(重なり)が含まれているため、表示領域は正方形(10u分)より
  // やや大きく取る必要がある。元のdrawSenScaledの見た目に合わせて1.34倍を確保。
  const G=u*.15,baseSide=10*u+9*G;
  const side=baseSide*1.34;
  const ox=cx-side/2*0.94, oy=cy-side/2*1.06; // 画像内の重心が右下寄りなので微調整
  mk('image',{href:IMG_SEN,x:ox,y:oy,width:side,height:side,opacity:alpha,
    'preserveAspectRatio':'none'},parent);
  if(strokeColor && strokeColor!==SC){
    mk('rect',{x:ox+side*0.06,y:oy+side*0.1,width:side*0.6,height:side*0.6,
      fill:'none',stroke:strokeColor,'stroke-width':2,rx:3,opacity:alpha},parent);
  }
}

// ===== 一の位：個別ブロック =====
function drawIchi(parent,count,svgW,svgH,alpha,hColor){
  if(!count)return[];
  const u=U,gap=u*.18,S=u+gap,bGap=u*.7,BH=5*u+4*gap;
  const full=Math.floor(count/5),rem=count%5,nBlocks=full+(rem?1:0);
  const cols=nBlocks<=2?1:2,colPitch=u+10;
  const totW=cols*u+(cols-1)*(colPitch-u);
  const sx=svgW/2-totW/2+u/2;
  const pos=[];let drawn=0;
  for(let b=0;b<nBlocks&&drawn<count;b++){
    const col=b%cols,brow=Math.floor(b/cols);
    const inB=(b===nBlocks-1&&rem)?rem:5;
    const cx=sx+col*colPitch,botY=svgH-6;
    const blockBotY=botY-brow*(BH+bGap);
    for(let i=0;i<inB&&drawn<count;i++){
      const cy=blockBotY-i*S;
      mk('rect',{x:cx-u/2,y:cy-u/2,width:u,height:u,fill:FC,
        stroke:alpha<.5?'#aaa':SC,'stroke-width':1,rx:.6,opacity:alpha},parent);
      pos.push({cx,cy});drawn++;
    }
  }
  if(hColor){
    const xs=pos.map(p=>p.cx),ys=pos.map(p=>p.cy),m=5;
    mk('rect',{x:Math.min(...xs)-u/2-m,y:Math.min(...ys)-u/2-m,
      width:Math.max(...xs)-Math.min(...xs)+u+m*2,
      height:Math.max(...ys)-Math.min(...ys)+u+m*2,
      fill:'none',stroke:hColor,'stroke-width':2.5,'stroke-dasharray':'5,3',rx:4},parent);
  }
  return pos;
}

// ===== render系（SVGに静的描画）=====
// 棒(十の位)
function renderSticks(svgEl,count,alpha,hColor,strokeColor){
  svgEl.innerHTML='';if(!count)return[];
  const W=parseInt(svgEl.getAttribute('viewBox').split(' ')[2]),H=parseInt(svgEl.getAttribute('height'))||86;
  const stW=U+1,gap=5,centers=[];
  const totW=count*stW+(count-1)*gap;
  const sx=(W-totW)/2+stW/2;
  for(let i=0;i<count;i++){
    const g=mk('g',{},svgEl);
    drawStick(g,sx+i*(stW+gap),H/2,U,alpha??1,strokeColor||SC);
    centers.push({cx:sx+i*(stW+gap),cy:H/2});
  }
  if(hColor){
    const G=U*.15,TH=10*U+9*G,m=4;
    mk('rect',{x:(W-totW)/2-m,y:H/2-TH/2-m,width:totW+m*2,height:TH+m*2,
      fill:'none',stroke:hColor,'stroke-width':2.5,'stroke-dasharray':'5,3',rx:4},svgEl);
  }
  return centers;
}

// 百タイル
function renderHyakus(svgEl,count,alpha,hColor,strokeColor){
  svgEl.innerHTML='';if(!count)return[];
  const W=parseInt(svgEl.getAttribute('viewBox').split(' ')[2]),H=parseInt(svgEl.getAttribute('height'))||86;
  const u=U,G=u*.15,side=10*u+9*G;
  const sc=Math.min((W-8)/side,(H-8)/side);
  const su=u*sc,step=2.5,centers=[];
  for(let i=0;i<count;i++){
    const cx=W/2+(i-(count-1)/2)*step,cy=H/2-(i-(count-1)/2)*step;
    const g=mk('g',{},svgEl);
    drawHyakuScaled(g,cx,cy,su,alpha??1,strokeColor||SC);
    centers.push({cx,cy});
  }
  if(hColor){
    const side2=10*su+9*su*.15,m=4;
    mk('rect',{x:W/2-side2/2-m,y:H/2-side2/2-m,width:side2+m*2,height:side2+m*2,
      fill:'none',stroke:hColor,'stroke-width':2.5,'stroke-dasharray':'5,3',rx:4},svgEl);
  }
  return centers;
}

// 千タイル
function renderSens(svgEl,count,alpha,hColor,strokeColor){
  svgEl.innerHTML='';if(!count)return[];
  const W=parseInt(svgEl.getAttribute('viewBox').split(' ')[2]),H=parseInt(svgEl.getAttribute('height'))||86;
  const u=U,G=u*.15,W10=10*u+9*G,H10=10*u+9*G;
  const OX=u*.35,OY=u*.35;
  const totalW=W10+(count-1)*OX*9+(count-1)*6;// rough
  // スケールをセルに収める
  const needW=W10+(9)*OX,needH=H10+(9)*OY;
  const sc=Math.min((W-8)/needW,(H-8)/needH);
  const su=u*sc,centers=[];
  // 1枚ずつ横に並べる（最大は通常1枚）
  const step=su*0.25;
  for(let i=0;i<count;i++){
    const cx=W/2+(i-(count-1)/2)*(10*su+9*su*.15+4);
    const cy=H/2;
    const g=mk('g',{},svgEl);
    drawSenScaled(g,cx,cy,su,alpha??1,strokeColor||SC);
    centers.push({cx,cy});
  }
  return centers;
}

// 一の位
function renderIchi(svgEl,count,alpha,hColor){
  svgEl.innerHTML='';if(!count)return[];
  const W=parseInt(svgEl.getAttribute('viewBox').split(' ')[2]),H=parseInt(svgEl.getAttribute('height'))||86;
  return drawIchi(svgEl,count,W,H,alpha??1,hColor);
}

// ============================================================
// 筆算SVG描画（ひき算版）  viewBox="0 0 210 230"
// 位置: 千=35, 百=73, 十=111, 一=149
// ============================================================
const HSX=35,H2X=73,HJX=111,HIX=149;
const HBORROW_Y=26,HROW1_Y=70,HROW2_Y=110,HLINE_Y=128,HROW3_Y=166;

function drawHissan(svgEl,state){
  svgEl.innerHTML='';
  const S=state;

  function txt(content,x,y,fs,fw,color,cls){
    const t=mk('text',{x,y,'font-size':fs||34,'font-weight':fw||'bold',
      fill:color||'#222','text-anchor':'middle','font-family':'Noto Sans JP,sans-serif'},svgEl);
    t.textContent=content;
    if(cls)t.setAttribute('class',cls);
    return t;
  }
  function hl(x,y,w,h,color,a){
    mk('rect',{x,y,width:w,height:h,rx:5,fill:color,opacity:a||.18},svgEl);
  }

  // 横線
  if(S.showLine){
    const lx1=S.has3?54:92;
    mk('line',{x1:lx1,y1:HLINE_Y,x2:168,y2:HLINE_Y,stroke:'#333','stroke-width':2.5},svgEl);
  }
  // － 記号
  if(S.showMinus){
    const px=S.has3?50:70;
    txt('－',px,HROW2_Y+4,20,'bold','#e35d3a');
  }

  // ハイライト
  if(S.hlIchi){hl(HIX-18,HROW1_Y-32,38,38,'#fce4ec');hl(HIX-18,HROW2_Y-32,38,38,'#fce4ec');}
  if(S.hlJuu){hl(HJX-18,HROW1_Y-32,38,38,'#fff9cc');hl(HJX-18,HROW2_Y-32,38,38,'#fff9cc');}
  if(S.hlHyaku&&S.has3){hl(H2X-18,HROW1_Y-32,38,38,'#cce8f4');hl(H2X-18,HROW2_Y-32,38,38,'#cce8f4');}

  // 数字A行（ひかれる数）。くり下げ元の位は、借りた後は「斜線＋小さい数字」で上書き表示。
  if(S.showAH&&S.has3){
    if(S.borrowFromH){
      txt(S.aH,H2X,HROW1_Y,34,'bold','#bbb');
      mk('line',{x1:H2X-15,y1:HROW1_Y-22,x2:H2X+15,y2:HROW1_Y+8,stroke:'#e35d3a','stroke-width':2},svgEl);
      const ct=mk('text',{x:H2X+15,y:HROW1_Y-26,'font-size':17,'font-weight':'bold',fill:'#e35d3a','text-anchor':'middle','font-family':'Noto Sans JP,sans-serif'},svgEl);
      ct.textContent=S.hAfterBorrow;
      if(S.borrowHPop)ct.setAttribute('class','pop-in');
    } else {
      txt(S.aH,H2X,HROW1_Y,34,'bold','#222');
    }
  }
  if(S.showAJ){
    if(S.borrowFromJ){
      const baseVal = S.jDisplayOverride!==null ? S.jDisplayOverride : S.aJ;
      txt(baseVal,HJX,HROW1_Y,34,'bold','#bbb');
      mk('line',{x1:HJX-15,y1:HROW1_Y-22,x2:HJX+15,y2:HROW1_Y+8,stroke:'#e35d3a','stroke-width':2},svgEl);
      const ct=mk('text',{x:HJX+15,y:HROW1_Y-26,'font-size':17,'font-weight':'bold',fill:'#e35d3a','text-anchor':'middle','font-family':'Noto Sans JP,sans-serif'},svgEl);
      ct.textContent=S.jAfterBorrow;
      if(S.borrowJPop)ct.setAttribute('class','pop-in');
    } else if(S.jDisplayOverride!==null){
      // カスケード中間状態：十の位が0→9になった見た目（borrowFromHのときの小さい数字表示）
      txt(S.aJ,HJX,HROW1_Y,34,'bold','#bbb');
      mk('line',{x1:HJX-15,y1:HROW1_Y-22,x2:HJX+15,y2:HROW1_Y+8,stroke:'#e35d3a','stroke-width':2},svgEl);
      const ct=mk('text',{x:HJX+15,y:HROW1_Y-26,'font-size':17,'font-weight':'bold',fill:'#e35d3a','text-anchor':'middle','font-family':'Noto Sans JP,sans-serif'},svgEl);
      ct.textContent=S.jDisplayOverride;
    } else {
      txt(S.aJ,HJX,HROW1_Y,34,'bold','#222');
    }
  }
  if(S.showAI) txt(S.aI,HIX,HROW1_Y,34,'bold','#222');
  // ブリッジの「10」表示（一の位の上、くり下げてきた直後）
  if(S.showBridge10){
    const ct=mk('text',{x:HIX+18,y:HBORROW_Y,'font-size':17,'font-weight':'bold',fill:'#e35d3a','text-anchor':'middle','font-family':'Noto Sans JP,sans-serif'},svgEl);
    ct.textContent='10';
    if(S.bridge10Pop)ct.setAttribute('class','pop-in');
  }

  // 数字B行（ひく数）
  if(S.showBH&&S.has3) txt(S.bH,H2X,HROW2_Y,34,'bold','#222');
  if(S.showBJ) txt(S.bJ,HJX,HROW2_Y,34,'bold','#222');
  if(S.showBI) txt(S.bI,HIX,HROW2_Y,34,'bold','#222');

  // こたえ
  if(S.showAnsI) txt(S.iAns,HIX,HROW3_Y,34,'bold','#1a7f37');
  if(S.showAnsJ) txt(S.jAns,HJX,HROW3_Y,34,'bold','#1a7f37');
  if(S.showAnsH&&S.has3) txt(S.hAns,H2X,HROW3_Y,34,'bold','#1a7f37');

  // 完成枠
  if(S.ansBox){
    const bx=S.has3?54:92;
    mk('rect',{x:bx,y:HROW3_Y-34,width:168-bx+4,height:44,
      fill:'none',stroke:'#1a7f37','stroke-width':2.5,rx:6},svgEl);
  }
}

// ============================================================
// アニメーションエンジン
// ============================================================
let animId=null;
function cancelAnim(){if(animId){cancelAnimationFrame(animId);animId=null;}}
// SVG要素の現在のviewBox幅を取得（updateLayoutで動的変更されるため都度取得）
function vbW(id){
  const svg=document.getElementById(id);
  return parseFloat(svg.getAttribute('viewBox').split(' ')[2]);
}

function tween(ms,onFrame,onDone){
  const t0=performance.now();
  function loop(now){
    const t=Math.min((now-t0)/ms,1);
    onFrame(eio(t));
    if(t<1){animId=requestAnimationFrame(loop);}
    else{animId=null;if(onDone)onDone();}
  }
  animId=requestAnimationFrame(loop);
}

// SVG座標 → アニメレイヤー座標
function svgToLayer(svgEl,svgX,svgY){
  const tileRect=document.getElementById('tile-area').getBoundingClientRect();
  const svgRect=svgEl.getBoundingClientRect();
  const vbW=parseFloat(svgEl.getAttribute('viewBox').split(' ')[2]);
  const vbH=parseFloat(svgEl.getAttribute('viewBox').split(' ')[3]);
  return{
    x:(svgRect.left-tileRect.left)+svgX*(svgRect.width/vbW),
    y:(svgRect.top-tileRect.top)+svgY*(svgRect.height/vbH)
  };
}

// ヘッダー要素の中心座標（layer基準）
function hdrCenter(id){
  const el=document.getElementById(id);
  const tileRect=document.getElementById('tile-area').getBoundingClientRect();
  const r=el.getBoundingClientRect();
  return{x:r.left-tileRect.left+r.width/2, y:r.top-tileRect.top+r.height/2};
}

// ヘッダー要素の「真上」座標（ヘッダー上辺のすぐ外）
function aboveHdr(id){
  const el=document.getElementById(id);
  const tileRect=document.getElementById('tile-area').getBoundingClientRect();
  const r=el.getBoundingClientRect();
  return{x:r.left-tileRect.left+r.width/2, y:r.top-tileRect.top-18};
}

// ============================================================
// アプリ状態
// ============================================================
let numA=47,numB=18,stepIdx=0,steps=[],animBusy=false;
let calcMethod='bridge'; // 'bridge'(10からひく) or 'direct'(そのままひく)
function cloneState(s){return JSON.parse(JSON.stringify(s));}

// ============================================================
// ステップ定義
// ============================================================
function buildSteps(){
  const aH=Math.floor(numA/100),aJ=Math.floor((numA%100)/10),aI=numA%10;
  const bH=Math.floor(numB/100),bJ=Math.floor((numB%100)/10),bI=numB%10;
  const ans=numA-numB;

  // 桁の判定：ひき算では答えがひかれる数より大きくならないので、
  // 表示する桁数はひかれる数(A)の桁数で決まる。
  const has3=(aH>0);

  // ============================================================
  // 繰り下がり計算（カスケード対応）
  // 十の位が0などで「一の位への借用」のために、さらに百の位から
  // 十の位へ先に借りておく必要があるケース（例：305-148）に対応する。
  // ============================================================
  const needBorrowI = (aI < bI); // 一の位で繰り下がりが必要か

  // 一の位が十の位から1借りようとした時、十の位がもともと0なら、
  // 先に百の位から十の位へ1借りておく必要がある（カスケード）。
  const needCascadeForI = needBorrowI && has3 && (aJ===0);
  // カスケードした場合の「十の位の値（百から借りた直後、まだ一の位に貸す前）」
  // 例：305-148 → 十の位はもともと0。百から1借りて 0+10=10 になる。
  const jBeforeLendToI = needCascadeForI ? (aJ+10) : aJ;

  // 一の位へ1渡した後の十の位の値
  const jAfterBorrowI = jBeforeLendToI - (needBorrowI?1:0);
  const iAns = needBorrowI ? (aI+10-bI) : (aI-bI);

  // ---- 十の位 ----
  const needBorrowJ = has3 && (jAfterBorrowI < bJ);   // 十の位で繰り下がりが必要か(3桁のとき)
  const jAns = needBorrowJ ? (jAfterBorrowI+10-bJ) : (jAfterBorrowI-bJ);

  // ---- 百の位 ----
  // 百の位は、カスケードで十の位に貸した分(needCascadeForI)と、
  // 十の位の引き算で貸した分(needBorrowJ)の両方を考慮する。
  // ただしカスケードと十の位借用は同時には起こらない
  // （カスケードする時点でjBeforeLendToI=9になり、9から更に借りる(needBorrowJ)ことは無い設計のため）。
  const hAfterBorrowJ = has3 ? (aH - ((needCascadeForI||needBorrowJ)?1:0)) : 0;
  const hAns = has3 ? (hAfterBorrowJ - bH) : 0;

  const hBase={
    aH,aJ,aI,bH,bJ,bI,iAns,jAns,hAns,has3,
    showAH:false,showAJ:false,showAI:false,
    showBH:false,showBJ:false,showBI:false,
    showMinus:false,showLine:false,
    borrowFromH:false,borrowFromJ:false,
    hAfterBorrow:hAfterBorrowJ,jAfterBorrow:jAfterBorrowI,
    jBeforeLend:jBeforeLendToI,
    jDisplayOverride:null, // カスケードで十の位がまだ「中間値(9等)」のときに表示する値
    borrowHPop:false,borrowJPop:false,
    showBridge10:false,bridge10Pop:false,
    showAnsI:false,showAnsJ:false,showAnsH:false,
    hlIchi:false,hlJuu:false,hlHyaku:false,ansBox:false
  };

  const tBase={
    hyakuA:{count:0,alpha:1,hl:null}, juuA:{count:0,alpha:1,hl:null}, ichiA:{count:0,alpha:1,hl:null},
    hyakuB:{count:0,alpha:1,hl:null}, juuB:{count:0,alpha:1,hl:null}, ichiB:{count:0,alpha:1,hl:null},
    hyakuAns:{count:0,alpha:1,hl:null}, juuAns:{count:0,alpha:1,hl:null}, ichiAns:{count:0,alpha:1,hl:null},
    showAnsRow:false,
    // 対消滅エフェクト用：今まさに消えるペアの個数（A側・B側それぞれ何個が消滅対象か）
    annihilateIchi:0, annihilateJuu:0, annihilateHyaku:0
  };

  const list=[];
  function prev(){return list.length?cloneState(list[list.length-1]):{h:cloneState(hBase),t:cloneState(tBase),title:'',desc:'',anim:null};}

  // Step0: 空スタート
  {
    const p=prev();
    p.title='はじめましょう！';
    p.desc=`<span class="ac">${numA} － ${numB}</span> を ひっ算で けいさんします。<br>じゅんばんに すうじを かいていきましょう。`;
    list.push(p);
  }

  // 百の位A（3桁のとき）
  if(has3){
    const p=prev();
    p.title=`<span class="hc">${aH}</span> を書く（ひゃくのくらい）`;
    p.desc=`<span class="hc">ひゃくのくらい</span>の <span class="hc">${aH}</span> を書きます。<br>大きな正方形タイルが <span class="hc">${aH}まい</span> あります。`;
    p.h.showAH=true;
    p.t.hyakuA={count:aH,alpha:1,hl:'#2980b9'};
    p.anim='appear-hyaku-a';
    list.push(p);
  }

  // 十の位A
  {
    const p=prev();
    p.title=`<span class="jc">${aJ}</span> を書く（じゅうのくらい）`;
    p.desc=`<span class="jc">じゅうのくらい</span>の <span class="jc">${aJ}</span> を書きます。`;
    p.h.showAJ=true;
    p.t.hyakuA={count:aH,alpha:1,hl:null};
    p.t.juuA={count:aJ,alpha:1,hl:'#f39c12'};
    p.anim='appear-juu-a';
    list.push(p);
  }

  // 一の位A
  {
    const p=prev();
    p.title=`<span class="ic">${aI}</span> を書く（いちのくらい）`;
    p.desc=`<span class="ic">いちのくらい</span>の <span class="ic">${aI}</span> を書きます。`;
    p.h.showAI=true;
    p.t.juuA={count:aJ,alpha:1,hl:null};
    p.t.ichiA={count:aI,alpha:1,hl:'#e91e63'};
    p.anim='appear-ichi-a';
    list.push(p);
  }

  // － 記号
  {
    const p=prev();
    p.title='－ を書く';
    p.desc='ひき算の きごうを 書きます。';
    p.h.showMinus=true;
    p.t.ichiA={count:aI,alpha:1,hl:null};
    p.anim=null;
    list.push(p);
  }

  // 百の位B（3桁のとき）
  if(has3){
    const p=prev();
    p.title=`<span class="hc">${bH}</span> を書く（ひゃくのくらい）`;
    p.desc=`ひく数の <span class="hc">ひゃくのくらい</span> の <span class="hc">${bH}</span> を書きます。`;
    p.h.showBH=true;
    p.t.hyakuB={count:bH,alpha:1,hl:'#2980b9'};
    p.anim='appear-hyaku-b';
    list.push(p);
  }

  // 十の位B
  {
    const p=prev();
    p.title=`<span class="jc">${bJ}</span> を書く（じゅうのくらい）`;
    p.desc=`ひく数の <span class="jc">じゅうのくらい</span> の <span class="jc">${bJ}</span> を書きます。`;
    p.h.showBJ=true;
    p.t.hyakuB={count:bH,alpha:1,hl:null};
    p.t.juuB={count:bJ,alpha:1,hl:'#f39c12'};
    p.anim='appear-juu-b';
    list.push(p);
  }

  // 一の位B
  {
    const p=prev();
    p.title=`<span class="ic">${bI}</span> を書く（いちのくらい）`;
    p.desc=`ひく数の <span class="ic">いちのくらい</span> の <span class="ic">${bI}</span> を書きます。`;
    p.h.showBI=true;
    p.t.juuB={count:bJ,alpha:1,hl:null};
    p.t.ichiB={count:bI,alpha:1,hl:'#e91e63'};
    p.anim='appear-ichi-b';
    list.push(p);
  }

  // 横線
  {
    const p=prev();
    p.title='横線を引く';
    p.desc='<span class="rc">定規でまっすぐ 線を引きます。</span><br>この線の下に こたえを書きます。';
    p.h.showLine=true;
    p.t.ichiB={count:bI,alpha:1,hl:null};
    p.anim=null;
    list.push(p);
  }

  // ============================================================
  // 一の位の計算
  // ============================================================
  if(!needBorrowI){
    // 繰り下がり不要：そのまま対消滅
    const p=prev();
    p.title=`いちのくらいの けいさん：${aI}－${bI}＝${iAns}`;
    p.desc=`<span class="ic">いちのくらい</span>を けいさんします。<br>`
      +`<span class="ic">${aI} － ${bI} ＝ ${iAns}</span>`;
    p.h.hlIchi=true;p.h.showAnsI=true;
    p.t.ichiA={count:aI,alpha:1,hl:null};
    p.t.ichiB={count:bI,alpha:1,hl:null};
    p.t.ichiAns={count:iAns,alpha:1,hl:null};
    p.t.showAnsRow=true;
    p.t.annihilateIchi=bI;
    p.anim='annihilate-ichi';
    list.push(p);
  } else {
    // 繰り下がりが必要
    // ステップ1: 7から8はひけないと気づく
    {
      const p=prev();
      p.title=`${aI}から${bI}は ひけない…`;
      p.desc=`<span class="ic">いちのくらい</span>を 見てみましょう。<br>`
        +`<span class="ic">${aI}</span> から <span class="ic">${bI}</span> は ひけません。<br>`
        +`<span class="jc">じゅうのくらい</span>から <span class="cc">1</span> かり下げます。`;
      p.h.hlIchi=true;
      p.anim=null;
      list.push(p);
    }
    // カスケード：十の位がもともと0で貸せないので、先に百の位から十の位へ1借りる
    if(needCascadeForI){
      {
        const p=prev();
        p.title=`じゅうのくらいは ${aJ}… ひゃくのくらいから かり下げる`;
        p.desc=`<span class="jc">じゅうのくらい</span>は <span class="jc">${aJ}</span>なので、<br>`
          +`いちのくらいに かす ことが できません。<br>`
          +`さきに <span class="hc">ひゃくのくらい</span>から <span class="jc">じゅうのくらい</span>へ <span class="cc">1</span> かり下げます。`;
        p.h.borrowFromH=true;p.h.borrowHPop=true;p.h.hlHyaku=true;
        p.t.hyakuA={count:aH-1,alpha:1,hl:null};
        p.t.juuA={count:jBeforeLendToI,alpha:1,hl:'#e74c3c'};
        p.anim='borrow-h-to-j-cascade';
        list.push(p);
      }
      {
        const p=prev();
        p.title=`じゅうのくらいは ${jBeforeLendToI} に なった`;
        p.desc=`ひゃくのくらいから かり下げた <span class="cc">1まい</span>（10本ぶん）と、<br>`
          +`もとの <span class="jc">${aJ}本</span> を あわせて、<br>`
          +`じゅうのくらいは <span class="jc">${jBeforeLendToI}本</span> に なりました。`;
        p.h.borrowHPop=false;
        p.h.jDisplayOverride=jBeforeLendToI;
        p.t.juuA={count:jBeforeLendToI,alpha:1,hl:null};
        p.anim=null;
        list.push(p);
      }
    }
    // ステップ2: 十の位から1借りる（くり下げ線・上の小さい数字）
    {
      const p=prev();
      p.title=`じゅうのくらいから 1 かり下げる`;
      p.desc=`<span class="jc">じゅうのくらい</span>の <span class="jc">${jBeforeLendToI}</span>本 のうち、<br>`
        +`<span class="cc">1本</span> を いちのくらいに かり下げます。<br>`
        +`じゅうのくらいは のこり <span class="jc">${jAfterBorrowI}</span> になります。`;
      p.h.borrowFromJ=true;p.h.borrowJPop=true;p.h.hlJuu=true;
      p.anim='borrow-j-to-i';
      list.push(p);
    }
    // ステップ3: 借りた棒が10個に分解される（ブリッジの「10」表示）
    {
      const p=prev();
      p.title='かり下げた 1本が 10こに なる';
      p.desc=`かり下げた <span class="cc">1本</span>（10の たば）を、<br>`
        +`バラバラに して <span class="cc">10こ</span> にします。`;
      p.h.borrowJPop=false;
      p.h.showBridge10=true;p.h.bridge10Pop=true;
      p.anim='unbundle-10';
      list.push(p);
    }
    if(calcMethod==='bridge'){
      // ブリッジ方式：10-bIを先に計算
      {
        const p=prev();
        const tenMinusB=10-bI;
        p.title=`ブリッジ計算：10－${bI}＝${tenMinusB}`;
        p.desc=`<span class="rc">ブリッジ計算</span>を します。<br>`
          +`さきに <span class="cc">10 － ${bI} ＝ ${tenMinusB}</span> を けいさんします。`;
        p.h.bridge10Pop=false;
        p.h.hlIchi=true;
        p.t.ichiB={count:bI,alpha:1,hl:null};
        p.t.annihilateIchi=bI; // 10この方(borrowed)とbI個が対消滅
        p.anim='annihilate-bridge10';
        list.push(p);
      }
      // 残りに元の7を足す
      {
        const p=prev();
        const tenMinusB=10-bI;
        p.title=`のこり ${tenMinusB} に ${aI} を たす：${tenMinusB}＋${aI}＝${iAns}`;
        p.desc=`ブリッジ計算の のこり <span class="cc">${tenMinusB}</span> に、<br>`
          +`もともとあった <span class="ic">${aI}</span> を たします。<br>`
          +`<span class="ic">${tenMinusB} ＋ ${aI} ＝ ${iAns}</span>`;
        p.h.showAnsI=true;
        p.t.ichiAns={count:iAns,alpha:1,hl:null};
        p.t.showAnsRow=true;
        p.anim='bridge-add-remainder';
        list.push(p);
      }
    } else {
      // そのままひく方式：(10+aI) - bI をまとめて対消滅
      {
        const p=prev();
        const sum=10+aI;
        p.title=`じゅうのくらいの けいさん：${sum}－${bI}＝${iAns}`;
        p.desc=`かり下げた <span class="cc">10</span>こ と、もとの <span class="ic">${aI}</span>こ を あわせて<br>`
          +`<span class="ic">${sum}こ</span>。そこから <span class="ic">${bI}</span> を ひきます。<br>`
          +`<span class="ic">${sum} － ${bI} ＝ ${iAns}</span>`;
        p.h.bridge10Pop=false;
        p.h.hlIchi=true;
        p.t.ichiB={count:bI,alpha:1,hl:null};
        p.t.annihilateIchi=bI;
        p.anim='annihilate-direct10';
        list.push(p);
      }
      {
        const p=prev();
        p.title=`いちのくらいの こたえ：${iAns}`;
        p.desc=`いちのくらいの こたえは <span class="ic">${iAns}</span> です。`;
        p.h.showAnsI=true;
        p.t.ichiAns={count:iAns,alpha:1,hl:null};
        p.t.showAnsRow=true;
        p.anim=null;
        list.push(p);
      }
    }
  }

  // ============================================================
  // 十の位の計算
  // ============================================================
  if(!needBorrowJ){
    const p=prev();
    p.title=`じゅうのくらいの けいさん：${jAfterBorrowI}－${bJ}＝${jAns}`;
    p.desc=`<span class="jc">じゅうのくらい</span>を けいさんします。<br>`
      +(needBorrowI?`かり下げた あとの <span class="jc">${jAfterBorrowI}</span> から<br>`:'')
      +`<span class="jc">${jAfterBorrowI} － ${bJ} ＝ ${jAns}</span>`;
    p.h.hlIchi=false;p.h.hlJuu=true;p.h.showAnsJ=true;
    p.h.borrowJPop=false;
    p.t.juuA={count:jAfterBorrowI,alpha:1,hl:null};
    p.t.juuB={count:bJ,alpha:1,hl:null};
    p.t.juuAns={count:jAns,alpha:1,hl:null};
    p.t.annihilateJuu = has3 ? bJ : bJ; // 十の位の対消滅数
    p.anim='annihilate-juu';
    list.push(p);
  } else {
    // 十の位でも繰り下がりが必要（3桁のとき）
    {
      const p=prev();
      p.title=`${jAfterBorrowI}から${bJ}は ひけない…`;
      p.desc=`<span class="jc">じゅうのくらい</span>を 見てみましょう。<br>`
        +`<span class="jc">${jAfterBorrowI}</span> から <span class="jc">${bJ}</span> は ひけません。<br>`
        +`<span class="hc">ひゃくのくらい</span>から <span class="cc">1</span> かり下げます。`;
      p.h.hlIchi=false;p.h.hlJuu=true;
      p.anim=null;
      list.push(p);
    }
    {
      const p=prev();
      p.title=`ひゃくのくらいから 1 かり下げる`;
      p.desc=`<span class="hc">ひゃくのくらい</span>の <span class="hc">${aH}まい</span> のうち、<br>`
        +`<span class="cc">1まい</span> を じゅうのくらいに かり下げます。<br>`
        +`ひゃくのくらいは のこり <span class="hc">${hAfterBorrowJ}</span> になります。`;
      p.h.borrowFromH=true;p.h.borrowHPop=true;p.h.hlHyaku=true;
      p.anim='borrow-h-to-j';
      list.push(p);
    }
    {
      const p=prev();
      const sum=10+jAfterBorrowI;
      p.title=`じゅうのくらいの けいさん：${sum}－${bJ}＝${jAns}`;
      p.desc=`かり下げた 1まい（10本ぶん）と、もとの <span class="jc">${jAfterBorrowI}本</span> を あわせて<br>`
        +`<span class="jc">${sum}本</span>。そこから <span class="jc">${bJ}</span> を ひきます。<br>`
        +`<span class="jc">${sum} － ${bJ} ＝ ${jAns}</span>`;
      p.h.borrowHPop=false;
      p.h.hlHyaku=false;p.h.hlJuu=true;p.h.showAnsJ=true;
      p.t.juuB={count:bJ,alpha:1,hl:null};
      p.t.annihilateJuu=bJ;
      p.anim='annihilate-juu-borrowed';
      list.push(p);
    }
  }

  // ============================================================
  // 百の位の計算（3桁のとき）
  // ============================================================
  if(has3){
    const p=prev();
    p.title=`ひゃくのくらいの けいさん：${hAfterBorrowJ}－${bH}＝${hAns}`;
    p.desc=`<span class="hc">ひゃくのくらい</span>を けいさんします。<br>`
      +(needBorrowJ?`かり下げた あとの <span class="hc">${hAfterBorrowJ}</span> から<br>`:'')
      +`<span class="hc">${hAfterBorrowJ} － ${bH} ＝ ${hAns}</span>`;
    p.h.hlJuu=false;p.h.hlHyaku=true;p.h.showAnsH=true;
    p.t.hyakuA={count:hAfterBorrowJ,alpha:1,hl:null};
    p.t.hyakuB={count:bH,alpha:1,hl:null};
    p.t.hyakuAns={count:hAns,alpha:1,hl:null};
    p.t.annihilateHyaku=bH;
    p.anim='annihilate-hyaku';
    list.push(p);
  }

  // 最終
  {
    const p=prev();
    p.title=`こたえは ${ans} です！`;
    const parts=[];
    if(has3) parts.push(`<span class="hc">ひゃくのくらい ${hAns}</span>`);
    parts.push(`<span class="jc">じゅうのくらい ${jAns}</span>`);
    parts.push(`<span class="ic">いちのくらい ${iAns}</span>`);
    p.desc=parts.join('、')+`<br><span class="ac">${numA} － ${numB} ＝ ${ans}</span>`;
    p.h.hlJuu=false;p.h.hlHyaku=false;p.h.ansBox=true;
    p.t.annihilateIchi=0;p.t.annihilateJuu=0;p.t.annihilateHyaku=0;
    p.anim=null;
    list.push(p);
  }

  return list;
}

// ============================================================
// タイル描画
// ============================================================
function paintTiles(ts){
  renderHyakus(document.getElementById('svg-hyaku-a'), ts.hyakuA.count,ts.hyakuA.alpha,ts.hyakuA.hl);
  renderSticks(document.getElementById('svg-juu-a'),   ts.juuA.count,  ts.juuA.alpha,  ts.juuA.hl);
  renderIchi  (document.getElementById('svg-ichi-a'),  ts.ichiA.count, ts.ichiA.alpha, ts.ichiA.hl);
  renderHyakus(document.getElementById('svg-hyaku-b'), ts.hyakuB.count,ts.hyakuB.alpha,ts.hyakuB.hl);
  renderSticks(document.getElementById('svg-juu-b'),   ts.juuB.count,  ts.juuB.alpha,  ts.juuB.hl);
  renderIchi  (document.getElementById('svg-ichi-b'),  ts.ichiB.count, ts.ichiB.alpha, ts.ichiB.hl);

  const rowAns=document.getElementById('row-ans');
  if(ts.showAnsRow){
    rowAns.style.display='table-row';
    renderHyakus(document.getElementById('svg-hyaku-ans'), ts.hyakuAns.count,ts.hyakuAns.alpha,ts.hyakuAns.hl);
    renderSticks(document.getElementById('svg-juu-ans'),   ts.juuAns.count,  ts.juuAns.alpha,  ts.juuAns.hl);
    renderIchi  (document.getElementById('svg-ichi-ans'),  ts.ichiAns.count, ts.ichiAns.alpha, ts.ichiAns.hl);
  } else {
    rowAns.style.display='none';
  }

  // is-empty: 答え行のそのセルにタイルがまだ無いときだけ斜線予告枠を表示
  document.getElementById('col-hyaku-ans').classList.toggle('is-empty', !ts.hyakuAns.count);
}

// ============================================================
// アニメーション本体
// ============================================================
function runAnim(animType,prevState,nextState,onDone){
  const layer=document.getElementById('anim-layer');
  layer.innerHTML='';
  if(!animType){onDone();return;}

  const aH=Math.floor(numA/100),aJ=Math.floor((numA%100)/10),aI=numA%10;
  const bH=Math.floor(numB/100),bJ=Math.floor((numB%100)/10),bI=numB%10;
  const has3=(aH>0);
  const needBorrowI=(aI<bI);
  const needCascadeForI = needBorrowI && has3 && (aJ===0);
  const jBeforeLendToI = needCascadeForI ? (aJ+10) : aJ;
  const jAfterBorrowI=jBeforeLendToI-(needBorrowI?1:0);
  const iAns=needBorrowI?(aI+10-bI):(aI-bI);
  const needBorrowJ=has3&&(jAfterBorrowI<bJ);
  const jAns=needBorrowJ?(jAfterBorrowI+10-bJ):(jAfterBorrowI-bJ);
  const hAfterBorrowJ=has3?(aH-((needCascadeForI||needBorrowJ)?1:0)):0;
  const hAns=has3?(hAfterBorrowJ-bH):0;

  // 百タイル描画スケール（hyakuセル用：動的に広がった幅に対応）
  const HW=vbW('svg-hyaku-a'),HH_SVG=86;
  const u=U,G=u*.15,side=10*u+9*G;
  const su=u*Math.min((HW-8)/side,(HH_SVG-8)/side);

  // --- appear-hyaku-a / b ---
  if(animType==='appear-hyaku-a'||animType==='appear-hyaku-b'){
    const id=animType==='appear-hyaku-a'?'svg-hyaku-a':'svg-hyaku-b';
    const count=animType==='appear-hyaku-a'?aH:bH;
    const svgEl=document.getElementById(id);
    svgEl.innerHTML='';
    const W=vbW(id),H=86,step=2.5;let si=0;
    (function next(){
      if(si>=count){onDone();return;}
      const cx=W/2+(si-(count-1)/2)*step,cy=H/2;
      const g=mk('g',{opacity:0},svgEl);
      drawHyakuScaled(g,cx,cy,su,1,SC);
      tween(280,t=>g.setAttribute('opacity',t),()=>{si++;next();});
    })();
    return;
  }

  // --- appear-juu-a / b ---
  if(animType==='appear-juu-a'||animType==='appear-juu-b'){
    const id=animType==='appear-juu-a'?'svg-juu-a':'svg-juu-b';
    const count=animType==='appear-juu-a'?aJ:bJ;
    const svgEl=document.getElementById(id);
    svgEl.innerHTML='';
    const W=vbW(id),H=86,stW=U+1,gap=5;
    const totW=count*stW+(count-1)*gap,sx=(W-totW)/2+stW/2;
    let si=0;
    (function next(){
      if(si>=count){onDone();return;}
      const cx=sx+si*(stW+gap),cy=H/2;
      const g=mk('g',{opacity:0},svgEl);
      drawStick(g,cx,cy,U,1);
      tween(200,t=>g.setAttribute('opacity',t),()=>{si++;next();});
    })();
    return;
  }

  // --- appear-ichi-a / b ---
  if(animType==='appear-ichi-a'||animType==='appear-ichi-b'){
    const id=animType==='appear-ichi-a'?'svg-ichi-a':'svg-ichi-b';
    const count=animType==='appear-ichi-a'?aI:bI;
    const svgEl=document.getElementById(id);
    svgEl.innerHTML='';
    const W=110,H=86;
    const tmp=mk('svg',{width:0,height:0,style:'position:absolute;visibility:hidden'});
    document.body.appendChild(tmp);
    const pos=drawIchi(tmp,count,W,H,1,null);
    document.body.removeChild(tmp);
    let ii=0;
    (function next(){
      if(ii>=pos.length){onDone();return;}
      const{cx,cy}=pos[ii];
      const r=mk('rect',{x:cx-U/2,y:cy-U/2,width:U,height:U,fill:FC,stroke:SC,'stroke-width':1,rx:.6,opacity:0},svgEl);
      tween(140,t=>r.setAttribute('opacity',t),()=>{ii++;next();});
    })();
    return;
  }

  // ============================================================
  // 対消滅アニメーション（共通エンジン）
  // svgA: A側(被減数)のSVG要素, svgB: B側(減数)のSVG要素
  // countA: A側に現在ある個数, countB: 消す個数(=B側の個数)
  // drawFn: 1個を描く関数 drawFn(parent,cx,cy,scale,color)
  // getPositions: SVG内でのN個の中心座標配列を返す関数 (svgEl,count)=>[{cx,cy},...]
  // onAllDone: 全消滅完了後、残ったA側の個数を答え欄に描く処理
  // ============================================================
  function runAnnihilation(opts){
    const {svgA, svgB, countA, countB, getPositions, drawUnit, unitSize, onAllDone} = opts;
    // A側・B側それぞれの「消える対象」の座標を取得（末尾countB個を対象とする）
    const allPosA = getPositions(svgA, countA);
    const allPosB = getPositions(svgB, countB);
    const targetA = allPosA.slice(Math.max(0,countA-countB)); // A側の後ろからcountB個
    const remainA = countA - countB;

    const lA = targetA.map(p=>svgToLayer(svgA,p.cx,p.cy));
    const lB = allPosB.map(p=>svgToLayer(svgB,p.cx,p.cy));

    // A側・B側のオリジナル要素は薄くする（これから対消滅させる対象を強調するため）。
    // 対消滅させる分(targetA/lB)は別途layer上に濃い色で重ねて描き直すので、
    // 元のSVGはここで薄く描いておく。
    svgA.innerHTML=''; drawUnit==='ichi' ? renderIchi(svgA,countA,.3,null) : (drawUnit==='juu'?renderSticks(svgA,countA,.3,null):renderHyakus(svgA,countA,.3,null));
    svgB.innerHTML=''; drawUnit==='ichi' ? renderIchi(svgB,countB,.3,null) : (drawUnit==='juu'?renderSticks(svgB,countB,.3,null):renderHyakus(svgB,countB,.3,null));

    layer.innerHTML='';
    const n=Math.min(lA.length,lB.length);
    if(n===0){ if(onAllDone) onAllDone(); onDone(); return; }

    // 消える対象のタイルを、最初から濃い色でlayer上に描いておく（薄いA/Bと視覚的に区別する）
    const preGlowA=[], preGlowB=[];
    lA.forEach(p=>{
      const g=mk('g',{},layer);
      drawUnit==='ichi' ? mk('rect',{x:p.x-unitSize/2,y:p.y-unitSize/2,width:unitSize,height:unitSize,fill:FC,stroke:SC,'stroke-width':1,rx:.6},g)
        : drawUnit==='juu' ? drawStick(g,p.x,p.y,U,1,SC)
        : drawHyakuScaled(g,p.x,p.y,su,1,SC);
      preGlowA.push(g);
    });
    lB.forEach(p=>{
      const g=mk('g',{},layer);
      drawUnit==='ichi' ? mk('rect',{x:p.x-unitSize/2,y:p.y-unitSize/2,width:unitSize,height:unitSize,fill:FC,stroke:SC,'stroke-width':1,rx:.6},g)
        : drawUnit==='juu' ? drawStick(g,p.x,p.y,U,1,SC)
        : drawHyakuScaled(g,p.x,p.y,su,1,SC);
      preGlowB.push(g);
    });

    // 各ペアに「下から上に伸びる線」を描く
    const lines=[];
    for(let i=0;i<n;i++){
      const a=lA[i], b=lB[i];
      // 線はB(下にあるもの)からA(上にあるもの)へ伸びるイメージ。
      // どちらが上かはレイアウト依存だが、ここではB→Aの方向に伸ばす。
      const line=mk('line',{x1:b.x,y1:b.y,x2:b.x,y2:b.y,stroke:'#ff7043','stroke-width':2.5,'stroke-linecap':'round'},layer);
      lines.push({line,a,b});
    }

    // フェーズ1: 線が伸びる（下から上へ）
    tween(400, t=>{
      lines.forEach(({line,a,b})=>{
        const cx=b.x+(a.x-b.x)*t;
        const cy=b.y+(a.y-b.y)*t;
        line.setAttribute('x2',cx); line.setAttribute('y2',cy);
      });
    }, ()=>{
      // フェーズ2: つながった瞬間グロウ（先に描いたpreGlowA/Bをそのままグロウさせる）
      preGlowA.forEach(g=>g.setAttribute('class','glow-pop'));
      preGlowB.forEach(g=>g.setAttribute('class','glow-pop'));
      const glowEls=[];
      lines.forEach((_,i)=>{
        glowEls.push(preGlowA[i],preGlowB[i]);
      });
      setTimeout(()=>{
        // フェーズ3: ペアごと右上へ移動しながらフェードアウト（線も含む）
        const tileRect=document.getElementById('tile-area').getBoundingClientRect();
        const destX=tileRect.width+40, destY=-40;
        tween(550, t=>{
          lines.forEach(({line,a,b},i)=>{
            const dxA=(destX-a.x)*t, dyA=(destY-a.y)*t*0.3;
            const dxB=(destX-b.x)*t, dyB=(destY-b.y)*t*0.3;
            glowEls[i*2].setAttribute('transform',`translate(${dxA},${dyA})`);
            glowEls[i*2].setAttribute('opacity',1-t);
            glowEls[i*2+1].setAttribute('transform',`translate(${dxB},${dyB})`);
            glowEls[i*2+1].setAttribute('opacity',1-t);
            line.setAttribute('opacity',1-t);
            line.setAttribute('x1',b.x+dxB); line.setAttribute('y1',b.y+dyB);
            line.setAttribute('x2',a.x+dxA); line.setAttribute('y2',a.y+dyA);
          });
        }, ()=>{
          layer.innerHTML='';
          // フェーズ4: 残ったA側のタイルが結果欄へ移動
          const remainPos = allPosA.slice(0, remainA);
          if(remainPos.length===0){
            svgA.innerHTML='';
            if(onAllDone) onAllDone();
            onDone();
            return;
          }
          const lRemain = remainPos.map(p=>svgToLayer(svgA,p.cx,p.cy));
          svgA.innerHTML='';
          const ansEl = opts.svgAns;
          const ansPositions = getPositions(ansEl, remainA);
          const lDest = ansPositions.map(p=>svgToLayer(ansEl,p.cx,p.cy));
          document.getElementById('row-ans').style.display='table-row';
          ansEl.innerHTML='';
          const gs=lRemain.map(p=>{
            const g=mk('g',{},layer);
            drawUnit==='ichi' ? mk('rect',{x:p.x-unitSize/2,y:p.y-unitSize/2,width:unitSize,height:unitSize,fill:FC,stroke:SC,'stroke-width':1,rx:.6},g)
              : drawUnit==='juu' ? drawStick(g,p.x,p.y,U,1,SC)
              : drawHyakuScaled(g,p.x,p.y,su,1,SC);
            return g;
          });
          tween(500, t=>{
            gs.forEach((g,i)=>{
              const dest=lDest[i]||lDest[lDest.length-1];
              const tx=lRemain[i].x+(dest.x-lRemain[i].x)*t;
              const ty=lRemain[i].y+(dest.y-lRemain[i].y)*t;
              g.setAttribute('transform',`translate(${tx-lRemain[i].x},${ty-lRemain[i].y})`);
            });
          }, ()=>{
            layer.innerHTML='';
            drawUnit==='ichi' ? renderIchi(ansEl,remainA,1,null)
              : drawUnit==='juu' ? renderSticks(ansEl,remainA,1,null)
              : renderHyakus(ansEl,remainA,1,null);
            if(onAllDone) onAllDone();
            onDone();
          });
        });
      }, 350); // グロウを少し見せてから移動開始
    });
  }

  // --- annihilate-ichi: 繰り下がり不要の一の位の対消滅 ---
  if(animType==='annihilate-ichi'){
    runAnnihilation({
      svgA: document.getElementById('svg-ichi-a'),
      svgB: document.getElementById('svg-ichi-b'),
      svgAns: document.getElementById('svg-ichi-ans'),
      countA: aI, countB: bI,
      drawUnit:'ichi', unitSize:U,
      getPositions:(svgEl,count)=>{
        const W=110,H=svgEl===document.getElementById('svg-ichi-ans')?94:86;
        const tmp=mk('svg',{width:0,height:0});
        return drawIchi(tmp,count,W,H,1,null);
      }
    });
    return;
  }

  // --- borrow-j-to-i: 十の位から一の位へ棒1本をくり下げる ---
  if(animType==='borrow-j-to-i'){
    const svgJA=document.getElementById('svg-juu-a');
    const W=vbW('svg-juu-a'),H=86,stW=U+1,gap=5;
    const baseCount=jBeforeLendToI; // カスケード済みなら9等、通常はaJそのもの
    const totW=baseCount*stW+(baseCount-1)*gap, sx=(W-totW)/2+stW/2;
    // 最後の1本（一番右）を借りる対象とする
    const srcLocal={cx:sx+(baseCount-1)*(stW+gap), cy:H/2};
    const src=svgToLayer(svgJA,srcLocal.cx,srcLocal.cy);
    // 移動先：一の位の上(ヘッダーの下、一の位エリアの上端あたり)
    const svgIA=document.getElementById('svg-ichi-a');
    const destRect=svgIA.getBoundingClientRect();
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const dest={x:destRect.left-tileRect.left+destRect.width/2, y:destRect.top-tileRect.top-10};

    renderSticks(svgJA,baseCount-1,1,null); // 残りの本数だけ先に薄く描いておく(借りた1本は別途layerで動かす)
    const g=mk('g',{},layer);
    drawStick(g,src.x,src.y,U,1,'#e74c3c');
    tween(500,t=>{
      const tx=src.x+(dest.x-src.x)*t, ty=src.y+(dest.y-src.y)*t;
      g.setAttribute('transform',`translate(${tx-src.x},${ty-src.y})`);
    },()=>{
      layer.innerHTML='';
      // ヘッダー下に半透明で残す（次のunbundle-10で使う）
      const g2=mk('g',{opacity:.4},layer);
      drawStick(g2,dest.x,dest.y,U,1,'#e74c3c');
      onDone();
    });
    return;
  }

  // --- borrow-h-to-j-cascade: 百の位タイル1枚が十の位へ降りて10本の棒に展開される（十の位が0の時のカスケード借用）---
  if(animType==='borrow-h-to-j-cascade'){
    const svgHA=document.getElementById('svg-hyaku-a');
    const W=vbW('svg-hyaku-a'),H=86,step=2.5;
    const srcLocal={cx:W/2+((aH-1)-(aH-1)/2)*step, cy:H/2};
    const src=svgToLayer(svgHA,srcLocal.cx,srcLocal.cy);
    const svgJA=document.getElementById('svg-juu-a');
    const destRect=svgJA.getBoundingClientRect();
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const dest={x:destRect.left-tileRect.left+destRect.width/2, y:destRect.top-tileRect.top+H/2};

    renderHyakus(svgHA,aH-1,1,null);
    svgJA.innerHTML=''; // 十の位はもともと0本なので空のまま
    const g=mk('g',{},layer);
    drawHyakuScaled(g,src.x,src.y,su,1,'#e74c3c');
    tween(500,t=>{
      const tx=src.x+(dest.x-src.x)*t, ty=src.y+(dest.y-src.y)*t;
      const sc=1-t*0.3;
      g.setAttribute('transform',`translate(${tx-src.x},${ty-src.y})`);
    },()=>{
      layer.innerHTML='';
      // 十の位のA行に、借りてきた分の棒(jBeforeLendToI本)を展開して表示する
      renderSticks(svgJA,jBeforeLendToI,1,'#e74c3c');
      onDone();
    });
    return;
  }

  // --- borrow-h-to-j: 百の位から十の位へタイル1枚をくり下げる ---
  if(animType==='borrow-h-to-j'){
    const svgHA=document.getElementById('svg-hyaku-a');
    const W=vbW('svg-hyaku-a'),H=86,step=2.5;
    const srcLocal={cx:W/2+((aH-1)-(aH-1)/2)*step, cy:H/2};
    const src=svgToLayer(svgHA,srcLocal.cx,srcLocal.cy);
    const svgJA=document.getElementById('svg-juu-a');
    const destRect=svgJA.getBoundingClientRect();
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const dest={x:destRect.left-tileRect.left+destRect.width/2, y:destRect.top-tileRect.top-10};

    renderHyakus(svgHA,aH-1,1,null);
    const g=mk('g',{},layer);
    drawHyakuScaled(g,src.x,src.y,su,1,'#e74c3c');
    tween(500,t=>{
      const tx=src.x+(dest.x-src.x)*t, ty=src.y+(dest.y-src.y)*t;
      const sc=1-t*0.3;
      g.setAttribute('transform',`translate(${tx-src.x},${ty-src.y})`);
    },()=>{
      layer.innerHTML='';
      const g2=mk('g',{opacity:.4},layer);
      drawHyakuScaled(g2,dest.x,dest.y,su,1,'#e74c3c');
      onDone();
    });
    return;
  }

  // --- unbundle-10: くり下げた1本(または1枚)が10個に分解される ---
  if(animType==='unbundle-10'){
    // layer上の半透明グレーの棒(borrow-j-to-iで残したもの)を、一の位エリアに10個のブロックとして展開する
    layer.innerHTML='';
    const svgIA=document.getElementById('svg-ichi-a');
    const W=110,H=86;
    renderIchi(svgIA,aI,1,null); // 元の一の位はそのまま
    // 10個を一の位の上(ヘッダー直下)に小さく展開して表示（borrowed-10として別領域に置く）
    const destRect=svgIA.getBoundingClientRect();
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const cx=destRect.left-tileRect.left+destRect.width/2;
    const cy=destRect.top-tileRect.top-10;
    const g=mk('g',{opacity:0},layer);
    // 10個を横一列に小さく並べる
    const sz=U*0.85, gap2=2;
    const totW=10*sz+9*gap2;
    const sx=cx-totW/2+sz/2;
    for(let i=0;i<10;i++){
      mk('rect',{x:sx+i*(sz+gap2)-sz/2,y:cy-sz/2,width:sz,height:sz,fill:FC,stroke:SC,'stroke-width':1,rx:.5},g);
    }
    tween(350,t=>g.setAttribute('opacity',t),()=>{ onDone(); });
    return;
  }

  // --- annihilate-bridge10 / annihilate-direct10: 借りてきた10個とBの一の位を対消滅 ---
  if(animType==='annihilate-bridge10'||animType==='annihilate-direct10'){
    const svgIA=document.getElementById('svg-ichi-a');
    const svgIB=document.getElementById('svg-ichi-b');
    const svgIAns=document.getElementById('svg-ichi-ans');
    const W=110,H=86;
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const aRect=svgIA.getBoundingClientRect();
    const cx=aRect.left-tileRect.left+aRect.width/2;
    const cyTop=aRect.top-tileRect.top-10;
    // 借りてきた10個の座標（unbundle-10で表示した位置と同じ計算）
    const sz=U*0.85, gap2=2;
    const totW=10*sz+9*gap2;
    const sx=cx-totW/2+sz/2;
    const pos10=Array.from({length:10},(_,i)=>({x:sx+i*(sz+gap2),y:cyTop}));

    // Bのアニメ用座標
    const posB=drawIchi(mk('svg',{width:0,height:0}),bI,W,H,1,null).map(p=>svgToLayer(svgIB,p.cx,p.cy));

    renderIchi(svgIB,bI,1,null);
    layer.innerHTML='';
    const n=Math.min(10,posB.length);
    const lines=[];
    for(let i=0;i<n;i++){
      const a=pos10[i], b=posB[i];
      const line=mk('line',{x1:b.x,y1:b.y,x2:b.x,y2:b.y,stroke:'#ff7043','stroke-width':2.5,'stroke-linecap':'round'},layer);
      lines.push({line,a,b});
    }
    // 借りてきた10個を描画
    const tenGroup=mk('g',{},layer);
    pos10.forEach(p=>mk('rect',{x:p.x-sz/2,y:p.y-sz/2,width:sz,height:sz,fill:FC,stroke:SC,'stroke-width':1,rx:.5},tenGroup));

    tween(400,t=>{
      lines.forEach(({line,a,b})=>{
        const cx2=b.x+(a.x-b.x)*t, cy2=b.y+(a.y-b.y)*t;
        line.setAttribute('x2',cx2); line.setAttribute('y2',cy2);
      });
    },()=>{
      const glowEls=[];
      lines.forEach(({a,b})=>{
        const ga=mk('g',{class:'glow-pop'},layer);
        mk('rect',{x:a.x-sz/2,y:a.y-sz/2,width:sz,height:sz,fill:FC,stroke:SC,'stroke-width':1,rx:.5},ga);
        const gb=mk('g',{class:'glow-pop'},layer);
        mk('rect',{x:b.x-U/2,y:b.y-U/2,width:U,height:U,fill:FC,stroke:SC,'stroke-width':1,rx:.6},gb);
        glowEls.push(ga,gb);
      });
      setTimeout(()=>{
        const remainTen=10-n; // ブリッジ計算の残り(10-bI)
        tween(550,t=>{
          const destX=tileRect.width+40, destY=-40;
          lines.forEach(({line,a,b},i)=>{
            const dxA=(destX-a.x)*t, dyA=(destY-a.y)*t*0.3;
            const dxB=(destX-b.x)*t, dyB=(destY-b.y)*t*0.3;
            glowEls[i*2].setAttribute('transform',`translate(${dxA},${dyA})`);
            glowEls[i*2].setAttribute('opacity',1-t);
            glowEls[i*2+1].setAttribute('transform',`translate(${dxB},${dyB})`);
            glowEls[i*2+1].setAttribute('opacity',1-t);
            line.setAttribute('opacity',1-t);
          });
        },()=>{
          layer.innerHTML='';
          svgIB.innerHTML='';
          // 残った(10-bI)個を、借りてきた場所にそのまま小さく残す
          const remainGroup=mk('g',{},layer);
          for(let i=0;i<remainTen;i++){
            mk('rect',{x:pos10[i].x-sz/2,y:pos10[i].y-sz/2,width:sz,height:sz,fill:FC,stroke:SC,'stroke-width':1,rx:.5},remainGroup);
          }
          onDone();
        });
      },350);
    });
    return;
  }

  // --- bridge-add-remainder: ブリッジ計算の残りに元のAの一の位を足す ---
  if(animType==='bridge-add-remainder'){
    const tenMinusB=10-bI;
    const svgIA=document.getElementById('svg-ichi-a');
    const svgIAns=document.getElementById('svg-ichi-ans');
    const W=110,H=86,HA=94;
    const aRect=svgIA.getBoundingClientRect();
    const tileRect=document.getElementById('tile-area').getBoundingClientRect();
    const cx=aRect.left-tileRect.left+aRect.width/2;
    const cyTop=aRect.top-tileRect.top-10;
    const sz=U*0.85, gap2=2;
    const totW=10*sz+9*gap2;
    const sx=cx-totW/2+sz/2;
    const posRemain=Array.from({length:tenMinusB},(_,i)=>({x:sx+i*(sz+gap2),y:cyTop}));

    // 元のAの一の位(aI個)の座標
    const posA=drawIchi(mk('svg',{width:0,height:0}),aI,W,H,1,null).map(p=>svgToLayer(svgIA,p.cx,p.cy));

    // 答え欄の目標座標
    const posAns=drawIchi(mk('svg',{width:0,height:0}),iAns,W,HA,1,null);
    const lDestAll=posAns.map(p=>svgToLayer(svgIAns,p.cx,p.cy));

    layer.innerHTML='';
    document.getElementById('row-ans').style.display='table-row';
    svgIAns.innerHTML='';
    svgIA.innerHTML='';

    const remainGroup=posRemain.map(p=>{const g=mk('g',{},layer);mk('rect',{x:p.x-sz/2,y:p.y-sz/2,width:sz,height:sz,fill:FC,stroke:SC,'stroke-width':1,rx:.5},g);return g;});
    const aGroup=posA.map(p=>{const g=mk('g',{},layer);mk('rect',{x:p.x-U/2,y:p.y-U/2,width:U,height:U,fill:FC,stroke:SC,'stroke-width':1,rx:.6},g);return g;});

    const allSrc=[...posRemain,...posA];
    const allG=[...remainGroup,...aGroup];

    tween(550,t=>{
      allG.forEach((g,i)=>{
        const dest=lDestAll[i]||lDestAll[lDestAll.length-1];
        const tx=allSrc[i].x+(dest.x-allSrc[i].x)*t;
        const ty=allSrc[i].y+(dest.y-allSrc[i].y)*t;
        g.setAttribute('transform',`translate(${tx-allSrc[i].x},${ty-allSrc[i].y})`);
      });
    },()=>{
      layer.innerHTML='';
      renderIchi(svgIAns,iAns,1,null);
      onDone();
    });
    return;
  }

  // --- annihilate-juu: 繰り下がり不要の十の位の対消滅 ---
  if(animType==='annihilate-juu'){
    runAnnihilation({
      svgA: document.getElementById('svg-juu-a'),
      svgB: document.getElementById('svg-juu-b'),
      svgAns: document.getElementById('svg-juu-ans'),
      countA: jAfterBorrowI, countB: bJ,
      drawUnit:'juu', unitSize:U,
      getPositions:(svgEl,count)=>{
        if(!count) return [];
        const W=vbW('svg-juu-a'),H=svgEl===document.getElementById('svg-juu-ans')?94:86;
        const stW=U+1,gap=5;
        const totW=count*stW+(count-1)*gap, sx=(W-totW)/2+stW/2;
        return Array.from({length:count},(_,i)=>({cx:sx+i*(stW+gap),cy:H/2}));
      }
    });
    return;
  }

  // --- annihilate-juu-borrowed: 十の位でくり下げた後の対消滅 ---
  if(animType==='annihilate-juu-borrowed'){
    const sum=10+jAfterBorrowI;
    runAnnihilation({
      svgA: document.getElementById('svg-juu-a'),
      svgB: document.getElementById('svg-juu-b'),
      svgAns: document.getElementById('svg-juu-ans'),
      countA: sum, countB: bJ,
      drawUnit:'juu', unitSize:U,
      getPositions:(svgEl,count)=>{
        if(!count) return [];
        const W=vbW('svg-juu-a'),H=svgEl===document.getElementById('svg-juu-ans')?94:86;
        const stW=U+1,gap=5;
        const totW=Math.min(count,19)*stW+(Math.min(count,19)-1)*gap, sx=(W-totW)/2+stW/2;
        return Array.from({length:count},(_,i)=>({cx:sx+Math.min(i,18)*(stW+gap),cy:H/2}));
      }
    });
    return;
  }

  // --- annihilate-hyaku: 百の位の対消滅 ---
  if(animType==='annihilate-hyaku'){
    runAnnihilation({
      svgA: document.getElementById('svg-hyaku-a'),
      svgB: document.getElementById('svg-hyaku-b'),
      svgAns: document.getElementById('svg-hyaku-ans'),
      countA: hAfterBorrowJ, countB: bH,
      drawUnit:'hyaku', unitSize:su,
      getPositions:(svgEl,count)=>{
        if(!count) return [];
        const W=vbW('svg-hyaku-a'),H=svgEl===document.getElementById('svg-hyaku-ans')?94:86,step=2.5;
        return Array.from({length:count},(_,i)=>({cx:W/2+(i-(count-1)/2)*step,cy:H/2}));
      }
    });
    return;
  }

  layer.innerHTML='';
  onDone();
}

// 千タイルスケール計算
function getSenScale(){
  const W=110,H=86,u=U,G=u*.15,W10=10*u+9*G,H10=10*u+9*G,OX=u*.35,OY=u*.35;
  const needW=W10+9*OX,needH=H10+9*OY;
  return u*Math.min((W-6)/needW,(H-6)/needH);
}

// ============================================================
// レイアウト更新（列の表示/非表示・幅の動的拡張・is-empty制御）
// <col>要素を1つ操作するだけで thead/tbody 両方の対応列が同時に
// 表示/非表示・幅変更される（tableの仕様）ため、ヘッダーとデータの
// ズレは構造的に発生しない。
// ============================================================
function updateLayout(){
  const aH=Math.floor(numA/100),aJ=Math.floor((numA%100)/10),aI=numA%10;
  const bH=Math.floor(numB/100),bJ=Math.floor((numB%100)/10),bI=numB%10;
  // ひき算では桁が増えることはなく、ひかれる数(A)の桁数がそのまま最大桁数になる
  const has3=(aH>0);

  // 百の位列（col要素の表示切替＋ th/td も同じ値で連動させ二重に保証する）
  const hyakuDisp=has3?'':'none';
  document.getElementById('colgrp-hyaku').style.display=has3?'table-column':'none';
  document.querySelectorAll('.th-hyaku, .td-hyaku').forEach(el=>{el.style.display=hyakuDisp;});

  // ---- 十の位の幅：くり下げで一時的に増える本数も考慮 ----
  // 表示しうる最大本数：A行のaJ本、もしくは(借りてきた後の)十の位の本数+10(ブリッジ表示)
  const maxJuuCount=Math.max(aJ,bJ,10+aJ,1);
  const stW=U+1,gap=5; // renderSticksと同じ計算式
  const juuNeedW=Math.min(maxJuuCount,19)*stW+(Math.min(maxJuuCount,19)-1)*gap+16; // 余白
  const juuWidth=Math.max(124,Math.round(juuNeedW));
  document.querySelector('col.col-juu').style.width=juuWidth+'px';
  ['svg-juu-a','svg-juu-b','svg-juu-ans'].forEach(id=>{
    const svg=document.getElementById(id);
    svg.setAttribute('width',juuWidth);
    const vbH=svg.getAttribute('viewBox').split(' ')[3];
    svg.setAttribute('viewBox',`0 0 ${juuWidth} ${vbH}`);
  });

  // ---- 百の位の幅：A行の枚数が多い場合に少し広げる ----
  const maxHyakuCount=Math.max(aH,1);
  const hyakuNeedW=124+Math.max(0,(maxHyakuCount-1))*3;
  const hyakuWidth=Math.max(124,Math.round(hyakuNeedW));
  document.getElementById('colgrp-hyaku').style.width=hyakuWidth+'px';
  ['svg-hyaku-a','svg-hyaku-b','svg-hyaku-ans'].forEach(id=>{
    const svg=document.getElementById(id);
    svg.setAttribute('width',hyakuWidth);
    const vbH=svg.getAttribute('viewBox').split(' ')[3];
    svg.setAttribute('viewBox',`0 0 ${hyakuWidth} ${vbH}`);
  });

  // ---- is-empty トグル：答え行のそのセルにタイルが無いときだけ斜線予告枠を表示 ----
  document.getElementById('col-hyaku-ans').classList.add('is-empty');
}

// ============================================================
// UI更新
// ============================================================
function updateUI(skipAnim){
  const step=steps[stepIdx];
  const total=steps.length;
  document.getElementById('step-num').textContent=stepIdx+1;
  document.getElementById('step-title-text').innerHTML=step.title;
  document.getElementById('step-desc').innerHTML=step.desc;
  document.getElementById('step-ind').textContent=`${stepIdx+1} / ${total}`;
  document.getElementById('btn-prev').disabled=animBusy||(stepIdx===0);
  document.getElementById('btn-next').disabled=animBusy||(stepIdx===total-1);
  drawHissan(document.getElementById('hissan-svg'),step.h);

  if(skipAnim||!step.anim){paintTiles(step.t);return;}

  const prevT=stepIdx>0?steps[stepIdx-1].t:step.t;
  paintTiles(prevT);
  animBusy=true;
  document.getElementById('btn-next').disabled=true;
  document.getElementById('btn-prev').disabled=true;

  runAnim(step.anim,prevT,step.t,()=>{
    paintTiles(step.t);
    animBusy=false;
    document.getElementById('btn-prev').disabled=(stepIdx===0);
    document.getElementById('btn-next').disabled=(stepIdx===total-1);
  });
}

function goStep(dir){
  if(animBusy)return;
  cancelAnim();
  document.getElementById('anim-layer').innerHTML='';
  const newIdx=stepIdx+dir;
  if(newIdx<0||newIdx>=steps.length)return;
  stepIdx=newIdx;
  updateUI(dir<0);
}

function setProblem(a,b){
  if(animBusy)return;
  cancelAnim();
  numA=a;numB=b;stepIdx=0;
  document.getElementById('inp-a').value=a;
  document.getElementById('inp-b').value=b;
  document.querySelectorAll('.problem-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.textContent.replace(/\s/g,'')==`${a}－${b}`);
  });
  document.getElementById('anim-layer').innerHTML='';
  updateLayout();
  steps=buildSteps();
  updateUI(true);
}

function setMethod(m){
  if(animBusy)return;
  calcMethod=m;
  document.getElementById('btn-bridge').classList.toggle('active',m==='bridge');
  document.getElementById('btn-direct').classList.toggle('active',m==='direct');
  cancelAnim();
  document.getElementById('anim-layer').innerHTML='';
  stepIdx=0;
  updateLayout();
  steps=buildSteps();
  updateUI(true);
}

function generateFromInput(){
  const va=parseInt(document.getElementById('inp-a').value);
  const vb=parseInt(document.getElementById('inp-b').value);
  const err=document.getElementById('err-msg');
  if(!Number.isInteger(va)||!Number.isInteger(vb)||va<1||va>999||vb<1||vb>999||vb>=va){
    err.style.display='block';setTimeout(()=>err.style.display='none',3000);return;
  }
  err.style.display='none';
  document.querySelectorAll('.problem-btn').forEach(btn=>btn.classList.remove('active'));
  numA=va;numB=vb;stepIdx=0;
  cancelAnim();
  document.getElementById('anim-layer').innerHTML='';
  updateLayout();
  steps=buildSteps();
  updateUI(true);
}

document.getElementById('inp-a').addEventListener('keydown',e=>{if(e.key==='Enter')generateFromInput();});
document.getElementById('inp-b').addEventListener('keydown',e=>{if(e.key==='Enter')generateFromInput();});

// 初期化
updateLayout();
steps=buildSteps();
updateUI(true);
</script>
