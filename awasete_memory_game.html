<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>あわせて◯ 神経衰弱</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card-back: #0f3460;
    --card-face: #e8f4f8;
    --accent1: #e94560;
    --accent2: #f5a623;
    --accent3: #4ecdc4;
    --p1: #e94560;
    --p2: #4ecdc4;
    --cpu: #a29bfe;
    --text: #f0f4f8;
    --text-dim: #8899aa;
    --dot: #1a1a2e;
    --shadow: rgba(0,0,0,0.4);
    --radius: 12px;
    --font-main: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic Pro', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-main);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ===== SETUP SCREEN ===== */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    background: radial-gradient(ellipse at center, #1e2d5a 0%, #1a1a2e 70%);
  }

  .title-block {
    text-align: center;
    margin-bottom: 8px;
  }
  .title-block h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--accent2);
    text-shadow: 0 0 30px rgba(245,166,35,0.5);
  }
  .title-block .subtitle {
    font-size: 1rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .setup-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px 32px;
    width: min(680px, 92vw);
    box-shadow: 0 8px 32px var(--shadow);
    border: 1px solid rgba(255,255,255,0.07);
  }

  .setup-section-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .setup-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .setup-label {
    font-size: 0.95rem;
    color: var(--text);
    min-width: 120px;
  }

  .num-input {
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1rem;
    font-family: var(--font-main);
    font-weight: 700;
    padding: 6px 12px;
    width: 72px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: var(--accent2); }

  .mode-btns, .cpu-btns {
    display: flex;
    gap: 8px;
  }

  .mode-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-main);
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    border-color: var(--accent2);
    background: rgba(245,166,35,0.15);
    color: var(--accent2);
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 16px 0;
  }

  .player-names {
    display: flex;
    gap: 12px;
  }
  .player-name-input {
    flex: 1;
    max-width: 180px;
    background: var(--bg);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-main);
    font-size: 0.9rem;
    font-weight: 700;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-name-input:focus { border-color: var(--accent3); }
  .player-name-input.p1 { border-color: rgba(233,69,96,0.4); }
  .player-name-input.p2 { border-color: rgba(78,205,196,0.4); }

  #start-btn {
    width: min(680px, 92vw);
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent2), #f76a3c);
    color: #1a1a2e;
    font-family: var(--font-main);
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(245,166,35,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #start-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(245,166,35,0.3); }

  /* ===== GAME SCREEN ===== */
  #game-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    padding: 0;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 16px;
    background: var(--surface);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    height: 64px;
    flex-shrink: 0;
  }

  .player-panel {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    border-radius: 10px;
    transition: all 0.3s;
    min-width: 180px;
  }
  .player-panel.active-turn {
    box-shadow: 0 0 0 2px var(--p1);
  }
  .player-panel.p2.active-turn {
    box-shadow: 0 0 0 2px var(--p2);
  }
  .player-panel.cpu.active-turn {
    box-shadow: 0 0 0 2px var(--cpu);
  }

  .player-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .player-panel.p1 .player-icon { background: var(--p1); }
  .player-panel.p2 .player-icon { background: var(--p2); }
  .player-panel.cpu .player-icon { background: var(--cpu); }

  .player-info { display: flex; flex-direction: column; }
  .player-name-display { font-size: 0.85rem; font-weight: 700; }
  .player-score { font-size: 1.4rem; font-weight: 900; line-height: 1; }
  .score-label { font-size: 0.7rem; color: var(--text-dim); }

  .center-info {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0px;
  }
  .center-info-bottom {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .awasete-text-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
  }
  .target-label { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.05em; }
  .target-num {
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent2);
    line-height: 1;
    text-shadow: 0 0 20px rgba(245,166,35,0.5);
  }
  .awasete-text { font-size: 0.7rem; color: var(--text-dim); }

  .turn-arrow {
    font-size: 1.4rem;
    transition: opacity 0.3s;
  }

  /* Card grid */
  #card-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    overflow: hidden;
  }

  #card-grid {
    display: grid;
    gap: 8px;
  }

  /* Card */
  .card {
    width: 100%;
    aspect-ratio: 3/4;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    border-radius: var(--radius);
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card.matched .card-inner { transform: rotateY(180deg); }
  .card.matched .card-face { background: rgba(78,205,196,0.15); border-color: var(--accent3); }
  .card.matched.p1-match .card-face { background: rgba(233,69,96,0.12); border-color: var(--p1); }
  .card.matched.p2-match .card-face { background: rgba(78,205,196,0.12); border-color: var(--p2); }
  .card.matched.cpu-match .card-face { background: rgba(162,155,254,0.12); border-color: var(--cpu); }
  .card.no-match .card-inner { animation: shake 0.4s ease; }

  @keyframes shake {
    0%,100% { transform: rotateY(180deg) translateX(0); }
    25% { transform: rotateY(180deg) translateX(-6px); }
    75% { transform: rotateY(180deg) translateX(6px); }
  }

  .card-back, .card-face {
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .card-back {
    background: var(--card-back);
    background-image: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
  }
  .card-back-pattern {
    width: 60%;
    height: 60%;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    color: rgba(255,255,255,0.2);
  }

  .card-face {
    background: var(--card-face);
    transform: rotateY(180deg);
    gap: 6px;
    padding: 8px 4px;
    border-color: rgba(0,0,0,0.1);
    transition: background 0.4s, border-color 0.4s;
  }

  .dot-display {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  .dot-grid {
    display: grid;
    gap: 3px;
    align-items: center;
    justify-items: center;
  }

  .dot {
    background: var(--dot);
    border-radius: 50%;
  }

  .card-number {
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    font-weight: 900;
    color: #1a1a2e;
    line-height: 1;
    padding-bottom: 4px;
  }

  /* Status bar */
  #status-bar {
    height: 44px;
    background: var(--surface);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-dim);
    gap: 8px;
    flex-shrink: 0;
  }
  #status-text { transition: color 0.3s; }
  #status-text.correct { color: var(--accent3); }
  #status-text.wrong { color: var(--accent1); }

  #back-btn {
    margin-top: 4px;
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: var(--text-dim);
    font-family: var(--font-main);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  #back-btn:hover { border-color: rgba(255,255,255,0.4); color: var(--text); }

  /* ===== RESULT SCREEN ===== */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    background: radial-gradient(ellipse at center, #1e2d5a 0%, #1a1a2e 70%);
  }

  .result-card {
    background: var(--surface);
    border-radius: 24px;
    padding: 32px 48px;
    text-align: center;
    box-shadow: 0 12px 48px var(--shadow);
    border: 1px solid rgba(255,255,255,0.07);
    min-width: 340px;
  }

  .result-title {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .result-winner {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 900;
    margin-bottom: 4px;
  }
  .result-winner.draw { color: var(--accent2); }
  .result-winner.p1-win { color: var(--p1); }
  .result-winner.p2-win { color: var(--p2); }
  .result-winner.cpu-win { color: var(--cpu); }

  .result-scores {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-top: 20px;
  }
  .result-score-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .result-score-name { font-size: 0.85rem; color: var(--text-dim); }
  .result-score-num { font-size: 2.2rem; font-weight: 900; }
  .result-score-num.p1 { color: var(--p1); }
  .result-score-num.p2 { color: var(--p2); }
  .result-score-num.cpu { color: var(--cpu); }

  .result-btns {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }
  .result-btn {
    padding: 12px 28px;
    border-radius: 10px;
    border: none;
    font-family: var(--font-main);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .result-btn:active { transform: scale(0.97); }
  .result-btn.primary {
    background: linear-gradient(135deg, var(--accent2), #f76a3c);
    color: #1a1a2e;
    box-shadow: 0 4px 16px rgba(245,166,35,0.3);
  }
  .result-btn.secondary {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* CPU thinking indicator */
  .cpu-thinking {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .cpu-thinking span {
    width: 6px;
    height: 6px;
    background: var(--cpu);
    border-radius: 50%;
    animation: bounce 0.9s ease infinite;
  }
  .cpu-thinking span:nth-child(2) { animation-delay: 0.15s; }
  .cpu-thinking span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Overlay flash */
  #flash-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 100;
  }
  #flash-overlay.correct { background: rgba(78,205,196,0.15); opacity: 1; }
  #flash-overlay.wrong { background: rgba(233,69,96,0.12); opacity: 1; }

  /* Turn indicator */
  .turn-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .turn-badge.p1 { background: rgba(233,69,96,0.2); color: var(--p1); }
  .turn-badge.p2 { background: rgba(78,205,196,0.2); color: var(--p2); }
  .turn-badge.cpu { background: rgba(162,155,254,0.2); color: var(--cpu); }
</style>
</head>
<body>

<div id="flash-overlay"></div>

<!-- SETUP -->
<div id="setup-screen">
  <div class="title-block">
    <h1>あわせて◯</h1>
    <div class="subtitle">神経衰弱ゲーム</div>
  </div>

  <div class="setup-card">
    <div class="setup-section-title">ゲーム設定</div>

    <div class="setup-row">
      <span class="setup-label">目標の数</span>
      <input type="number" class="num-input" id="target-num" value="10" min="3" max="30">
      <span style="font-size:0.9rem;color:var(--text-dim)">にする</span>
    </div>

    <div class="setup-row">
      <span class="setup-label">カードの範囲</span>
      <input type="number" class="num-input" id="card-min" value="1" min="0" max="20">
      <span style="font-size:0.9rem;color:var(--text-dim)">〜</span>
      <input type="number" class="num-input" id="card-max" value="9" min="1" max="30">
    </div>

    <div class="setup-row">
      <span class="setup-label">カードの枚数</span>
      <div class="mode-btns">
        <button class="mode-btn active" data-cardcount="min" onclick="selectCardCount('min')">📋 ぴったり</button>
        <button class="mode-btn" data-cardcount="max" onclick="selectCardCount('max')">🃏 いっぱい</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="setup-section-title">対戦モード</div>
    <div class="setup-row">
      <div class="mode-btns">
        <button class="mode-btn active" data-mode="2p" onclick="selectMode('2p')">👥 ふたりで</button>
        <button class="mode-btn" data-mode="cpu" onclick="selectMode('cpu')">🤖 CPU対戦</button>
      </div>
    </div>

    <div id="cpu-difficulty-row" class="setup-row" style="display:none">
      <span class="setup-label">CPUの強さ</span>
      <div class="cpu-btns">
        <button class="mode-btn active" data-diff="easy" onclick="selectDiff('easy')">😊 ふつう</button>
        <button class="mode-btn" data-diff="hard" onclick="selectDiff('hard')">😈 むずかしい</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="setup-section-title">プレイヤー名</div>
    <div class="player-names">
      <input type="text" class="player-name-input p1" id="p1-name" value="ひだり" maxlength="8" placeholder="ひだり">
      <input type="text" class="player-name-input p2" id="p2-name" value="みぎ" maxlength="8" placeholder="みぎ" id="p2-name-input">
    </div>
  </div>

  <button id="start-btn" onclick="startGame()">ゲームスタート！</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div id="header">
    <div class="player-panel p1" id="panel-p1">
      <div class="player-icon">🙋</div>
      <div class="player-info">
        <div class="player-name-display" id="display-p1-name">ひだり</div>
        <div class="player-score" id="score-p1">0</div>
        <div class="score-label">まい</div>
      </div>
    </div>

    <div class="center-info">
      <div class="awasete-text">あわせて</div>
      <div class="center-info-bottom">
        <div class="target-num" id="display-target">10</div>
        <div class="awasete-text-row">
          <span class="awasete-text">をさがそう！</span>
          <button id="back-btn" onclick="confirmGoMenu()">← もどる</button>
        </div>
      </div>
    </div>

    <div class="player-panel p2" id="panel-p2">
      <div class="player-icon">🙋</div>
      <div class="player-info">
        <div class="player-name-display" id="display-p2-name">みぎ</div>
        <div class="player-score" id="score-p2">0</div>
        <div class="score-label">まい</div>
      </div>
    </div>
  </div>

  <div id="card-area">
    <div id="card-grid"></div>
  </div>

  <div id="status-bar">
    <span id="status-text">カードをえらんでね！</span>
  </div>
</div>

<!-- RESULT -->
<div id="result-screen">
  <div class="result-card">
    <div class="result-title">ゲームおわり！</div>
    <div class="result-winner" id="result-winner-text"></div>
    <div class="result-scores" id="result-scores"></div>
  </div>
  <div class="result-btns">
    <button class="result-btn primary" onclick="restartSameSettings()">もういちど</button>
    <button class="result-btn secondary" onclick="goMenu()">メニューへ</button>
  </div>
</div>

<script>
// ===== STATE =====
let G = {
  target: 10,
  mode: '2p',
  cpuDiff: 'easy',
  cardCountMode: 'min', // 'min'=ぴったり / 'max'=いっぱい
  p1Name: 'ひだり',
  p2Name: 'みぎ',
  cards: [],
  flipped: [],
  matched: [],
  scores: [0, 0],
  currentPlayer: 0, // 0=p1, 1=p2/cpu
  locked: false,
  cpuMemory: {}, // index -> value
  pairCount: 0,
};

// ===== SETUP UI =====
function selectMode(mode) {
  G.mode = mode;
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('cpu-difficulty-row').style.display = mode === 'cpu' ? 'flex' : 'none';
  const p2input = document.getElementById('p2-name');
  if (mode === 'cpu') {
    p2input.value = 'CPU';
    p2input.disabled = true;
  } else {
    p2input.value = 'みぎ';
    p2input.disabled = false;
  }
}

function selectCardCount(mode) {
  G.cardCountMode = mode;
  document.querySelectorAll('[data-cardcount]').forEach(b => b.classList.toggle('active', b.dataset.cardcount === mode));
}

function selectDiff(diff) {
  G.cpuDiff = diff;
  document.querySelectorAll('[data-diff]').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
}

// ===== GAME SETUP =====
function startGame() {
  const target = parseInt(document.getElementById('target-num').value);
  const minV = parseInt(document.getElementById('card-min').value);
  const maxV = parseInt(document.getElementById('card-max').value);

  if (isNaN(target) || target < 2) { alert('目標の数は2以上にしてください'); return; }
  if (isNaN(minV) || isNaN(maxV) || minV >= maxV) { alert('カードの範囲が正しくありません'); return; }

  // Generate valid pairs
  const pairs = [];
  for (let a = minV; a <= maxV; a++) {
    const b = target - a;
    if (b >= minV && b <= maxV && b !== a) {
      if (a < b) pairs.push([a, b]);
    } else if (b === a) {
      pairs.push([a, b]);
    }
  }

  if (pairs.length < 2) {
    alert(`「あわせて${target}」になるペアが少なすぎます。\n設定を変えてみてください。`);
    return;
  }

  shuffleArray(pairs);
  let chosen;

  if (G.cardCountMode === 'max') {
    // 画面に入る最大カード枚数を計算（2の倍数）
    const areaW = window.innerWidth - 24;
    const areaH = window.innerHeight - 64 - 44 - 24;
    let maxCards = 0;
    for (let cols = 3; cols <= 20; cols++) {
      for (let rows = 2; rows <= 14; rows++) {
        const n = cols * rows;
        if (n % 2 !== 0) continue;
        const gapW = (cols - 1) * 8;
        const gapH = (rows - 1) * 8;
        const cellW = (areaW - gapW) / cols;
        const cellH = (areaH - gapH) / rows;
        const minCell = Math.min(cellW, cellH * (3/4));
        if (minCell >= 40 && n > maxCards) maxCards = n;
      }
    }
    maxCards = Math.max(4, maxCards);
    const maxPairsNeeded = maxCards / 2;
    // ペアが足りない場合は繰り返して埋める
    chosen = [];
    while (chosen.length < maxPairsNeeded) chosen.push(...pairs);
    chosen.length = maxPairsNeeded;
  } else {
    // ぴったりモード：全ペアをそのまま使う
    chosen = [...pairs];
  }

  // Flatten into cards
  const cardValues = chosen.flatMap(([a,b]) => [a, b]);
  shuffleArray(cardValues);

  G.target = target;
  G.p1Name = document.getElementById('p1-name').value || 'ひだり';
  G.p2Name = G.mode === 'cpu' ? 'CPU' : (document.getElementById('p2-name').value || 'みぎ');
  G.cards = cardValues.map((v, i) => ({ id: i, value: v }));
  G.flipped = [];
  G.matched = [];
  G.scores = [0, 0];
  G.currentPlayer = 0;
  G.locked = false;
  G.cpuMemory = {};
  G.pairCount = chosen.length;

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';

  // Update UI names/panels
  document.getElementById('display-p1-name').textContent = G.p1Name;
  document.getElementById('display-p2-name').textContent = G.p2Name;
  document.getElementById('display-target').textContent = G.target;
  updateScores(); // スコア表示を0にリセット

  const p2panel = document.getElementById('panel-p2');
  if (G.mode === 'cpu') {
    p2panel.classList.add('cpu');
    p2panel.classList.remove('p2');
    p2panel.querySelector('.player-icon').textContent = '🤖';
  } else {
    p2panel.classList.add('p2');
    p2panel.classList.remove('cpu');
    p2panel.querySelector('.player-icon').textContent = '🙋';
  }

  renderCards();
  updateHeader();
  setStatus('カードをえらんでね！', '');

  // SpeechSynthesisのウォームアップ（初回遅延防止）
  if (window.speechSynthesis) {
    const warmup = new SpeechSynthesisUtterance(' ');
    warmup.volume = 0;
    warmup.lang = 'ja-JP';
    speechSynthesis.speak(warmup);
  }
}

// ===== CARD RENDERING =====
function renderCards() {
  const grid = document.getElementById('card-grid');
  const n = G.cards.length;

  // Figure out grid dims to fit Chromebook landscape (minus header/status)
  // Available: ~(100vw - 24px) x ~(100vh - 64 - 44 - 24px)
  const areaW = window.innerWidth - 24;
  const areaH = window.innerHeight - 64 - 44 - 24;

  // Find best cols/rows（枚数に応じてcolsを広く探索）
  let bestCols = 4, bestRows = Math.ceil(n/4);
  let bestCellSize = 0;
  for (let cols = 3; cols <= Math.min(n, 24); cols++) {
    const rows = Math.ceil(n / cols);
    const gapW = (cols - 1) * 8;
    const gapH = (rows - 1) * 8;
    const cellW = (areaW - gapW) / cols;
    const cellH = (areaH - gapH) / rows;
    const cellSize = Math.min(cellW, cellH * (3/4)); // card aspect 3:4
    if (cellSize > bestCellSize) {
      bestCellSize = cellSize;
      bestCols = cols;
      bestRows = rows;
    }
  }

  const cardW = bestCellSize;
  const cardH = cardW * (4/3);

  grid.style.gridTemplateColumns = `repeat(${bestCols}, ${cardW}px)`;
  grid.style.gridTemplateRows = `repeat(${bestRows}, ${cardH}px)`;

  grid.innerHTML = '';
  G.cards.forEach((card, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.id = `card-${i}`;
    el.style.width = cardW + 'px';
    el.style.height = cardH + 'px';
    el.dataset.index = i;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="card-back-pattern">★</div>
        </div>
        <div class="card-face">
          <div class="dot-display">
            ${makeDotSVG(card.value, cardW * 0.85, cardH * 0.65)}
          </div>
          <div class="card-number">${card.value}</div>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(i));
    grid.appendChild(el);
  });
}

function makeDotSVG(n, w, h) {
  // Arrange dots nicely in a grid-like pattern
  const maxDots = Math.min(n, 20); // cap visual at 20, show number for more
  if (n === 0) return '<span style="font-size:1.5em;color:#aaa">０</span>';

  const size = Math.max(6, Math.min(14, Math.floor(Math.min(w, h) / (Math.ceil(Math.sqrt(maxDots)) + 1))));
  const cols = Math.ceil(Math.sqrt(maxDots));
  const rows = Math.ceil(maxDots / cols);
  const gap = size * 0.5;
  const totalW = cols * size + (cols - 1) * gap;
  const totalH = rows * size + (rows - 1) * gap;

  let dots = '';
  for (let i = 0; i < maxDots; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = col * (size + gap);
    const y = row * (size + gap);
    dots += `<circle cx="${x + size/2}" cy="${y + size/2}" r="${size/2}" fill="#1a1a2e"/>`;
  }

  const svgW = totalW;
  const svgH = totalH;
  const viewW = Math.max(svgW, 20);
  const viewH = Math.max(svgH, 20);

  if (n > maxDots) {
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <svg width="${Math.min(svgW, w)}" viewBox="0 0 ${viewW} ${viewH}" xmlns="http://www.w3.org/2000/svg">${dots}</svg>
      <span style="font-size:0.65em;color:#888">…など</span>
    </div>`;
  }

  return `<svg width="${Math.min(svgW, w)}" viewBox="0 0 ${viewW} ${viewH}" xmlns="http://www.w3.org/2000/svg">${dots}</svg>`;
}

// ===== AUDIO =====
const AC = new (window.AudioContext || window.webkitAudioContext)();

function resumeAC() {
  if (AC.state === 'suspended') AC.resume();
}

// カードをめくる音：短いクリック
function soundFlip() {
  resumeAC();
  const buf = AC.createBuffer(1, AC.sampleRate * 0.06, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (AC.sampleRate * 0.015));
  }
  const src = AC.createBufferSource();
  src.buffer = buf;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.18, AC.currentTime);
  src.connect(g); g.connect(AC.destination);
  src.start();
}

// 正解音：明るい上昇和音
function soundMatch() {
  resumeAC();
  const notes = [523.25, 659.25, 783.99, 1046.5]; // C5 E5 G5 C6
  notes.forEach((freq, i) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = AC.currentTime + i * 0.10;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    osc.connect(g); g.connect(AC.destination);
    osc.start(t); osc.stop(t + 0.35);
  });
}

// 不正解音：低い下降音
function soundNoMatch() {
  resumeAC();
  const osc = AC.createOscillator();
  const g = AC.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(120, AC.currentTime + 0.25);
  g.gain.setValueAtTime(0.18, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.3);
  osc.connect(g); g.connect(AC.destination);
  osc.start(); osc.stop(AC.currentTime + 0.3);
}

// ゲーム終了のファンファーレ
function soundFinish() {
  resumeAC();
  const melody = [
    [523.25, 0.00], [659.25, 0.12], [783.99, 0.24],
    [1046.5, 0.36], [783.99, 0.52], [1046.5, 0.60]
  ];
  melody.forEach(([freq, delay]) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t = AC.currentTime + delay;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.2, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(g); g.connect(AC.destination);
    osc.start(t); osc.stop(t + 0.25);
  });
}

// 「３と７で１０」の読み上げ
function speakMatch(v1, v2, target) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const text = v1 + 'と' + v2 + 'で' + target;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ja-JP';
  utter.rate = 0.9;
  utter.pitch = 1.1;
  // 正解音が鳴り終わる頃（450ms後）に読み上げ開始
  setTimeout(() => speechSynthesis.speak(utter), 450);
}

// ===== GAMEPLAY =====
function onCardClick(index) {
  if (G.locked) return;
  if (G.matched.includes(index)) return;
  if (G.flipped.includes(index)) return;
  if (G.mode === 'cpu' && G.currentPlayer === 1) return; // CPU's turn

  flipCard(index);

  // CPU learns
  if (G.mode === 'cpu') {
    G.cpuMemory[index] = G.cards[index].value;
  }

  if (G.flipped.length === 1) {
    // First card flipped
    return;
  }

  // Two cards flipped
  const [i1, i2] = G.flipped;
  const sum = G.cards[i1].value + G.cards[i2].value;
  G.locked = true;

  if (sum === G.target) {
    // Match!
    setTimeout(() => handleMatch(i1, i2), 700);
  } else {
    // No match
    setTimeout(() => handleNoMatch(i1, i2), 900);
  }
}

function flipCard(index) {
  G.flipped.push(index);
  const el = document.getElementById(`card-${index}`);
  el.classList.add('flipped');
  soundFlip();
}

function unflipCard(index) {
  const el = document.getElementById(`card-${index}`);
  el.classList.remove('flipped');
}

function handleMatch(i1, i2) {
  G.matched.push(i1, i2);
  G.scores[G.currentPlayer] += 2;

  const matchClass = G.currentPlayer === 0 ? 'p1-match' : (G.mode === 'cpu' ? 'cpu-match' : 'p2-match');
  document.getElementById(`card-${i1}`).classList.add('matched', matchClass);
  document.getElementById(`card-${i2}`).classList.add('matched', matchClass);

  G.flipped = [];

  soundMatch();
  speakMatch(G.cards[i1].value, G.cards[i2].value, G.target);
  flashOverlay('correct');
  updateScores();
  setStatus(`✨ せいかい！ +2まい`, 'correct');

  if (G.matched.length === G.cards.length) {
    setTimeout(showResult, 800);
    return;
  }

  // Same player goes again
  G.locked = false;
  setTimeout(() => {
    setStatus(`${currentName()}のターン！もう１かい！`, '');
    if (G.mode === 'cpu' && G.currentPlayer === 1) {
      setTimeout(cpuTurn, 800);
    }
  }, 600);
}

function handleNoMatch(i1, i2) {
  document.getElementById(`card-${i1}`).classList.add('no-match');
  document.getElementById(`card-${i2}`).classList.add('no-match');

  soundNoMatch();
  flashOverlay('wrong');
  setStatus(`ざんねん…`, 'wrong');

  setTimeout(() => {
    document.getElementById(`card-${i1}`).classList.remove('no-match');
    document.getElementById(`card-${i2}`).classList.remove('no-match');
    unflipCard(i1);
    unflipCard(i2);
    G.flipped = [];

    // Switch player
    G.currentPlayer = 1 - G.currentPlayer;
    G.locked = false;
    updateHeader();
    setStatus(`${currentName()}のターン！`, '');

    if (G.mode === 'cpu' && G.currentPlayer === 1) {
      G.locked = true;
      showCpuThinking();
      setTimeout(cpuTurn, 1200);
    }
  }, 900);
}

// ===== CPU AI =====
function cpuTurn() {
  const available = G.cards.map((_, i) => i)
    .filter(i => !G.matched.includes(i) && !G.flipped.includes(i));

  if (available.length < 2) { G.locked = false; return; }

  let pick1, pick2;

  if (G.cpuDiff === 'hard') {
    // Try to find a known pair
    const known = available.filter(i => G.cpuMemory[i] !== undefined);
    let foundPair = null;
    for (let i = 0; i < known.length && !foundPair; i++) {
      for (let j = i + 1; j < known.length && !foundPair; j++) {
        if (G.cpuMemory[known[i]] + G.cpuMemory[known[j]] === G.target) {
          foundPair = [known[i], known[j]];
        }
      }
    }
    if (foundPair) {
      [pick1, pick2] = foundPair;
    } else {
      // Pick unknown first, then try to find match in memory
      const unknown = available.filter(i => G.cpuMemory[i] === undefined);
      pick1 = unknown.length > 0 ? unknown[Math.floor(Math.random() * unknown.length)] : available[Math.floor(Math.random() * available.length)];
      const needVal = G.target - G.cards[pick1].value;
      const knownMatch = known.find(i => i !== pick1 && G.cpuMemory[i] === needVal);
      pick2 = knownMatch !== undefined ? knownMatch :
        (() => { const rem = available.filter(i => i !== pick1); return rem[Math.floor(Math.random() * rem.length)]; })();
    }
  } else {
    // Random
    pick1 = available[Math.floor(Math.random() * available.length)];
    const rem = available.filter(i => i !== pick1);
    pick2 = rem[Math.floor(Math.random() * rem.length)];
  }

  // CPU reveals cards one by one
  clearCpuThinking();
  flipCard(pick1);
  G.cpuMemory[pick1] = G.cards[pick1].value;

  setTimeout(() => {
    flipCard(pick2);
    G.cpuMemory[pick2] = G.cards[pick2].value;

    const sum = G.cards[pick1].value + G.cards[pick2].value;
    if (sum === G.target) {
      setTimeout(() => handleMatch(pick1, pick2), 700);
    } else {
      setTimeout(() => handleNoMatch(pick1, pick2), 900);
    }
  }, 700);
}

function showCpuThinking() {
  document.getElementById('status-text').innerHTML =
    `🤖 CPUが考えています <span class="cpu-thinking"><span></span><span></span><span></span></span>`;
}
function clearCpuThinking() {
  setStatus('CPUがカードをえらびました', '');
}

// ===== UI HELPERS =====
function updateHeader() {
  const p1Active = G.currentPlayer === 0;
  document.getElementById('panel-p1').classList.toggle('active-turn', p1Active);
  document.getElementById('panel-p2').classList.toggle('active-turn', !p1Active);
}

function updateScores() {
  document.getElementById('score-p1').textContent = G.scores[0];
  document.getElementById('score-p2').textContent = G.scores[1];
}

function setStatus(msg, cls) {
  const el = document.getElementById('status-text');
  el.textContent = msg;
  el.className = cls || '';
}

function currentName() {
  return G.currentPlayer === 0 ? G.p1Name : G.p2Name;
}

function flashOverlay(type) {
  const el = document.getElementById('flash-overlay');
  el.className = type;
  setTimeout(() => el.className = '', 400);
}

// ===== RESULT =====
function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'flex';
  soundFinish();

  const s0 = G.scores[0], s1 = G.scores[1];
  const winEl = document.getElementById('result-winner-text');
  const scoresEl = document.getElementById('result-scores');

  let winnerText, winClass;
  if (s0 > s1) { winnerText = `${G.p1Name}のかち！🎉`; winClass = 'p1-win'; }
  else if (s1 > s0) { winnerText = `${G.p2Name}のかち！🎉`; winClass = G.mode === 'cpu' ? 'cpu-win' : 'p2-win'; }
  else { winnerText = 'ひきわけ！🤝'; winClass = 'draw'; }

  winEl.textContent = winnerText;
  winEl.className = `result-winner ${winClass}`;

  const p2colorClass = G.mode === 'cpu' ? 'cpu' : 'p2';
  scoresEl.innerHTML = `
    <div class="result-score-item">
      <div class="result-score-name">${G.p1Name}</div>
      <div class="result-score-num p1">${s0}</div>
      <div class="score-label">まい</div>
    </div>
    <div style="display:flex;align-items:center;font-size:1.5rem;color:var(--text-dim)">vs</div>
    <div class="result-score-item">
      <div class="result-score-name">${G.p2Name}</div>
      <div class="result-score-num ${p2colorClass}">${s1}</div>
      <div class="score-label">まい</div>
    </div>`;
}

function restartSameSettings() {
  // Keep all settings, restart
  document.getElementById('result-screen').style.display = 'none';
  startGame();
}

function confirmGoMenu() {
  // ゲームがまだ続いている場合は確認
  if (G.matched.length < G.cards.length && G.cards.length > 0) {
    if (!confirm('ゲームをやめてメニューにもどりますか？')) return;
  }
  goMenu();
}

function goMenu() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

// ===== UTILS =====
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Init
selectMode('2p');
