<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数の大きさ比べアプリ</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --panel:#ffffff;
      --text:#243041;
      --muted:#6b7280;
      --border:#d9e2ec;
      --shadow:0 10px 30px rgba(19, 34, 58, .08);
      --pink:#ffd7e8;
      --pink-line:#e28ab3;
      --yellow:#fff0bf;
      --yellow-line:#e1bc47;
      --blue:#d8ebff;
      --blue-line:#6ca8e6;
      --white:#f7f9fc;
      --white-line:#c7d1df;
      --dec:#e5f5ea;
      --dec-line:#7fb98f;
      --accent:#22a06b;
      --accent-2:#2563eb;
      --danger:#d64545;
      --ok:#1f9d55;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #edf3f9 100%);
      color:var(--text);
    }

    .app{
      max-width: 1420px;
      margin: 0 auto;
      padding: 18px;
      min-height: 100vh;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .topbar{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:10px 14px;
      box-shadow:var(--shadow);
    }

    .titlebox{
      flex:0 1 auto;
      min-width:0;
    }

    .titlebox h1{
      margin:0;
      font-size:clamp(15px, 1.8vw, 22px);
      line-height:1.2;
      white-space:nowrap;
    }
    .titlebox p{
      display:none;
    }

    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:nowrap;
      align-items:center;
      margin-left:auto;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:14px 18px;
      font-size:16px;
      font-weight:700;
      box-shadow:var(--shadow);
      transition:transform .08s ease, box-shadow .15s ease, filter .15s ease;
      touch-action:manipulation;
    }
    button:active{transform:translateY(1px) scale(.99)}
    button:hover{filter:brightness(1.02)}

    .btn-primary{background:linear-gradient(180deg, #2eb06f, #21995d); color:#fff;}
    .btn-secondary{background:linear-gradient(180deg, #4f8fe8, #2c6cd8); color:#fff;}
    .btn-ghost{background:#fff; color:var(--text); border:1px solid var(--border)}
    .btn-warn{background:linear-gradient(180deg, #ffb84d, #ef9f1f); color:#fff;}

    .sound-btn{
      width:42px;
      height:42px;
      padding:0;
      border-radius:12px;
      font-size:22px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid transparent;
      box-shadow:var(--shadow);
      flex-shrink:0;
    }
    .sound-btn.sound-on{
      background:linear-gradient(180deg, #2eb06f, #21995d);
      color:#fff;
    }
    .sound-btn.sound-off{
      background:#eef2f7;
      color:#a0a8b3;
      border-color:#d7deea;
      box-shadow:none;
      filter:grayscale(1);
    }

    .star-box{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-weight:900;
      color:#334155;
    }
    .star-box strong{
      font-size:18px;
    }
    .star-reset{
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:800;
      background:#fff;
      border:1px solid #d8e2ee;
      box-shadow:none;
      color:#334155;
    }

    .main-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      align-items:start;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:16px;
    }

    .problem-area{
      display:grid;
      gap:14px;
      justify-items:center;
    }

    .numbers-row{
      display:grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap:14px;
      align-items:center;
      width:100%;
      max-width: 1320px;
      margin:0 auto;
    }

    @media (max-width: 860px){
      .numbers-row{
        grid-template-columns: 1fr;
      }
      .sign-box{
        order: 2;
      }
      #leftCard{order:1;}
      #rightCard{order:3;}
    }

    .num-card{
      position:relative;
      background:#fff;
      border:2px solid #dce5ef;
      border-radius:20px;
      padding:16px 10px 10px;
      min-height: clamp(168px, 24vw, 240px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
      width:100%;
      --places: 3;
      --digit-size: 60px;
      --label-size: 14px;
    }

    .place-labels{
      display:grid;
      grid-template-columns: repeat(var(--places), minmax(0, 1fr));
      gap:0;
      margin: 0 8px;
      text-align:center;
      font-size:var(--label-size);
      font-weight:900;
      color:#526170;
      letter-spacing:.02em;
      width:100%;
    }
    .place-labels span{
      padding:4px 0;
      border-radius:10px;
      line-height:1.15;
    }
    .place-labels .decimal-sep{
      background:transparent;
      border:none;
      padding:0;
      visibility:hidden;
    }
    .digit-row .decimal-sep{
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      padding:0;
      color:#334155;
      visibility:visible;
    }
    .decimal-point-svg{
      width:24px;
      height:24px;
      display:block;
      flex:0 0 auto;
    }
    .place-labels .pink{background:var(--pink)}
    .place-labels .yellow{background:var(--yellow)}
    .place-labels .blue{background:var(--blue)}
    .place-labels .white{background:var(--white)}
    .place-labels .dec{background:var(--dec)}

    .digit-row{
      display:grid;
      grid-template-columns: repeat(var(--places), minmax(0, 1fr));
      gap:0;
      align-items:center;
      justify-items:center;
      margin-top: 2px;
      width:100%;
    }

    .digit{
      width:100%;
      text-align:center;
      font-size: var(--digit-size);
      font-weight:900;
      line-height:1;
      padding:10px 0 14px;
      border-radius:16px;
      transition:background-color .15s ease, transform .15s ease, opacity .15s ease, box-shadow .15s ease;
    }
    .digit.pink{background:var(--pink); border:1px solid var(--pink-line)}
    .digit.yellow{background:var(--yellow); border:1px solid var(--yellow-line)}
    .digit.blue{background:var(--blue); border:1px solid var(--blue-line)}
    .digit.white{background:var(--white); border:1px solid var(--white-line)}
    .digit.dec{background:var(--dec); border:1px solid var(--dec-line)}
    .digit.active{
      box-shadow: 0 0 0 4px rgba(63, 118, 255, .18), 0 0 0 8px rgba(63, 118, 255, .06);
      transform: translateY(-1px) scale(1.02);
      animation: blink 0.7s steps(2, end) infinite;
    }
    @keyframes blink{
      50%{opacity:.28}
    }

    .sign-box{
      display:flex;
      justify-content:center;
      align-items:center;
      min-width: 130px;
      min-height: 130px;
    }
    .sign-btn{
      width: 124px;
      height: 124px;
      border-radius: 30px;
      font-size: 66px;
      font-weight: 900;
      background: linear-gradient(180deg, #fff, #f5f8fc);
      border: 3px solid #dbe4ef;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .08), inset 0 1px 0 rgba(255,255,255,.9);
      color:#334155;
    }
    .sign-btn small{
      display:block;
      font-size:14px;
      margin-top:-6px;
      font-weight:700;
      color:#64748b;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }

    .status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:12px 14px;
      background:#f8fbff;
      border:1px solid #dce7f4;
      border-radius:16px;
      font-size:15px;
      width:100%;
    }
    .status strong{font-size:18px}

    .speech{
      display:none;
    }

    .setting-box{
      margin-top:12px;
      border-top:1px dashed #dae4ef;
      padding-top:12px;
      display:none;
      width:100%;
    }
    .setting-box.open{display:block}
    .setting-grid{
      display:grid;
      grid-template-columns:1fr auto auto auto;
      gap:8px;
      align-items:center;
      margin-top:10px;
    }
    .setting-name{font-weight:800}
    .value-pill{
      min-width:56px;
      text-align:center;
      padding:10px 12px;
      border-radius:14px;
      background:#f3f7fb;
      border:1px solid #d8e2ee;
      font-weight:900;
    }
    .smallbtn{
      width:44px;
      height:44px;
      border-radius:14px;
      padding:0;
      font-size:22px;
      box-shadow:none;
      background:#fff;
      border:1px solid #d8e2ee;
    }

    .popup-backdrop{
      position:fixed;
      inset:0;
      background:rgba(15, 23, 42, .28);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      padding:18px;
    }
    .popup-backdrop.show{display:flex}
    .popup{
      width:min(620px, 100%);
      background:#fff;
      border-radius:24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.22);
      border:1px solid #dde6f1;
      overflow:hidden;
      animation: pop .18s ease-out;
    }
    @keyframes pop{
      from{transform:scale(.96); opacity:.5}
      to{transform:scale(1); opacity:1}
    }
    .popup-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:14px 16px;
      background:linear-gradient(180deg, #f9fbff, #eef5ff);
      border-bottom:1px solid #dde6f1;
      font-weight:900;
    }
    .popup-body{
      padding:16px;
      display:grid;
      gap:14px;
    }
    .popup-close{
      width:42px;
      height:42px;
      padding:0;
      border-radius:14px;
      background:#fff;
      border:1px solid #d8e2ee;
      box-shadow:none;
      font-size:24px;
      line-height:1;
    }

    .result-text{
      text-align:center;
      font-size:18px;
      font-weight:900;
      line-height:1.5;
    }
    .result-text.ok{color:var(--ok)}
    .result-text.ng{color:var(--danger)}

    .footer-tip{
      color:var(--muted);
      font-size:12px;
      margin-top:-4px;
    }

    .custom-box{
      margin-top:14px;
      padding:14px;
      border:1px solid #d8e2ee;
      border-radius:18px;
      background:#fbfdff;
      display:grid;
      gap:12px;
    }
    .custom-title{
      font-weight:900;
      font-size:16px;
    }
    .custom-inputs{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    .custom-field{
      display:grid;
      gap:6px;
      font-weight:800;
      color:#334155;
    }
    .custom-field span{
      font-size:13px;
    }
    .custom-field input{
      width:100%;
      border:1px solid #cfd9e6;
      border-radius:14px;
      padding:12px 12px;
      font-size:16px;
      background:#fff;
      color:var(--text);
      outline:none;
    }
    .custom-field input:focus{
      border-color:#6ca8e6;
      box-shadow:0 0 0 4px rgba(108,168,230,.14);
    }
    .custom-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .custom-actions button{
      flex:1 1 180px;
    }
    .mode-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:76px;
      padding:8px 12px;
      border-radius:999px;
      background:#eef5ff;
      border:1px solid #d9e6f7;
      color:#2557a7;
      font-weight:900;
      font-size:13px;
    }

    .hidden{display:none !important;}
    .nowrap{white-space:nowrap}

    svg{max-width:100%; height:auto; display:block}

    /* ===== タブ ===== */
    .tab-bar{
      display:flex;
      gap:4px;
      background:#eef3fa;
      border-radius:14px;
      padding:4px;
      border:1px solid #d4dff0;
      flex-shrink:0;
    }
    .tab-btn{
      flex:1;
      padding:8px 14px;
      border-radius:10px;
      font-size:13px;
      font-weight:800;
      background:transparent;
      color:#5a6a82;
      border:none;
      white-space:nowrap;
      box-shadow:none;
      transition:background .15s, color .15s;
    }
    .tab-btn.active{
      background:#fff;
      color:#1a3a6e;
      box-shadow:0 2px 8px rgba(20,40,90,.10);
    }
    .tab-panel{display:none}
    .tab-panel.active{display:block}

    /* ===== 式比較モード ===== */
    .expr-area{
      display:grid;
      gap:16px;
    }

    .expr-problem-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .expr-box{
      background:#fff;
      border:2px solid #d0ddf0;
      border-radius:20px;
      padding:18px 22px;
      font-size:clamp(28px,5vw,52px);
      font-weight:900;
      color:#1a3a6e;
      min-width:clamp(140px,28vw,240px);
      text-align:center;
      line-height:1.2;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    /* 式のspan群は横並びに */
    .expr-box > span,
    .expr-box > .expr-formula {
      display:inline;
      white-space:nowrap;
    }
    /* 式を横並びにまとめるラッパー */
    .expr-formula {
      display:block;
      white-space:nowrap;
    }
    .expr-box .op{color:#c85a00}
    .expr-box .num{color:#1a3a6e}

    .expr-sign-box{
      display:flex;
      justify-content:center;
      align-items:center;
      min-width:100px;
    }

    .expr-sign-btn{
      width:100px;
      height:100px;
      border-radius:24px;
      font-size:54px;
      font-weight:900;
      background:linear-gradient(180deg,#fff,#f5f8fc);
      border:3px solid #dbe4ef;
      box-shadow:0 8px 20px rgba(15,23,42,.08), inset 0 1px 0 rgba(255,255,255,.9);
      color:#334155;
    }
    .expr-sign-btn small{
      display:block;
      font-size:13px;
      margin-top:-4px;
      font-weight:700;
      color:#64748b;
    }

    .expr-status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      padding:10px 14px;
      background:#f8fbff;
      border:1px solid #dce7f4;
      border-radius:14px;
      font-size:15px;
    }
    .expr-status strong{font-size:17px}

    .expr-controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .answer-detail{
      text-align:center;
      font-size:16px;
      color:#4a5568;
      background:#f0f6ff;
      border:1px solid #c8d9f0;
      border-radius:14px;
      padding:10px 14px;
      font-weight:700;
    }
    .answer-detail .highlight{color:#c85a00; font-size:20px}

    /* 式の答えアノテーション */
    .expr-answer-annotation{
      display:flex;
      flex-direction:column;
      align-items:center;
      width:100%;
      margin-top:4px;
    }
    .expr-answer-underline{
      width:100%;
      height:3px;
      background:#c85a00;
      border-radius:2px;
    }
    .expr-answer-val{
      font-size:clamp(20px,3.5vw,36px);
      font-weight:900;
      color:#c85a00;
      margin-top:4px;
      line-height:1;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="titlebox">
        <h1>数の大きさくらべ（＞＜＝）</h1>
      </div>
      <div class="toolbar">
        <div id="basicBtns">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:nowrap">
            <button class="btn-warn" id="toggleSettingsBtn" style="padding:10px 14px;font-size:14px">発展</button>
            <button class="btn-primary" id="checkBtn" style="padding:10px 14px;font-size:14px">答え合わせ</button>
            <button class="btn-secondary" id="hintBtn" style="padding:10px 14px;font-size:14px">ヒント</button>
            <button class="btn-ghost" id="nextBtn" style="padding:10px 14px;font-size:14px">次の問題</button>
          </div>
        </div>
        <div id="exprBtns" style="display:none">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:nowrap">
            <button class="btn-primary" id="exprCheckBtn" style="padding:10px 14px;font-size:14px">答え合わせ</button>
            <button class="btn-ghost" id="exprNextBtn" style="padding:10px 14px;font-size:14px">次の問題</button>
          </div>
        </div>
        <div class="tab-bar">
          <button class="tab-btn active" id="tabBasic" onclick="switchTab('basic')">数の比べ方</button>
          <button class="tab-btn" id="tabExpr" onclick="switchTab('expr')">式と数の比べ方</button>
        </div>
        <button class="sound-btn sound-on" id="soundBtn" aria-label="音声をオフにする" title="音声">🔊</button>
      </div>
    </div>

    <!-- ===== タブ：数の比べ方（既存） ===== -->
    <div class="tab-panel active" id="panelBasic">

    <div class="main-grid">
      <div class="card problem-area">
        <div class="status">
          <div>出題レベル：<strong id="levelLabel">3桁整数</strong></div>
          <div>モード：<strong id="modeLabel" class="mode-pill">ランダム</strong></div>
          <div class="star-box">たまった★：★×<strong id="starCount">0</strong><button class="star-reset" id="resetStarBtn">リセット</button></div>
          <div>記号：<strong id="currentSignLabel">□</strong></div>
        </div>

        <div class="numbers-row">
          <div class="num-card" id="leftCard">
            <div class="place-labels" id="leftLabels"></div>
            <div class="digit-row" id="leftDigits"></div>
          </div>

          <div class="sign-box">
            <button class="sign-btn" id="signBtn" aria-label="記号を切り替える">
              <span id="signText">□</span>
              <small>タップ</small>
            </button>
          </div>

          <div class="num-card" id="rightCard">
            <div class="place-labels" id="rightLabels"></div>
            <div class="digit-row" id="rightDigits"></div>
          </div>
        </div>

        <div class="speech" id="speechBox">
          <div class="lead">ヒント</div>
          <div id="speechText">「ヒント」を押すと、どの位から比べるかを順番に見せます。</div>
          <div class="mini-note">位ごとの色分け、点滅、SVGポップアップで確認できます。</div>
        </div>

        <div class="setting-box" id="settingsBox">
          <div class="setting-grid">
            <div class="setting-name">整数の桁数</div>
            <button class="smallbtn" id="intMinus">－</button>
            <div class="value-pill" id="intDigitsValue">3</div>
            <button class="smallbtn" id="intPlus">＋</button>
          </div>
          <div class="setting-grid">
            <div class="setting-name">小数の桁数</div>
            <button class="smallbtn" id="decMinus">－</button>
            <div class="value-pill" id="decDigitsValue">0</div>
            <button class="smallbtn" id="decPlus">＋</button>
          </div>
          <div class="custom-box">
            <div class="custom-title">好きな数をくらべる</div>
            <div class="custom-inputs">
              <label class="custom-field">
                <span>左の数</span>
                <input type="text" id="customLeftInput" inputmode="decimal" placeholder="例: 123.45" autocomplete="off" />
              </label>
              <label class="custom-field">
                <span>右の数</span>
                <input type="text" id="customRightInput" inputmode="decimal" placeholder="例: 98.7" autocomplete="off" />
              </label>
            </div>
            <div class="custom-actions">
              <button class="btn-primary" id="applyCustomBtn">この数で確認</button>
              <button class="btn-ghost" id="clearCustomBtn">ランダムに戻す</button>
            </div>
            <div class="footer-tip" id="customModeTip">入力した数が位取り表にそのまま表示され、ヒントもその数で動きます。</div>
          </div>
          <div class="footer-tip">整数は1～13桁、小数は0～3桁まで設定できます。</div>
        </div>
      </div>
    </div>
    </div><!-- /panelBasic -->

    <!-- ===== タブ：式と数の比べ方（新規） ===== -->
    <div class="tab-panel" id="panelExpr">
      <div class="card expr-area">
        <div class="expr-status">
          <div>出題タイプ：<strong id="exprTypeLabel">—</strong></div>
          <div class="star-box">たまった★：★×<strong id="exprStarDisplay">0</strong><button class="star-reset" id="exprResetStarBtn">リセット</button></div>
          <div>記号：<strong id="exprCurrentSign">□</strong></div>
        </div>

        <div class="expr-problem-row">
          <div class="expr-box" id="exprLeft"></div>
          <div class="expr-sign-box">
            <button class="expr-sign-btn" id="exprSignBtn">
              <span id="exprSignText">□</span>
              <small>タップ</small>
            </button>
          </div>
          <div class="expr-box" id="exprRight"></div>
        </div>

        <div class="answer-detail" id="exprAnswerDetail" style="display:none"></div>

      </div>
    </div><!-- /panelExpr -->

  <div class="popup-backdrop" id="popupBackdrop" aria-hidden="true">
    <div class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
      <div class="popup-head">
        <div id="popupTitle">結果</div>
        <button class="popup-close" id="popupCloseBtn" aria-label="閉じる">×</button>
      </div>
      <div class="popup-body">
        <div id="popupSvgHost"></div>
        <div class="result-text" id="popupMessage"></div>
      </div>
    </div>
  </div>

  
  <script>
    const MAX_INT_DIGITS = 13;
    const PLACE_GROUP_NAMES = ["", "万", "億", "兆"];
    const DEC_LABELS = ["十分の一", "百分の一", "千分の一"];
    const COLOR_CLASSES = ["pink", "yellow", "blue", "white"];
    const STORAGE_KEYS = {
      starCount: 'compare_numbers_star_count',
      soundEnabled: 'compare_numbers_sound_enabled',
    };

    const state = {
      intDigits: 3,
      decDigits: 0,
      leftNumber: null,
      rightNumber: null,
      problem: null,
      signIndex: 0,
      signs: ["", ">", "<", "="],
      hintBusy: false,
      hintTimer: null,
      currentHintStep: 0,
      hintSteps: [],
      soundEnabled: true,
      starCount: 0,
      audioContext: null,
      audioReady: false,
      speechVoice: null,
      speechWarmupDone: false,
      customMode: false,
    };

    const els = {
      levelLabel: document.getElementById('levelLabel'),
      currentSignLabel: document.getElementById('currentSignLabel'),
      modeLabel: document.getElementById('modeLabel'),
      signBtn: document.getElementById('signBtn'),
      signText: document.getElementById('signText'),
      leftLabels: document.getElementById('leftLabels'),
      leftDigits: document.getElementById('leftDigits'),
      rightLabels: document.getElementById('rightLabels'),
      rightDigits: document.getElementById('rightDigits'),
      speechText: document.getElementById('speechText'),
      settingsBox: document.getElementById('settingsBox'),
      customLeftInput: document.getElementById('customLeftInput'),
      customRightInput: document.getElementById('customRightInput'),
      applyCustomBtn: document.getElementById('applyCustomBtn'),
      clearCustomBtn: document.getElementById('clearCustomBtn'),
      customModeTip: document.getElementById('customModeTip'),
      toggleSettingsBtn: document.getElementById('toggleSettingsBtn'),
      soundBtn: document.getElementById('soundBtn'),
      starCount: document.getElementById('starCount'),
      resetStarBtn: document.getElementById('resetStarBtn'),
      intDigitsValue: document.getElementById('intDigitsValue'),
      decDigitsValue: document.getElementById('decDigitsValue'),
      intMinus: document.getElementById('intMinus'),
      intPlus: document.getElementById('intPlus'),
      decMinus: document.getElementById('decMinus'),
      decPlus: document.getElementById('decPlus'),
      checkBtn: document.getElementById('checkBtn'),
      hintBtn: document.getElementById('hintBtn'),
      nextBtn: document.getElementById('nextBtn'),
      popupBackdrop: document.getElementById('popupBackdrop'),
      popupCloseBtn: document.getElementById('popupCloseBtn'),
      popupSvgHost: document.getElementById('popupSvgHost'),
      popupMessage: document.getElementById('popupMessage'),
      popupTitle: document.getElementById('popupTitle'),
    };

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function loadStorageNumber(key, fallback = 0){
      try{
        const raw = localStorage.getItem(key);
        const parsed = raw === null ? NaN : Number(raw);
        return Number.isFinite(parsed) ? parsed : fallback;
      }catch(_err){
        return fallback;
      }
    }

    function saveStorageNumber(key, value){
      try{
        localStorage.setItem(key, String(value));
      }catch(_err){}
    }

    function loadStorageBool(key, fallback = true){
      try{
        const raw = localStorage.getItem(key);
        if(raw === null) return fallback;
        return raw === '1' || raw === 'true';
      }catch(_err){
        return fallback;
      }
    }

    function saveStorageBool(key, value){
      try{
        localStorage.setItem(key, value ? '1' : '0');
      }catch(_err){}
    }

    function updateStarDisplay(){
      const v = String(state.starCount);
      els.starCount.textContent = v;
      const exprDisp = document.getElementById('exprStarDisplay');
      if(exprDisp) exprDisp.textContent = v;
    }

    function setStarCount(value){
      state.starCount = Math.max(0, Math.floor(value));
      saveStorageNumber(STORAGE_KEYS.starCount, state.starCount);
      updateStarDisplay();
    }

    function addStars(count = 1){
      setStarCount(state.starCount + count);
    }

    function resetStars(){
      setStarCount(0);
      speakStatus('ほしをリセットしたよ。');
    }

    function updateSoundButton(){
      if(!els.soundBtn) return;
      if(state.soundEnabled){
        els.soundBtn.textContent = '🔊';
        els.soundBtn.classList.add('sound-on');
        els.soundBtn.classList.remove('sound-off');
        els.soundBtn.setAttribute('aria-label', '音声をオフにする');
        els.soundBtn.title = '音声ON';
      }else{
        els.soundBtn.textContent = '🔇';
        els.soundBtn.classList.add('sound-off');
        els.soundBtn.classList.remove('sound-on');
        els.soundBtn.setAttribute('aria-label', '音声をオンにする');
        els.soundBtn.title = '音声OFF';
      }
    }

    function setSoundEnabled(enabled){
      state.soundEnabled = !!enabled;
      saveStorageBool(STORAGE_KEYS.soundEnabled, state.soundEnabled);
      updateSoundButton();
      if(!state.soundEnabled){
        try{ window.speechSynthesis?.cancel(); }catch(_err){}
      }
    }

    async function toggleSound(){
      const next = !state.soundEnabled;
      setSoundEnabled(next);
      if(state.soundEnabled){
        await warmupAudio();
        playUiSound('on');
        speakStatus('音声をオンにしたよ。');
      }
    }

    function getAudioContext(){
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if(!Ctor) return null;
      if(!state.audioContext){
        state.audioContext = new Ctor();
      }
      return state.audioContext;
    }

    async function unlockAudioContext(){
      const ctx = getAudioContext();
      if(ctx && ctx.state === 'suspended'){
        try{ await ctx.resume(); }catch(_err){}
      }
      state.audioReady = true;
    }

    function playUiSound(kind = 'tap'){
      if(!state.soundEnabled) return;
      const ctx = getAudioContext();
      if(!ctx) return;
      if(ctx.state === 'suspended'){
        ctx.resume().catch(() => {});
      }
      const now = ctx.currentTime;
      const tones = {
        tap:   [{ f: 880, t: 0.05, g: 0.03, type: 'sine' }],
        on:    [{ f: 660, t: 0.06, g: 0.03, type: 'triangle' }, { f: 990, t: 0.06, g: 0.025, type: 'triangle', d: 0.07 }],
        off:   [{ f: 320, t: 0.08, g: 0.03, type: 'sine' }],
        ok:    [{ f: 523.25, t: 0.09, g: 0.04, type: 'triangle' }, { f: 659.25, t: 0.11, g: 0.04, type: 'triangle', d: 0.10 }, { f: 783.99, t: 0.13, g: 0.035, type: 'triangle', d: 0.22 }],
        ng:    [{ f: 392, t: 0.10, g: 0.035, type: 'square' }, { f: 311.13, t: 0.12, g: 0.03, type: 'square', d: 0.12 }],
        star:  [{ f: 784, t: 0.08, g: 0.035, type: 'triangle' }, { f: 1046.5, t: 0.12, g: 0.03, type: 'triangle', d: 0.09 }],
      };
      const pattern = tones[kind] || tones.tap;
      pattern.forEach(({ f, t, g, type, d = 0 }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.value = f;
        gain.gain.value = 0.0001;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now + d);
        gain.gain.exponentialRampToValueAtTime(Math.max(g, 0.0001), now + d + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + d + t);
        osc.stop(now + d + t + 0.02);
      });
    }

    function getJapaneseVoice(){
      if(state.speechVoice) return state.speechVoice;
      if(!window.speechSynthesis) return null;
      const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
      const voice = voices.find(v => (v.lang || '').toLowerCase().startsWith('ja')) || voices.find(v => (v.lang || '').toLowerCase().includes('ja')) || null;
      state.speechVoice = voice;
      return voice;
    }


    function normalizeSpeechText(text){
      return String(text ?? '')
        .replaceAll('★', 'ほし')
        .replaceAll('＜', 'くみたいなマーク')
        .replaceAll('＞', 'くのはんたいみたいなマーク');
    }

    const JAPANESE_DIGITS = ['れい', 'いち', 'に', 'さん', 'よん', 'ご', 'ろく', 'なな', 'はち', 'きゅう'];

    function readJapaneseChunk(num){
      num = Number(num);
      if(!Number.isFinite(num) || num <= 0) return '';
      const thousands = Math.floor(num / 1000);
      const hundreds = Math.floor((num % 1000) / 100);
      const tens = Math.floor((num % 100) / 10);
      const ones = num % 10;
      let result = '';

      if(thousands){
        if(thousands === 1) result += 'せん';
        else if(thousands === 3) result += 'さんぜん';
        else if(thousands === 8) result += 'はっせん';
        else result += `${JAPANESE_DIGITS[thousands]}せん`;
      }

      if(hundreds){
        if(hundreds === 1) result += 'ひゃく';
        else if(hundreds === 3) result += 'さんびゃく';
        else if(hundreds === 6) result += 'ろっぴゃく';
        else if(hundreds === 8) result += 'はっぴゃく';
        else result += `${JAPANESE_DIGITS[hundreds]}ひゃく`;
      }

      if(tens){
        if(tens === 1) result += 'じゅう';
        else result += `${JAPANESE_DIGITS[tens]}じゅう`;
      }

      if(ones){
        result += JAPANESE_DIGITS[ones];
      }

      return result || 'れい';
    }

    function integerToJapanese(num){
      num = Number(num);
      if(!Number.isFinite(num)) return '';
      if(num === 0) return 'れい';

      const groupNames = ['', 'まん', 'おく', 'ちょう'];
      const padded = String(Math.floor(Math.abs(num)));
      const groups = [];
      for(let end = padded.length; end > 0; end -= 4){
        const start = Math.max(0, end - 4);
        groups.push(padded.slice(start, end));
      }

      const parts = [];
      for(let i = 0; i < groups.length; i++){
        const groupValue = Number(groups[i]);
        if(!groupValue) continue;
        const chunk = readJapaneseChunk(groupValue);
        const groupName = groupNames[i] || '';
        parts.unshift(`${chunk}${groupName}`);
      }
      return parts.join('');
    }

    function decimalToJapanese(decPart, decDigits){
      if(decDigits <= 0) return '';
      const padded = padLeft(decPart, decDigits);
      return padded.split('').map(d => JAPANESE_DIGITS[Number(d)] ?? '').join('');
    }

    function numberPartsToJapaneseSpeech(parts){
      if(!parts) return '';
      const intReading = integerToJapanese(parts.intPart);
      if(parts.decDigits > 0){
        const decReading = decimalToJapanese(parts.decPart, parts.decDigits);
        return `${intReading}てん${decReading}`;
      }
      return intReading;
    }

    function buildComparisonSpeech(leftParts, rightParts, sign){
      const left = numberPartsToJapaneseSpeech(leftParts);
      const right = numberPartsToJapaneseSpeech(rightParts);
      if(sign === '>') return `${left}は、${right}よりおおきいです。`;
      if(sign === '<') return `${left}は、${right}よりちいさいです。`;
      return `${left}と${right}は、おなじです。`;
    }

    function speakText(text, { interrupt = true, rate = 0.96, pitch = 1.0, volume = 1.0 } = {}){
      return new Promise(resolve => {
        if(!state.soundEnabled || !('speechSynthesis' in window)){
          resolve();
          return;
        }
        try{
          if(interrupt) window.speechSynthesis.cancel();
          const utter = new SpeechSynthesisUtterance(normalizeSpeechText(text));
          utter.lang = 'ja-JP';
          utter.rate = rate;
          utter.pitch = pitch;
          utter.volume = volume;
          const voice = getJapaneseVoice();
          if(voice) utter.voice = voice;
          utter.onend = () => resolve();
          utter.onerror = () => resolve();
          window.speechSynthesis.speak(utter);
        }catch(_err){
          resolve();
        }
      });
    }

    function speakStatus(text){
      return speakText(text, { interrupt: true, rate: 1.0, pitch: 1.0 });
    }

    async function warmupAudio({ markDone = true } = {}){
      if(!state.soundEnabled) return;
      if(markDone && state.speechWarmupDone) return;
      await unlockAudioContext();
      if('speechSynthesis' in window){
        try{
          const utter = new SpeechSynthesisUtterance(' ');
          utter.lang = 'ja-JP';
          utter.volume = 0;
          utter.rate = 1;
          window.speechSynthesis.cancel();
          window.speechSynthesis.speak(utter);
        }catch(_err){}
      }
      if(markDone){
        state.speechWarmupDone = true;
      }
    }

    function randomInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(array){
      for(let i = array.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createNumber(intPart, decPart, intDigits, decDigits){
      return { intPart, decPart, intDigits, decDigits };
    }

    function displayCellCount(displayIntDigits, displayDecDigits){
      return displayIntDigits + displayDecDigits + (displayDecDigits > 0 ? 1 : 0);
    }

    function getCurrentProblem(){
      return state.problem || {
        displayIntDigits: state.intDigits,
        displayDecDigits: state.decDigits,
        kind: state.decDigits > 0 ? 'decimal' : 'integer',
        label: state.decDigits > 0 ? `小数${state.decDigits}桁` : `${state.intDigits}桁整数`,
      };
    }

    function updateCardSizing(){
      const problem = getCurrentProblem();
      const cells = displayCellCount(problem.displayIntDigits, problem.displayDecDigits);
      const widthGuess = Math.min(window.innerWidth * 0.40, 620);
      const digitSize = clamp(Math.floor((widthGuess - 28) / Math.max(cells, 1) * 0.92), 18, 64);
      const labelSize = clamp(Math.floor(digitSize * 0.22), 11, 16);
      document.querySelectorAll('.num-card').forEach(card => {
        card.style.setProperty('--places', cells);
        card.style.setProperty('--digit-size', `${digitSize}px`);
        card.style.setProperty('--label-size', `${labelSize}px`);
      });
    }

    function padLeft(str, len){
      return String(str).padStart(len, '0');
    }

    function makeRandomNumber(intDigits, decDigits){
      const minInt = intDigits === 1 ? 0 : Math.pow(10, intDigits - 1);
      const maxInt = Math.pow(10, intDigits) - 1;
      const intPart = Math.floor(Math.random() * (maxInt - minInt + 1)) + minInt;
      if(decDigits === 0) return createNumber(intPart, 0, intDigits, 0);
      const maxDec = Math.pow(10, decDigits) - 1;
      const decPart = Math.floor(Math.random() * (maxDec + 1));
      return createNumber(intPart, decPart, intDigits, decDigits);
    }

    function getComparableBigInt(parts){
      const scale = BigInt(10) ** BigInt(parts.decDigits);
      return BigInt(parts.intPart) * scale + BigInt(parts.decPart);
    }

    function compareValues(leftParts, rightParts){
      const leftScaled = getComparableBigInt(leftParts) * (BigInt(10) ** BigInt(rightParts.decDigits));
      const rightScaled = getComparableBigInt(rightParts) * (BigInt(10) ** BigInt(leftParts.decDigits));
      if(leftScaled > rightScaled) return '>';
      if(leftScaled < rightScaled) return '<';
      return '=';
    }

    function formatIntegerForDisplay(parts, displayIntDigits, problem = getCurrentProblem()){
      const actualIntStr = padLeft(parts.intPart, parts.intDigits);
      if(problem?.kind === 'integer-different-length' && displayIntDigits > parts.intDigits){
        return `${'空欄'.repeat(displayIntDigits - parts.intDigits)}${actualIntStr}`;
      }
      return padLeft(parts.intPart, displayIntDigits);
    }

    function formatNumber(parts, displayIntDigits, displayDecDigits, problem = getCurrentProblem()){
      const intStr = formatIntegerForDisplay(parts, displayIntDigits, problem);
      if(displayDecDigits === 0) return intStr;
      const decStr = padLeft(parts.decPart, displayDecDigits);
      return `${intStr}.${decStr}`;
    }

    function decimalPointSVG(){
      return `
        <svg class="decimal-point-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4.4" fill="currentColor"></circle>
        </svg>
      `;
    }

    function getJapanesePlaceLabel(power){
      const group = Math.floor(power / 4);
      const within = power % 4;
      const prefixes = ["", "十", "百", "千"];
      const suffix = PLACE_GROUP_NAMES[group] || '';
      if(group === 0 && within === 0) return '一';
      return `${prefixes[within]}${suffix}`;
    }

    function getPlaceColorClass(power){
      return COLOR_CLASSES[power % 4];
    }

    function getDisplayDigitsForProblem(problem){
      return {
        intDigits: problem.displayIntDigits,
        decDigits: problem.displayDecDigits,
      };
    }

    function buildDigitsForDisplay(parts, displayIntDigits, displayDecDigits, problem = getCurrentProblem()){
      const intStr = padLeft(parts.intPart, parts.intDigits);
      const decStr = displayDecDigits > 0 ? padLeft(parts.decPart, displayDecDigits) : '';
      const digits = [];
      const leadingBlanks = problem?.kind === 'integer-different-length'
        ? Math.max(0, displayIntDigits - parts.intDigits)
        : 0;

      for(let i = 0; i < displayIntDigits; i++){
        const sourceIndex = i - leadingBlanks;
        digits.push(sourceIndex >= 0 ? intStr[sourceIndex] : '');
      }

      if(displayDecDigits > 0){
        for(let i = 0; i < decStr.length; i++){
          digits.push(decStr[i]);
        }
      }

      return digits;
    }

    function renderPlaceLabels(container, problem){
      const { intDigits, decDigits } = getDisplayDigitsForProblem(problem);
      const all = [];
      for(let i = 0; i < intDigits; i++){
        const power = intDigits - 1 - i;
        all.push({
          label: getJapanesePlaceLabel(power),
          cls: getPlaceColorClass(power),
        });
      }
      if(decDigits > 0){
        all.push({
          label: '',
          cls: 'decimal-sep',
          separator: true,
        });
      }
      for(let i = 0; i < decDigits; i++){
        all.push({
          label: DEC_LABELS[i],
          cls: 'dec',
        });
      }
      const card = container.closest('.num-card');
      const cells = displayCellCount(intDigits, decDigits);
      if(card) card.style.setProperty('--places', cells);
      container.style.setProperty('--places', cells);
      container.innerHTML = all.map(item => {
        if(item.separator) return '<span class="decimal-sep" aria-hidden="true"></span>';
        return `<span class="${item.cls}">${item.label}</span>`;
      }).join('');
    }

    function createDigitSpans(container, parts, problem, activeIndex = -1){
      const { intDigits, decDigits } = getDisplayDigitsForProblem(problem);
      const card = container.closest('.num-card');
      const cells = displayCellCount(intDigits, decDigits);
      if(card) card.style.setProperty('--places', cells);
      container.style.setProperty('--places', cells);
      container.innerHTML = '';

      const digitChars = buildDigitsForDisplay(parts, intDigits, decDigits, problem);
      let digitIndex = 0;

      for(let i = 0; i < intDigits; i++){
        const span = document.createElement('span');
        const power = intDigits - 1 - i;
        span.className = `digit ${getPlaceColorClass(power)}`;
        span.dataset.digitIndex = String(digitIndex);
        span.textContent = digitChars[digitIndex];
        if(digitIndex === activeIndex) span.classList.add('active');
        container.appendChild(span);
        digitIndex++;
      }

      if(decDigits > 0){
        const sep = document.createElement('span');
        sep.className = 'decimal-sep';
        sep.setAttribute('aria-hidden', 'true');
        sep.innerHTML = decimalPointSVG();
        container.appendChild(sep);
      }

      for(let i = 0; i < decDigits; i++){
        const span = document.createElement('span');
        span.className = 'digit dec';
        span.dataset.digitIndex = String(digitIndex);
        span.textContent = digitChars[digitIndex];
        if(digitIndex === activeIndex) span.classList.add('active');
        container.appendChild(span);
        digitIndex++;
      }
    }

    function getDigitElement(container, index){
      return container.querySelector(`.digit[data-digit-index="${index}"]`);
    }

    function renderProblem(){
      const problem = getCurrentProblem();
      updateCardSizing();
      els.levelLabel.textContent = problem.label || (
        problem.displayDecDigits > 0
          ? `${problem.displayIntDigits}桁整数＋小数${problem.displayDecDigits}桁`
          : `${problem.displayIntDigits}桁整数`
      );
      els.intDigitsValue.textContent = String(state.intDigits);
      els.decDigitsValue.textContent = String(state.decDigits);
      updateStarDisplay();

      renderPlaceLabels(els.leftLabels, problem);
      renderPlaceLabels(els.rightLabels, problem);
      createDigitSpans(els.leftDigits, state.leftNumber, problem);
      createDigitSpans(els.rightDigits, state.rightNumber, problem);

      els.signText.textContent = state.signs[state.signIndex];
      els.currentSignLabel.textContent = state.signs[state.signIndex] || '□';
      if(els.modeLabel){
        els.modeLabel.textContent = state.customMode ? '任意の数' : 'ランダム';
      }
      els.speechText.textContent = '「ヒント」を押すと、どの位から比べるかを順番に見せます。';
    }

    function copyAndMutateNumber(base, mutateCount){
      const intStr = padLeft(base.intPart, base.intDigits);
      const decStr = base.decDigits > 0 ? padLeft(base.decPart, base.decDigits) : '';
      const digits = (intStr + decStr).split('');
      const total = digits.length;
      const indices = shuffle([...Array(total).keys()]).slice(0, Math.min(mutateCount, total));

      indices.forEach(index => {
        const isFirstIntDigit = base.intDigits > 1 && index === 0;
        const minDigit = isFirstIntDigit ? 1 : 0;
        let next;
        do{
          next = randomInt(minDigit, 9);
        } while(String(next) === digits[index]);
        digits[index] = String(next);
      });

      const newIntStr = digits.slice(0, base.intDigits).join('');
      const newDecStr = base.decDigits > 0 ? digits.slice(base.intDigits).join('') : '';
      const newIntPart = parseInt(newIntStr, 10);
      const newDecPart = base.decDigits > 0 ? parseInt(newDecStr, 10) : 0;
      return createNumber(newIntPart, newDecPart, base.intDigits, base.decDigits);
    }

    function makeDifferentDigitCountIntegerProblem(){
      const biggerDigits = randomInt(Math.max(2, state.intDigits - 2), state.intDigits);
      const smallerDigits = randomInt(1, Math.max(1, biggerDigits - 1));
      const biggerSideLeft = Math.random() < 0.5;

      const big = makeRandomNumber(biggerDigits, 0);
      const small = makeRandomNumber(smallerDigits, 0);

      const left = biggerSideLeft ? big : small;
      const right = biggerSideLeft ? small : big;

      return {
        left,
        right,
        displayIntDigits: Math.max(left.intDigits, right.intDigits),
        displayDecDigits: 0,
        kind: 'integer-different-length',
        label: '桁数のちがう整数',
      };
    }

    function makeCloseSameLengthProblem(){
      const left = makeRandomNumber(state.intDigits, state.decDigits);
      let right;
      const rolls = Math.random();
      const mutateCount = rolls < 0.80 ? 1 : rolls < 0.95 ? 2 : 3;
      do{
        right = copyAndMutateNumber(left, mutateCount);
      } while(compareValues(left, right) === '=');

      return {
        left,
        right,
        displayIntDigits: Math.max(left.intDigits, right.intDigits),
        displayDecDigits: Math.max(left.decDigits, right.decDigits),
        kind: state.decDigits > 0 ? 'decimal-close' : 'integer-close',
        label: state.decDigits > 0 ? '近い小数' : '近い整数',
      };
    }

    function makeBasicDecimalProblem(){
      const basicTypeRoll = Math.random();

      if(state.decDigits <= 1){
        if(basicTypeRoll < 0.65){
          const left = createNumber(randomInt(1, 9), 0, 1, 0);
          const right = createNumber(0, randomInt(1, 9), 1, 1);
          return {
            left,
            right,
            displayIntDigits: 1,
            displayDecDigits: 1,
            kind: 'decimal-basic',
            label: '小数の基本（1 と 0.1）',
          };
        } else {
          const int = randomInt(1, 9);
          const left = createNumber(int, 0, 1, 0);
          const right = createNumber(int - 1 >= 0 ? int - 1 : 0, randomInt(1, 9), 1, 1);
          return {
            left,
            right,
            displayIntDigits: 1,
            displayDecDigits: 1,
            kind: 'decimal-basic',
            label: '小数の基本',
          };
        }
      }

      if(basicTypeRoll < 0.40){
        const left = createNumber(randomInt(1, 9), 0, 1, 0);
        const right = createNumber(0, randomInt(1, 9), 1, 1);
        return {
          left,
          right,
          displayIntDigits: 1,
          displayDecDigits: 2,
          kind: 'decimal-basic',
          label: '小数の基本（1 と 0.1）',
        };
      }

      if(basicTypeRoll < 0.75){
        const left = createNumber(0, randomInt(1, 9), 1, 2); // 0.01〜0.09
        const right = createNumber(0, randomInt(1, 9), 1, 1); // 0.1〜0.9
        return {
          left,
          right,
          displayIntDigits: 1,
          displayDecDigits: 2,
          kind: 'decimal-basic',
          label: '小数の基本（0.01 と 0.1）',
        };
      }

      const left = createNumber(1, randomInt(1, 99), 1, 2);   // 1.xx
      const right = createNumber(1, randomInt(1, 99), 1, 2);  // 1.yy
      return {
        left,
        right,
        displayIntDigits: 1,
        displayDecDigits: 2,
        kind: 'decimal-basic',
        label: '小数のくらべ方',
      };
    }

    function makeDecimalProblem(){
      const roll = Math.random();
      if(roll < 0.45){
        return makeCloseSameLengthProblem();
      }
      if(roll < 0.85){
        return makeBasicDecimalProblem();
      }
      return makeDifferentDigitCountIntegerProblem();
    }

    function generateNewProblem(){
      setModeLabel(false);
      let problem;
      if(state.decDigits === 0){
        const roll = Math.random();
        if(roll < 0.70){
          problem = makeCloseSameLengthProblem();
        } else {
          problem = makeDifferentDigitCountIntegerProblem();
        }
      } else {
        problem = makeDecimalProblem();
      }

      state.problem = problem;
      state.leftNumber = problem.left;
      state.rightNumber = problem.right;
      state.signIndex = 0;
      stopHint();
      renderProblem();
    }

    function cycleSign(){
      state.signIndex = (state.signIndex + 1) % state.signs.length;
      els.signText.textContent = state.signs[state.signIndex];
      els.currentSignLabel.textContent = state.signs[state.signIndex] || '□';
      playUiSound('tap');
    }

    function getUserSign(){
      return state.signs[state.signIndex] || '';
    }

    function formatReadableNumber(parts){
      const problem = getCurrentProblem();
      return formatNumber(parts, problem.displayIntDigits, problem.displayDecDigits, problem);
    }

    function showPopup({ title, svg, message, ok = true }){
      els.popupTitle.textContent = title;
      els.popupSvgHost.innerHTML = svg;
      els.popupMessage.className = `result-text ${ok ? 'ok' : 'ng'}`;
      els.popupMessage.textContent = message;
      els.popupBackdrop.classList.add('show');
      els.popupBackdrop.setAttribute('aria-hidden', 'false');
    }

    function hidePopup(){
      els.popupBackdrop.classList.remove('show');
      els.popupBackdrop.setAttribute('aria-hidden', 'true');
    }

    function popupComparisonSVG(leftTag, sign, rightTag){
      const circleSize = (tag) => {
        if(tag === '小') return { r: 44, fs: 38, dy: 112 };
        if(tag === '大') return { r: 58, fs: 50, dy: 118 };
        return { r: 52, fs: 46, dy: 115 };
      };
      const left = circleSize(leftTag);
      const right = circleSize(rightTag);
      return `
      <svg viewBox="0 0 640 220" role="img" aria-label="比較ポップアップ">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
          </filter>
        </defs>
        <rect x="10" y="10" width="620" height="200" rx="24" fill="#ffffff" stroke="#dbe4ef" stroke-width="2" filter="url(#shadow)"/>
        <circle cx="160" cy="106" r="${left.r}" fill="#fff7df" stroke="#d6b36a" stroke-width="4"/>
        <circle cx="480" cy="106" r="${right.r}" fill="#fff7df" stroke="#d6b36a" stroke-width="4"/>
        <text x="160" y="${left.dy}" text-anchor="middle" font-size="${left.fs}" font-weight="900" fill="#3a2d11">${leftTag}</text>
        <text x="320" y="124" text-anchor="middle" font-size="92" font-weight="900" fill="#cc8c13">${sign}</text>
        <text x="480" y="${right.dy}" text-anchor="middle" font-size="${right.fs}" font-weight="900" fill="#3a2d11">${rightTag}</text>
      </svg>`;
    }

    function evaluateComparison(){
      const expected = compareValues(state.leftNumber, state.rightNumber);
      const userSign = getUserSign();
      const leftText = formatReadableNumber(state.leftNumber);
      const rightText = formatReadableNumber(state.rightNumber);
      const correct = userSign === expected;
      const speech = buildComparisonSpeech(state.leftNumber, state.rightNumber, expected);
      const signLabel = expected === '>' ? '＞' : expected === '<' ? '＜' : '＝';

      if(correct){
        const svg = popupComparisonSVG(
          expected === '>' ? '大' : expected === '<' ? '小' : '同',
          expected,
          expected === '>' ? '小' : expected === '<' ? '大' : '同'
        );
        addStars(1);
        playUiSound('ok');
        speakStatus(`せいかい。${speech} だから「${signLabel}」が正解だね！ ほしをひとつかくとく！`);
        showPopup({
          title: 'せいかい',
          svg,
          message: `${leftText} ${expected} ${rightText} で正解です。ほしをひとつかくとく！ たまった★：★×${state.starCount}`,
          ok: true,
        });
      } else {
        const svg = popupComparisonSVG('大', expected, '小');
        playUiSound('ng');
        speakStatus(`ざんねん。${speech}`);
        showPopup({
          title: 'ざんねん',
          svg,
          message: `正しい記号は「${expected}」です。${leftText} と ${rightText} をもう一度見てみよう。`,
          ok: false,
        });
      }
    }

    function clearHighlight(){
      document.querySelectorAll('.digit.active').forEach(el => el.classList.remove('active'));
    }

    function highlightPair(index){
      clearHighlight();
      const leftEl = getDigitElement(els.leftDigits, index);
      const rightEl = getDigitElement(els.rightDigits, index);
      if(leftEl) leftEl.classList.add('active');
      if(rightEl) rightEl.classList.add('active');
    }

    function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

    function digitArrayForCompare(parts){
      const problem = getCurrentProblem();
      const intStr = padLeft(parts.intPart, problem.displayIntDigits);
      const decStr = problem.displayDecDigits > 0 ? padLeft(parts.decPart, problem.displayDecDigits) : '';
      return (intStr + decStr).split('');
    }

    function getPlaceNameByIndex(index){
      const problem = getCurrentProblem();
      if(index < problem.displayIntDigits){
        const power = problem.displayIntDigits - 1 - index;
        return getJapanesePlaceLabel(power);
      }
      return DEC_LABELS[index - problem.displayIntDigits] || '';
    }

    function buildHintSteps(){
      const leftDigits = digitArrayForCompare(state.leftNumber);
      const rightDigits = digitArrayForCompare(state.rightNumber);
      const steps = [];
      const total = leftDigits.length;
      steps.push({ type:'intro', text:'大きい位から比べるよ。' });
      for(let i = 0; i < total; i++){
        const place = getPlaceNameByIndex(i);
        steps.push({ type:'compare', index:i, place, left:leftDigits[i], right:rightDigits[i] });
        if(leftDigits[i] !== rightDigits[i]) break;
        steps.push({ type:'same', index:i, place });
      }
      return steps;
    }

    function updateSpeech(text){
      els.speechText.textContent = text;
    }

    function stopHint(){
      state.hintBusy = false;
      state.currentHintStep = 0;
      if(state.hintTimer){ clearTimeout(state.hintTimer); state.hintTimer = null; }
      clearHighlight();
    }

    async function runHint(){
      if(state.hintBusy) return;
      state.hintBusy = true;
      state.hintSteps = buildHintSteps();
      try{
        const intro = '大きい位から比べるよ。';
        updateSpeech(intro);
        await speakText(intro, { interrupt: true, rate: 0.94, pitch: 1.0 });
        await sleep(250);

        const leftDigits = digitArrayForCompare(state.leftNumber);
        const rightDigits = digitArrayForCompare(state.rightNumber);
        const diffIndex = leftDigits.findIndex((d, i) => d !== rightDigits[i]);

        if(diffIndex === -1){
          for(let i = 0; i < leftDigits.length; i++){
            highlightPair(i);
            const sameLine = `${getPlaceNameByIndex(i)}は同じだね。1つずらすよ。`;
            updateSpeech(sameLine);
            await speakText(sameLine, { interrupt: true, rate: 0.94, pitch: 1.0 });
            await sleep(120);
          }
          showPopup({
            title: 'おなじ数',
            svg: popupComparisonSVG('同', '=', '同'),
            message: `${formatReadableNumber(state.leftNumber)} ＝ ${formatReadableNumber(state.rightNumber)} です。`,
            ok: true,
          });
          clearHighlight();
          state.hintBusy = false;
          return;
        }

        for(let i = 0; i < diffIndex; i++){
          highlightPair(i);
          const sameLine = `${getPlaceNameByIndex(i)}は同じだね。1つずらすよ。`;
          updateSpeech(sameLine);
          await speakText(sameLine, { interrupt: true, rate: 0.94, pitch: 1.0 });
          await sleep(140);
        }

        highlightPair(diffIndex);
        const place = getPlaceNameByIndex(diffIndex);
        const left = leftDigits[diffIndex];
        const right = rightDigits[diffIndex];
        const leftBig = left > right;
        const sign = leftBig ? '>' : '<';
        const bigDigit = leftBig ? left : right;
        const bigSide = leftBig ? '左' : '右';
        const bigNum = leftBig ? formatReadableNumber(state.leftNumber) : formatReadableNumber(state.rightNumber);

        const compareLine = `${place}は ${bigDigit} の方が大きいね。`;
        updateSpeech(compareLine);
        await speakText(compareLine, { interrupt: true, rate: 0.92, pitch: 1.0 });
        await sleep(220);

        const resultLine = buildComparisonSpeech(leftBig ? state.leftNumber : state.rightNumber, leftBig ? state.rightNumber : state.leftNumber, '>');
        updateSpeech(resultLine);
        await speakText(resultLine, { interrupt: true, rate: 0.94, pitch: 1.0 });
        await sleep(260);

        showPopup({
          title: 'ヒント',
          svg: popupComparisonSVG(leftBig ? '大' : '小', sign, leftBig ? '小' : '大'),
          message: `${place}で大きさが決まったよ。`,
          ok: true,
        });
        clearHighlight();
      } finally {
        state.hintBusy = false;
      }
    }

    function toggleSettings(){
      els.settingsBox.classList.toggle('open');
    }

    function refreshLimits(){
      state.intDigits = clamp(state.intDigits, 1, MAX_INT_DIGITS);
      state.decDigits = clamp(state.decDigits, 0, 3);
      els.intDigitsValue.textContent = String(state.intDigits);
      els.decDigitsValue.textContent = String(state.decDigits);
    }

    function updateAndGenerate(){
      refreshLimits();
      generateNewProblem();
    }

    function loadPreferences(){
      state.starCount = loadStorageNumber(STORAGE_KEYS.starCount, 0);
      state.soundEnabled = loadStorageBool(STORAGE_KEYS.soundEnabled, true);
      updateStarDisplay();
      updateSoundButton();
    }

    function normalizeInputNumberText(text){
      return String(text ?? '')
        .trim()
        .replace(/[，,]/g, '')
        .replace(/[。．]/g, '.')
        .replace(/[０-９]/g, ch => String(ch.charCodeAt(0) - 0xFEE0))
        .replace(/[－ー−―]/g, '-');
    }

    function parseCustomNumberInput(text){
      const raw = normalizeInputNumberText(text);
      if(raw === '') return { error: '数を入れてください。' };
      if(/^-/.test(raw)) return { error: 'マイナスはこの画面ではまだ使えません。0以上の数を入れてください。' };

      let intStr = '';
      let decStr = '';
      if(raw.startsWith('.')){
        intStr = '0';
        decStr = raw.slice(1);
      }else if(raw.includes('.')){
        const parts = raw.split('.');
        if(parts.length !== 2) return { error: '小数点は1つだけにしてください。' };
        [intStr, decStr] = parts;
      }else{
        intStr = raw;
      }

      if(intStr === '') intStr = '0';
      if(!/^\d+$/.test(intStr)) return { error: '整数の部分は数字だけで入れてください。' };
      if(decStr !== '' && !/^\d+$/.test(decStr)) return { error: '小数の部分は数字だけで入れてください。' };

      const intPart = parseInt(intStr, 10);
      const decDigits = decStr.length;
      const decPart = decDigits > 0 ? parseInt(decStr, 10) : 0;
      const intDigits = Math.max(1, intStr.length);

      return {
        intPart,
        decPart: Number.isFinite(decPart) ? decPart : 0,
        intDigits,
        decDigits,
        raw,
      };
    }

    function setModeLabel(isCustom){
      state.customMode = !!isCustom;
      if(els.modeLabel){
        els.modeLabel.textContent = state.customMode ? '任意の数' : 'ランダム';
      }
    }

    function makeProblemFromInputs(leftText, rightText){
      const left = parseCustomNumberInput(leftText);
      if(left.error) return { error: `左の数: ${left.error}` };
      const right = parseCustomNumberInput(rightText);
      if(right.error) return { error: `右の数: ${right.error}` };

      return {
        left: createNumber(left.intPart, left.decPart, left.intDigits, left.decDigits),
        right: createNumber(right.intPart, right.decPart, right.intDigits, right.decDigits),
        displayIntDigits: Math.max(left.intDigits, right.intDigits),
        displayDecDigits: Math.max(left.decDigits, right.decDigits),
        kind: 'custom',
        label: '好きな数',
      };
    }

    function applyCustomNumbers(){
      const leftText = els.customLeftInput?.value ?? '';
      const rightText = els.customRightInput?.value ?? '';
      const problem = makeProblemFromInputs(leftText, rightText);
      if(problem.error){
        if(els.customModeTip){
          els.customModeTip.textContent = problem.error;
        }
        showPopup({
          title: '入力エラー',
          svg: popupComparisonSVG('？', '=', '？'),
          message: problem.error,
          ok: false,
        });
        playUiSound('ng');
        return false;
      }

      state.problem = problem;
      state.leftNumber = problem.left;
      state.rightNumber = problem.right;
      state.signIndex = 0;
      setModeLabel(true);
      stopHint();
      renderProblem();
      if(els.customModeTip){
        els.customModeTip.textContent = '入力した数が位取り表に表示されています。ヒントや答え合わせはこの数で動きます。';
      }
      playUiSound('tap');
      speakStatus('好きな数を反映したよ。');
      return true;
    }

    function clearCustomMode(){
      setModeLabel(false);
      if(els.customModeTip){
        els.customModeTip.textContent = '入力した数が位取り表にそのまま表示され、ヒントもその数で動きます。';
      }
      generateNewProblem();
    }

    els.signBtn.addEventListener('click', cycleSign);
    els.checkBtn.addEventListener('click', evaluateComparison);
    els.hintBtn.addEventListener('click', runHint);
    els.nextBtn.addEventListener('click', generateNewProblem);
    els.toggleSettingsBtn.addEventListener('click', toggleSettings);
    els.applyCustomBtn.addEventListener('click', applyCustomNumbers);
    els.clearCustomBtn.addEventListener('click', clearCustomMode);
    [els.customLeftInput, els.customRightInput].forEach(input => {
      if(!input) return;
      input.addEventListener('keydown', (e) => {
        if(e.key === 'Enter'){
          e.preventDefault();
          applyCustomNumbers();
        }
      });
    });
    els.soundBtn.addEventListener('click', () => {
      toggleSound();
    });
    els.resetStarBtn.addEventListener('click', () => {
      resetStars();
      playUiSound('tap');
    });
    els.popupCloseBtn.addEventListener('click', hidePopup);
    els.popupBackdrop.addEventListener('click', (e) => { if(e.target === els.popupBackdrop) hidePopup(); });

    els.intMinus.addEventListener('click', () => { state.intDigits = Math.max(1, state.intDigits - 1); updateAndGenerate(); });
    els.intPlus.addEventListener('click', () => { state.intDigits = Math.min(MAX_INT_DIGITS, state.intDigits + 1); updateAndGenerate(); });
    els.decMinus.addEventListener('click', () => { state.decDigits = Math.max(0, state.decDigits - 1); updateAndGenerate(); });
    els.decPlus.addEventListener('click', () => { state.decDigits = Math.min(3, state.decDigits + 1); updateAndGenerate(); });

    window.addEventListener('resize', () => {
      updateCardSizing();
    });

    document.addEventListener('keydown', (e) => {
      if(e.key === 'Escape') hidePopup();
      if(e.key === 'Enter') evaluateComparison();
      if(e.key === 'ArrowRight' || e.key === ' '){
        e.preventDefault();
        cycleSign();
      }
    });

    loadPreferences();
    setModeLabel(false);
    warmupAudio({ markDone: false });
    document.addEventListener('pointerdown', () => warmupAudio(), { passive: true });
    if('speechSynthesis' in window && window.speechSynthesis.addEventListener){
      window.speechSynthesis.addEventListener('voiceschanged', () => {
        state.speechVoice = null;
        getJapaneseVoice();
      });
    }
    generateNewProblem();
  </script>

  <!-- ===== 式と数の比べ方（式比較タブ）のスクリプト ===== -->
  <script>
  // ---- タブ切り替え ----
  function switchTab(tab){
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    // タイトルバーのボタン群を切り替え
    document.getElementById('basicBtns').style.display = (tab === 'basic') ? '' : 'none';
    document.getElementById('exprBtns').style.display = (tab === 'expr') ? '' : 'none';
    if(tab === 'expr') {
      exprGenerateProblem();
    }
  }

  // ---- 式比較ロジック ----
  const exprState = {
    signIndex: 0,
    signs: ['', '>', '<', '='],
    problem: null,
  };

  // ★は数の比べ方と共通（state.starCount / addStars / resetStars を使う）
  function exprAddStar(){ addStars(1); }

  /**
   * 問題生成
   * パターン：
   *   A) （何十）＋（何十）＝ くりあがりあり  例: 80+50  答え130
   *   B) （百何十）ー（何十）＝ くりさがりあり 例: 130-50  答え80
   *   C) （何百何十）ー（何十）＝ 十の位が同じ  例: 480-80  答え400
   * 左辺に式、右辺に整数 or 整数が左、式が右（各50%）
   * 整数側は 答えと同じ or ±10〜30 のランダムずれ
   * → 式＞整数、式＜整数、式＝整数 のすべてのパターンが自然に出る
   */
  function exprGenerateProblem(){
    exprState.signIndex = 0;
    document.getElementById('exprSignText').textContent = '□';
    document.getElementById('exprCurrentSign').textContent = '□';
    document.getElementById('exprAnswerDetail').style.display = 'none';
    // 前回の答えアノテーションを除去
    document.querySelectorAll('.expr-answer-annotation').forEach(el => el.remove());

    const typeRoll = Math.random();
    let exprVal, leftStr, rightStr, typeLabel;

    if(typeRoll < 0.40){
      // A: （何十）＋（何十）くりあがり → 和が110〜190（両方20〜90の倍数、合計>100）
      let a, b;
      do{
        a = (Math.floor(Math.random()*8)+2)*10; // 20〜90
        b = (Math.floor(Math.random()*8)+2)*10;
      }while(a+b <= 100 || a+b >= 200);
      exprVal = a + b;
      leftStr = `<div class="expr-formula"><span class="num">${a}</span><span class="op">＋</span><span class="num">${b}</span></div>`;
      typeLabel = `（何十）＋（何十）`;
    } else if(typeRoll < 0.70){
      // B: （百何十）ー（何十）くりさがり
      // 和が110〜190、引くのはもとの加数の一方（くりさがる）
      let a, b;
      do{
        a = (Math.floor(Math.random()*8)+2)*10;
        b = (Math.floor(Math.random()*8)+2)*10;
      }while(a+b <= 100 || a+b >= 200);
      const total = a + b;
      const sub = Math.random() < 0.5 ? a : b;
      exprVal = total - sub;
      leftStr = `<div class="expr-formula"><span class="num">${total}</span><span class="op">ー</span><span class="num">${sub}</span></div>`;
      typeLabel = `（百何十）ー（何十）`;
    } else {
      // C: （何百何十）ー（何十）十の位が同じ → 差は何百になる
      const hundreds = (Math.floor(Math.random()*8)+2)*100; // 200〜900
      const tens = (Math.floor(Math.random()*9)+1)*10;       // 10〜90
      const base = hundreds + tens;
      exprVal = hundreds;
      leftStr = `<div class="expr-formula"><span class="num">${base}</span><span class="op">ー</span><span class="num">${tens}</span></div>`;
      typeLabel = `（何百何十）ー（何十）`;
    }

    // 右辺の整数を決める: 正解と同じ(=) / 少し大きい(>) / 少し小さい(<)
    const diffChoices = [0, 10, 20, 30];
    const diff = diffChoices[Math.floor(Math.random()*diffChoices.length)];
    let intVal;
    if(diff === 0){
      intVal = exprVal;
    } else {
      intVal = Math.random() < 0.5 ? exprVal + diff : exprVal - diff;
      // 負やゼロにならないよう補正
      if(intVal <= 0) intVal = exprVal + diff;
    }

    // 式を左右どちらに置くか
    const exprOnLeft = Math.random() < 0.5;

    const correctSign = exprVal > intVal ? '>' : exprVal < intVal ? '<' : '=';

    exprState.problem = {
      exprVal,
      intVal,
      exprOnLeft,
      correctSign,
      // exprOnLeftならば問題の左=式、右=整数で正解記号はcorrectSignそのまま
      // 右=式の場合は大小が逆転
      displayCorrectSign: exprOnLeft ? correctSign : (correctSign === '>' ? '<' : correctSign === '<' ? '>' : '='),
      leftStr: exprOnLeft ? leftStr : `<span class="num">${intVal}</span>`,
      rightStr: exprOnLeft ? `<span class="num">${intVal}</span>` : leftStr,
      typeLabel,
    };

    document.getElementById('exprLeft').innerHTML = exprState.problem.leftStr;
    document.getElementById('exprRight').innerHTML = exprState.problem.rightStr;
    document.getElementById('exprTypeLabel').textContent = typeLabel;

    playUiSound('tap');
  }

  function exprCycleSign(){
    exprState.signIndex = (exprState.signIndex + 1) % exprState.signs.length;
    const s = exprState.signs[exprState.signIndex] || '□';
    document.getElementById('exprSignText').textContent = s;
    document.getElementById('exprCurrentSign').textContent = s;
    playUiSound('tap');
  }

  function exprCheck(){
    const p = exprState.problem;
    if(!p) return;
    const userSign = exprState.signs[exprState.signIndex] || '';
    if(!userSign){
      speakStatus('きごうをえらんでね。');
      return;
    }
    const correct = userSign === p.displayCorrectSign;

    // 記号の読み上げ用テキスト
    function signReading(s){
      if(s === '>') return '「く」のはんたいみたいなマーク';
      if(s === '<') return '「く」みたいなマーク';
      return 'おなじ';
    }

    // 式が表示されている側のboxにアンダーライン＋答えを付加
    const exprBoxId = p.exprOnLeft ? 'exprLeft' : 'exprRight';
    const exprBox = document.getElementById(exprBoxId);
    // 既存の答えアノテーションを除去してから追加
    const existing = exprBox.querySelector('.expr-answer-annotation');
    if(existing) existing.remove();
    const annotation = document.createElement('div');
    annotation.className = 'expr-answer-annotation';
    annotation.innerHTML = `<div class="expr-answer-underline"></div><div class="expr-answer-val">${p.exprVal}</div>`;
    exprBox.appendChild(annotation);

    const detail = document.getElementById('exprAnswerDetail');
    detail.style.display = 'block';

    if(correct){
      exprAddStar();
      playUiSound('ok');
      detail.innerHTML = `せいかい！　式の答えは <span class="highlight">${p.exprVal}</span>　だから　${p.displayCorrectSign}　が正解！`;
      speakStatus(`せいかい。しきのこたえは ${integerToJapanese(p.exprVal)} だから、${signReading(p.displayCorrectSign)} が正しいよ。`);
      showPopup({
        title: 'せいかい',
        svg: popupComparisonSVG(
          p.displayCorrectSign === '>' ? '大' : p.displayCorrectSign === '<' ? '小' : '同',
          p.displayCorrectSign,
          p.displayCorrectSign === '>' ? '小' : p.displayCorrectSign === '<' ? '大' : '同'
        ),
        message: `式の答えは ${p.exprVal}。正解は「${p.displayCorrectSign}」です。★×${state.starCount}`,
        ok: true,
      });
    } else {
      playUiSound('ng');
      detail.innerHTML = `式の答えは <span class="highlight">${p.exprVal}</span>　→　正しい記号は　<span class="highlight">${p.displayCorrectSign}</span>`;
      speakStatus(`ざんねん。しきのこたえは ${integerToJapanese(p.exprVal)} だから、ただしい記号は ${signReading(p.displayCorrectSign)} だよ。`);
      showPopup({
        title: 'ざんねん',
        svg: popupComparisonSVG('大', p.displayCorrectSign, '小'),
        message: `式の答えは ${p.exprVal}。正しい記号は「${p.displayCorrectSign}」です。`,
        ok: false,
      });
    }
  }

  document.getElementById('exprSignBtn').addEventListener('click', exprCycleSign);
  document.getElementById('exprCheckBtn').addEventListener('click', exprCheck);
  document.getElementById('exprNextBtn').addEventListener('click', exprGenerateProblem);
  document.getElementById('exprResetStarBtn').addEventListener('click', () => {
    resetStars();
    playUiSound('tap');
  });

  document.addEventListener('keydown', (e) => {
    const exprActive = document.getElementById('panelExpr').classList.contains('active');
    if(!exprActive) return;
    if(e.key === 'ArrowRight' || e.key === ' '){ e.preventDefault(); exprCycleSign(); }
    if(e.key === 'Enter'){ exprCheck(); }
  });
  </script>
