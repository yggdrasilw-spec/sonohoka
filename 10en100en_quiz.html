<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>10をもとにして数の見方を広げよう</title>
<style>
  :root{
    --panel:#ffffff;
    --text:#0f172a;
    --muted:#64748b;
    --accent:#16a34a;
    --accent2:#2563eb;
    --frame:#2f8cff;
    --line:#e5e7eb;
    --shadow: 0 12px 28px rgba(15,23,42,.10);
  }

  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:linear-gradient(180deg,#f8fbff 0%, #f3f6fb 100%);
    color:var(--text);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  }

  .app{
    max-width:1100px;
    margin:0 auto;
    padding:16px 14px 28px;
  }

  .header{
    display:flex;
    gap:12px;
    align-items:stretch;
    justify-content:space-between;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .titlebox{
    flex:1 1 560px;
    background:var(--panel);
    border:1px solid #edf2f7;
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:14px 16px;
  }

  .title{
    margin:0 0 4px;
    font-size:18px;
    font-weight:900;
    line-height:1.35;
  }

  .subtitle{
    margin:0;
    color:var(--muted);
    font-size:13px;
    line-height:1.6;
  }

  .switcher{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    background:var(--panel);
    border:1px solid #edf2f7;
    border-radius:18px;
    box-shadow:var(--shadow);
    padding:12px;
  }

  .switcher button,
  .controls button,
  .digit-btn{
    border:none;
    border-radius:999px;
    padding:12px 16px;
    font-size:15px;
    font-weight:800;
    cursor:pointer;
    transition: transform .15s ease, opacity .15s ease, background .15s ease;
    color:#fff;
    background:var(--accent);
  }

  .switcher button.secondary,
  .controls button.secondary,
  .digit-btn.secondary{
    background:#e2e8f0;
    color:#111827;
  }

  .switcher button.active{
    background:var(--accent2);
    box-shadow:0 8px 18px rgba(37,99,235,.18);
  }

  .switcher button:hover,
  .controls button:hover,
  .digit-btn:hover{
    transform:translateY(-1px);
  }

  .scene{
    display:none;
    margin-top:14px;
  }
  .scene.active{ display:block; }

  .scene-card{
    background:var(--panel);
    border:1px solid #edf2f7;
    border-radius:22px;
    box-shadow:var(--shadow);
    padding:14px;
  }

  .scene-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:12px;
  }

  .scene-title{
    margin:0;
    font-size:17px;
    font-weight:900;
    line-height:1.4;
  }

  .scene-desc{
    margin:4px 0 0;
    color:var(--muted);
    font-size:13px;
    line-height:1.6;
  }

  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  .digit-panel{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  .digit-control{
    width:74px;
    background:#f8fbff;
    border:1px solid #dbe4ee;
    border-radius:16px;
    padding:8px 8px 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:6px;
    box-shadow:0 6px 16px rgba(15,23,42,.05);
  }

  .digit-label{
    font-size:12px;
    color:#475569;
    font-weight:700;
    line-height:1.1;
  }

  .digit-btn{
    width:40px;
    height:32px;
    padding:0;
    display:grid;
    place-items:center;
    font-size:16px;
    line-height:1;
  }

  .digit-value{
    width:100%;
    height:42px;
    display:grid;
    place-items:center;
    border-radius:12px;
    background:#fff;
    border:1px solid #d8e1ec;
    font-size:22px;
    font-weight:900;
    color:#0f172a;
  }

  .readout{
    font-size:14px;
    color:#334155;
    font-weight:700;
    margin-left:4px;
    white-space:nowrap;
  }

  .stage{
    position:relative;
    width:100%;
    min-height:560px;
    border-radius:18px;
    overflow:hidden;
    background:
      radial-gradient(circle at 18% 16%, rgba(37,99,235,.06), transparent 25%),
      radial-gradient(circle at 82% 18%, rgba(22,163,74,.06), transparent 26%),
      linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    border:1px solid var(--line);
    user-select:none;
    touch-action:manipulation;
  }

  .stage::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(to right, rgba(15,23,42,.03) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(15,23,42,.03) 1px, transparent 1px);
    background-size:40px 40px;
    opacity:.22;
    pointer-events:none;
  }

  .badge{
    position:absolute;
    left:16px;
    top:14px;
    z-index:8;
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(255,255,255,.90);
    border:1px solid #e2e8f0;
    border-radius:999px;
    padding:8px 12px;
    box-shadow:0 6px 18px rgba(15,23,42,.06);
    backdrop-filter: blur(6px);
  }
  .badge-num{
    width:28px;
    height:28px;
    border-radius:999px;
    background:#0f766e;
    color:#fff;
    display:grid;
    place-items:center;
    font-size:14px;
    font-weight:900;
    flex:0 0 auto;
  }
  .badge-text{
    font-size:14px;
    font-weight:800;
    color:#0f172a;
  }

  .hint{
    position:absolute;
    right:16px;
    top:14px;
    z-index:8;
    max-width:430px;
    background:rgba(255,255,255,.92);
    border:1px solid #e2e8f0;
    border-radius:16px;
    padding:10px 12px;
    box-shadow:0 6px 18px rgba(15,23,42,.06);
    backdrop-filter: blur(6px);
    font-size:13px;
    line-height:1.55;
    color:#334155;
    opacity:0;
    transition:opacity .3s ease;
  }
  .hint.show{ opacity:1; }

  .coin-wrapper{
    position:absolute;
    width:48px;
    height:48px;
    left:0;
    top:0;
    transform:translate(-50%,-50%) scale(1) rotate(0deg);
    transition:
      left .8s cubic-bezier(.2,.8,.2,1),
      top .8s cubic-bezier(.2,.8,.2,1),
      opacity .35s ease,
      transform .8s cubic-bezier(.2,.8,.2,1);
    will-change:left, top, opacity, transform;
    filter: drop-shadow(0 4px 6px rgba(15,23,42,.16));
    z-index:2;
  }

  .coin-svg{
    width:100%;
    height:100%;
    display:block;
    overflow:visible;
  }

  .frame{
    position:absolute;
    z-index:5;
    border:5px solid var(--frame);
    background:rgba(47,140,255,.08);
    border-radius:12px;
    opacity:0;
    transition: opacity .25s ease, left .8s ease, top .8s ease, width .8s ease, height .8s ease;
    pointer-events:none;
  }
  .frame.show{ opacity:1; }

  .eq{
    position:absolute;
    left:50%;
    bottom:18px;
    transform:translateX(-50%);
    z-index:9;
    min-width:300px;
    max-width:calc(100% - 24px);
    background:rgba(255,255,255,.95);
    border:1px solid #dbe4ee;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(15,23,42,.08);
    padding:12px 16px;
    text-align:center;
    opacity:0;
    transition:opacity .3s ease;
  }
  .eq.show{ opacity:1; }
  .eq-main{
    font-size:20px;
    font-weight:900;
    margin:0 0 4px;
  }
  .eq-sub{
    margin:0;
    font-size:14px;
    color:#475569;
    line-height:1.55;
  }

  .result{
    position:absolute;
    right:16px;
    top:96px;
    z-index:10;
    background:#eff6ff;
    border:2px solid #93c5fd;
    color:#1d4ed8;
    border-radius:16px;
    padding:10px 14px;
    font-size:18px;
    font-weight:900;
    box-shadow:0 10px 22px rgba(37,99,235,.10);
    opacity:0;
    transition:opacity .3s ease;
    max-width:min(320px, calc(100% - 24px));
    text-align:left;
  }
  .result.show{ opacity:1; }

  .final-answer{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) scale(.96);
    z-index:12;
    width:min(840px, calc(100% - 24px));
    background:rgba(255,255,255,.97);
    border:3px solid #2563eb;
    border-radius:24px;
    box-shadow:0 14px 30px rgba(37,99,235,.14);
    padding:16px 20px;
    text-align:center;
    opacity:0;
    transition:opacity .3s ease, transform .3s ease;
    pointer-events:none;
  }
  .final-answer.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  .final-answer-main{
    margin:0 0 6px;
    font-size:30px;
    font-weight:1000;
    line-height:1.35;
    color:#0f172a;
  }
  .final-answer-sub{
    margin:0;
    font-size:22px;
    font-weight:900;
    line-height:1.35;
    color:#1d4ed8;
  }

  .tag{
    position:absolute;
    z-index:11;
    background:rgba(255,255,255,.96);
    border:1px solid #dbe4ee;
    border-radius:999px;
    padding:6px 10px;
    font-size:12px;
    color:#334155;
    box-shadow:0 6px 14px rgba(15,23,42,.08);
    opacity:0;
    transition: opacity .25s ease, transform .25s ease;
    transform:translateY(4px);
    pointer-events:none;
    white-space:nowrap;
  }
  .tag.show{
    opacity:1;
    transform:translateY(0);
  }

  .small-note{
    position:absolute;
    z-index:11;
    background:rgba(255,255,255,.92);
    border:1px solid #dbe4ee;
    border-radius:12px;
    padding:6px 10px;
    font-size:12px;
    color:#475569;
    box-shadow:0 6px 14px rgba(15,23,42,.06);
    opacity:0;
    transition: opacity .25s ease, transform .25s ease;
    transform:translateY(4px);
    pointer-events:none;
    white-space:nowrap;
  }
  .small-note.show{
    opacity:1;
    transform:translateY(0);
  }

  @media (max-width: 760px){
    .hint{
      position:static;
      max-width:none;
      margin-top:10px;
    }
    .badge{
      position:static;
      margin-bottom:10px;
      width:fit-content;
    }
    .result{
      top:96px;
      right:12px;
      max-width:calc(100% - 24px);
    }
    .final-answer{
      width:calc(100% - 24px);
      padding:14px 14px;
    }
    .final-answer-main{ font-size:22px; }
    .final-answer-sub{ font-size:16px; }
    .stage{ min-height:620px; }
  }

  /* ★バー */
  .star-bar{
    display:flex; align-items:center; gap:10px;
    background:var(--panel); border:1px solid #edf2f7;
    border-radius:18px; box-shadow:var(--shadow);
    padding:10px 16px; margin-bottom:12px;
  }
  .star-label{ font-size:15px; font-weight:800; color:#0f172a; white-space:nowrap; }
  .star-count{ font-size:22px; font-weight:900; color:#f59e0b; min-width:44px; }
  .star-display{ flex:1; font-size:20px; letter-spacing:2px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .star-reset{
    border:none; border-radius:999px; padding:6px 14px;
    font-size:13px; font-weight:800; cursor:pointer;
    background:#fee2e2; color:#b91c1c;
    transition:transform .15s ease, background .15s ease;
  }
  .star-reset:hover{ transform:translateY(-1px); background:#fecaca; }

  /* 音声ボタン */
  #voiceToggle{
    border:none;
    background:transparent;
    font-size:28px;
    cursor:pointer;
    padding:4px 6px;
    border-radius:10px;
    transition:transform .15s ease, filter .15s ease;
    line-height:1;
    filter: none;
  }
  #voiceToggle:hover{ transform:scale(1.12); }
  #voiceToggle.off{ filter: grayscale(1) opacity(0.45); }

  /* クイズパネル */
  .quiz-panel{
    background:#f0f9ff; border:2px solid #bae6fd;
    border-radius:20px; padding:16px 18px; margin-top:12px;
    display:flex; flex-direction:column; gap:10px;
  }
  .quiz-question{ font-size:20px; font-weight:900; color:#0f172a; line-height:1.5; }
  .quiz-input-row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .quiz-input{
    width:120px; height:52px; border:2px solid #7dd3fc; border-radius:14px;
    font-size:26px; font-weight:900; text-align:center; color:#0f172a;
    background:#fff; outline:none; transition:border-color .2s;
  }
  .quiz-input:focus{ border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
  .quiz-input.correct{ border-color:#16a34a; background:#f0fdf4; }
  .quiz-input.wrong{ border-color:#dc2626; background:#fef2f2; animation:shake .3s ease; }
  @keyframes shake{
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .quiz-btn{
    border:none; border-radius:999px; padding:12px 20px;
    font-size:16px; font-weight:800; cursor:pointer;
    color:#fff; background:var(--accent2);
    transition:transform .15s ease;
  }
  .quiz-btn:hover{ transform:translateY(-1px); }
  .quiz-btn.hint-btn{ background:#f59e0b; }
  .quiz-btn:disabled{ opacity:.5; cursor:default; transform:none; }
  .quiz-feedback{ font-size:17px; font-weight:800; line-height:1.5; min-height:26px; }
  .quiz-feedback.correct{ color:#16a34a; }
  .quiz-feedback.wrong{ color:#dc2626; }

  /* ヒントモーダル */
  .hint-overlay{
    display:none; position:fixed; inset:0;
    background:rgba(15,23,42,.45); z-index:200;
    align-items:center; justify-content:center;
  }
  .hint-overlay.open{ display:flex; }
  .hint-modal{
    background:#fff; border-radius:24px;
    box-shadow:0 20px 50px rgba(15,23,42,.2);
    width:min(1000px,95vw); max-height:90vh;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .hint-modal-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:14px 18px; border-bottom:1px solid #e5e7eb; background:#f8fbff;
  }
  .hint-modal-title{ font-size:16px; font-weight:900; color:#0f172a; }
  .hint-modal-close{
    border:none; background:#e2e8f0; border-radius:999px;
    width:34px; height:34px; font-size:18px; cursor:pointer;
    display:grid; place-items:center; color:#334155;
  }
  .hint-modal-body{ flex:1; overflow:auto; padding:14px; }
  .hint-nav{ display:flex; justify-content:center; gap:10px; padding:10px 0 4px; }
  .hint-nav button{
    border:none; border-radius:999px; padding:10px 22px;
    font-size:15px; font-weight:800; cursor:pointer;
    color:#fff; background:var(--accent); transition:transform .15s ease;
  }
  .hint-nav button:hover{ transform:translateY(-1px); }
  .hint-nav button.secondary{ background:#e2e8f0; color:#111827; }

  @media (max-width:760px){
    .quiz-question{ font-size:16px; }
    .quiz-input{ width:90px; height:44px; font-size:20px; }
    .star-display{ font-size:16px; }
  }

</style>
</head>
<body>
<!-- ヒントモーダル（問題1用） -->
<div class="hint-overlay" id="hintOverlay1">
  <div class="hint-modal">
    <div class="hint-modal-head">
      <span class="hint-modal-title">💡 ヒント（問題1のアニメ）</span>
      <button class="hint-modal-close" id="hintClose1">✕</button>
    </div>
    <div class="hint-modal-body">
      <div id="hintStage1Wrap">
        <div id="hintStage1" class="stage" style="min-height:560px;">
          <div class="badge"><div class="badge-num">1</div><div class="badge-text">10円玉 → 100円玉</div></div>
          <div id="hintHint1" class="hint"></div>
          <div id="hintResult1" class="result"></div>
          <div id="hintEq1" class="eq">
            <p id="hintEq1main" class="eq-main"></p>
            <p id="hintEq1sub" class="eq-sub"></p>
          </div>
          <div id="hintFinal1" class="final-answer">
            <p id="hintFinal1Main" class="final-answer-main"></p>
            <p id="hintFinal1Sub" class="final-answer-sub"></p>
          </div>
        </div>
        <div class="hint-nav">
          <button id="hintPrev1" class="secondary">◀ もどる</button>
          <button id="hintNext1">つぎへ ▶</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ヒントモーダル（問題2用） -->
<div class="hint-overlay" id="hintOverlay2">
  <div class="hint-modal">
    <div class="hint-modal-head">
      <span class="hint-modal-title">💡 ヒント（問題2のアニメ）</span>
      <button class="hint-modal-close" id="hintClose2">✕</button>
    </div>
    <div class="hint-modal-body">
      <div id="hintStage2Wrap">
        <div id="hintStage2" class="stage" style="min-height:560px;">
          <div class="badge"><div class="badge-num">2</div><div class="badge-text">100円玉 → 10円玉10枚</div></div>
          <div id="hintHint2" class="hint"></div>
          <div id="hintResult2" class="result"></div>
          <div id="hintEq2" class="eq">
            <p id="hintEq2main" class="eq-main"></p>
            <p id="hintEq2sub" class="eq-sub"></p>
          </div>
          <div id="hintFinal2" class="final-answer">
            <p id="hintFinal2Main" class="final-answer-main"></p>
            <p id="hintFinal2Sub" class="final-answer-sub"></p>
          </div>
          <div id="hintTag200" class="tag"></div>
          <div id="hintTag30" class="tag"></div>
          <div id="hintNote2" class="small-note">100円玉1枚 = 10円玉10こ</div>
        </div>
        <div class="hint-nav">
          <button id="hintPrev2" class="secondary">◀ もどる</button>
          <button id="hintNext2">つぎへ ▶</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="app">
  <!-- ★バー -->
  <div class="star-bar">
    <span class="star-label">⭐ ゲット！</span>
    <span class="star-count" id="starCount">0</span>
    <span class="star-display" id="starDisplay"></span>
    <button class="star-reset" id="starReset">リセット</button>
  </div>

  <div class="header">
    <div class="titlebox">
      <p class="title">10をもとにして、数の見方を広げよう</p>
      <p class="subtitle">問題に答えて★をあつめよう！ヒントボタンでアニメーション解説を見られます。</p>
    </div>
    <div class="switcher">
      <button id="tab1" class="active">問題1</button>
      <button id="tab2" class="secondary">問題2</button>
      <button id="voiceToggle" title="音声のON/OFF">🔊</button>
    </div>
  </div>

  <!-- 問題1 -->
  <section id="scene1" class="scene active">
    <div class="scene-card">
      <!-- クイズパネル -->
      <div class="quiz-panel">
        <div class="quiz-question" id="q1Text">もんだい：１０を　〇こ　あつめた　かずは　いくつ？</div>
        <div class="quiz-input-row">
          <input class="quiz-input" id="q1Input" type="number" min="0" max="9999" placeholder="？">
          <button class="quiz-btn" id="q1Check">答え合わせ</button>
          <button class="quiz-btn hint-btn" id="q1Hint">💡 ヒント</button>
        </div>
        <div class="quiz-feedback" id="q1Feedback"></div>
      </div>
    </div>
  </section>

  <!-- 問題2 -->
  <section id="scene2" class="scene">
    <div class="scene-card">
      <!-- クイズパネル -->
      <div class="quiz-panel">
        <div class="quiz-question" id="q2Text">もんだい：〇〇〇は、１０を　なんこ　あつめたかず？</div>
        <div class="quiz-input-row">
          <input class="quiz-input" id="q2Input" type="number" min="0" max="9999" placeholder="？">
          <button class="quiz-btn" id="q2Check">答え合わせ</button>
          <button class="quiz-btn hint-btn" id="q2Hint">💡 ヒント</button>
        </div>
        <div class="quiz-feedback" id="q2Feedback"></div>
      </div>
    </div>
  </section>
</div>

<script>
const SVG_NS = "http://www.w3.org/2000/svg";
let uid = 0;
const nextId = (prefix) => `${prefix}-${++uid}`;

function el(name, attrs = {}) {
  const node = document.createElementNS(SVG_NS, name);
  for (const [k, v] of Object.entries(attrs)) node.setAttribute(k, v);
  return node;
}

function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

function createCoin(type, size = 48) {
  const svg = el("svg", {
    viewBox: "0 0 100 100", width: size, height: size,
    class: `coin-svg coin-${type}`,
    role: "img", "aria-label": type === "10" ? "10円玉" : "100円玉"
  });
  const defs = el("defs");
  if (type === "10") {

// ========== レイアウト関数（変更なし） ==========
function makeP1Layout(count, stageW, stageH) {
  const blockCount = Math.ceil(count / 10);
  const cols = 2;
  const rows = Math.max(1, Math.ceil(blockCount / cols));
  const baseCoin = 46, baseGapX = 8, baseGapY = 14, macroGapX = 26, macroGapY = 22;
  const reserveRight = 180, reserveTop = 80, reserveBottom = 80;
  const blockWBase = 10 * baseCoin + 9 * baseGapX;
  const blockHBase = baseCoin;
  const totalWBase = cols * blockWBase + (cols - 1) * macroGapX;
  const totalHBase = rows * blockHBase + (rows - 1) * macroGapY;
  const availW = Math.max(140, stageW - reserveRight - 40);
  const availH = Math.max(140, stageH - reserveTop - reserveBottom);
  const scale = Math.min(1, availW / totalWBase, availH / totalHBase);
  const coin = baseCoin * scale, gapX = baseGapX * scale, gapY = baseGapY * scale;
  const macroGX = macroGapX * scale, macroGY = macroGapY * scale;
  const blockW = 10 * coin + 9 * gapX, blockH = coin;
  const totalW = cols * blockW + (cols - 1) * macroGX;
  const totalH = rows * blockH + (rows - 1) * macroGY;
  const startX = Math.max(24, Math.min(stageW - reserveRight - totalW - 24, (stageW - totalW) / 2));
  const startY = reserveTop + Math.max(0, (availH - totalH) / 2);
  const blocks = [], positions = [];
  for (let i = 0; i < blockCount; i++) {
    const blockRow = Math.floor(i / cols), blockCol = i % cols;
    const centerX = startX + blockCol * (blockW + macroGX) + blockW / 2;
    const centerY = startY + blockRow * (blockH + macroGY) + blockH / 2;
    const rowCount = Math.min(10, count - i * 10);
    blocks.push({ index: i, rowCount, centerX, centerY, blockW, blockH, coin, gapX });
    for (let c = 0; c < rowCount; c++) {
      positions.push({ x: centerX - blockW / 2 + c * (coin + gapX) + coin / 2, y: centerY, blockIndex: i, colIndex: c });
    }
  }
  return { scale, coin, gapX, gapY, macroGX, macroGY, blockW, blockH, blocks, positions };
}

function makeP2Layout(h, t, stageW, stageH) {
  const baseCoin100 = 50, baseCoin10 = 46, baseGapX = 8, baseGapY = 14, macroGapX = 26, macroGapY = 22;
  const reserveRight = 180, reserveTop = 80, reserveBottom = 80;
  const blockCount = Math.max(1, h), cols = 2, rows = Math.max(1, Math.ceil(blockCount / cols));
  const blockWBase = 5 * baseCoin10 + 4 * baseGapX;
  const blockHBase = 2 * baseCoin10 + baseGapY;
  // スケールは常に最大レイアウト(cols=2, rows=4)基準で固定計算する
  // → 百円玉が少ないときも大きくなりすぎず、コインが被らない
  const scaleColsFixed = 2, scaleRowsFixed = 4;
  const totalWBase = scaleColsFixed * blockWBase + (scaleColsFixed - 1) * macroGapX;
  const totalHBase = scaleRowsFixed * blockHBase + (scaleRowsFixed - 1) * macroGapY;
  const availW = Math.max(140, stageW - reserveRight - 40);
  const availH = Math.max(140, stageH - reserveTop - reserveBottom);
  const scale = Math.min(1, availW / totalWBase, availH / totalHBase);
  const coin10 = baseCoin10 * scale, coin100 = baseCoin100 * scale;
  const gapX = baseGapX * scale, gapY = baseGapY * scale;
  const macroGX = macroGapX * scale, macroGY = macroGapY * scale;
  const blockW = 5 * coin10 + 4 * gapX, blockH = 2 * coin10 + gapY;
  const totalW = cols * blockW + (cols - 1) * macroGX;
  const totalH = rows * blockH + (rows - 1) * macroGY;
  const startX = Math.max(24, Math.min(stageW - reserveRight - totalW - 24, (stageW - totalW) / 2));
  const startY = reserveTop + Math.max(0, (availH - totalH) / 2);
  const hundredBlocks = [], positions = [];
  for (let i = 0; i < h; i++) {
    const blockRow = Math.floor(i / cols), blockCol = i % cols;
    const centerX = startX + blockCol * (blockW + macroGX) + blockW / 2;
    const centerY = startY + blockRow * (blockH + macroGY) + blockH / 2;
    hundredBlocks.push({ index: i, centerX, centerY, blockW, blockH });
    for (let c = 0; c < 10; c++) {
      positions.push({
        x: centerX - blockW / 2 + (c % 5) * (coin10 + gapX) + coin10 / 2,
        y: centerY - blockH / 2 + Math.floor(c / 5) * (coin10 + gapY) + coin10 / 2,
        blockIndex: i, colIndex: c
      });
    }
  }
  const tensBlockW = 5 * coin10 + 4 * gapX;
  const tensBlockH = 2 * coin10 + gapY;
  const tensStartX = Math.min(stageW - reserveRight + 34, stageW - tensBlockW - 26);
  const tensStartY = reserveTop + Math.max(0, (availH - tensBlockH) / 2);
  const tensGrid = [];
  for (let i = 0; i < t; i++) {
    const col = Math.floor(i / 5), row = i % 5;
    tensGrid.push({ x: tensStartX + col * (coin10 + gapX) + coin10 / 2, y: tensStartY + row * (coin10 + gapY) + coin10 / 2 });
  }
  return { scale, coin10, coin100, gapX, gapY, macroGX, macroGY, blockW, blockH, hundredBlocks, positions, tensStartX, tensStartY, tensGrid };
}

const h1 = {
  step: 0, tens: 1, ones: 0,
  stage: document.getElementById("hintStage1"),
  hint: document.getElementById("hintHint1"),

  eqMain: document.getElementById("hintEq1main"),

const h2 = {
  step: 0, hundreds: 2, tens: 3,
  stage: document.getElementById("hintStage2"),
  hint: document.getElementById("hintHint2"),
  eq: document.getElementById("hintEq2"),
  eqMain: document.getElementById("hintEq2main"),
  eqSub: document.getElementById("hintEq2sub"),
  final: document.getElementById("hintFinal2"),
  finalMain: document.getElementById("hintFinal2Main"),

};

function h1Count(){ return h1.tens * 10 + h1.ones; }
function h2Yen(){ return h2.hundreds * 100 + h2.tens * 10; }

function rebuildH1IfNeeded() {
  const count = h1Count();
  if (h1.coins10.length === count) return;
  clearDynamic(h1.stage);
  h1.coins10 = []; h1.coins100 = [];
  for (let i = 0; i < count; i++) {
    const c = createCoinWrapper("10", 46);
    h1.stage.appendChild(c); h1.coins10.push(c);
  }
  const hundredCount = Math.floor(count / 10);
  for (let i = 0; i < hundredCount; i++) {
    const hc = createCoinWrapper("100", 50);
    hc.style.display = "none"; h1.stage.appendChild(hc); h1.coins100.push(hc);
  }
}

function rebuildH2IfNeeded() {
  const countH = h2.hundreds;
  const totalTens = countH * 10 + h2.tens;
  if (h2.hundredsCoins.length === countH && h2.tensCoins.length === totalTens) return;
  clearDynamic(h2.stage);
  h2.hundredsCoins = []; h2.tensCoins = [];
  for (let i = 0; i < countH; i++) {
    const hc = createCoinWrapper("100", 50);
    h2.stage.appendChild(hc); h2.hundredsCoins.push(hc);
  }
  for (let i = 0; i < totalTens; i++) {
    const t = createCoinWrapper("10", 46);
    t.style.display = "none"; h2.stage.appendChild(t); h2.tensCoins.push(t);
  }
}

function renderH1() {
  rebuildH1IfNeeded();
  const count = h1Count();
  const groups = Math.floor(count / 10);
  const rem = count % 10;
  const stageW = h1.stage.clientWidth || 800;
  const stageH = h1.stage.clientHeight || 480;
  const layout = makeP1Layout(count, stageW, stageH);
  [...h1.stage.querySelectorAll(".frame")].forEach(f => f.remove());
  h1.result.classList.remove("show");
  h1.eq.classList.remove("show");
  h1.final.classList.remove("show");
  h1.hint.classList.remove("show");
  h1.hint.innerHTML = "10円玉をあつめて見ます。"; h1.hint.classList.add("show");
  if (h1.step === 0) speak("10円玉をあつめて見ます。");
  h1.coins10.forEach((node, i) => { const pos = layout.positions[i]; setPos(node, pos.x, pos.y, 1, 0, 1, 3); node.style.display = "block"; });
  for (let r = 0; r < groups; r++) {
    const block = layout.blocks[r], hNode = h1.coins100[r];
    if (!hNode) continue;
    if (h1.step >= 2) { setPos(hNode, block.centerX, block.centerY, 1.02, 0, 1, 8); hNode.style.display = "block"; }
    else { setPos(hNode, block.centerX, block.centerY, 0.2, 0, 0, 2); hNode.style.display = "block"; }
  }
  if (h1.step >= 1) {
    layout.blocks.slice(0, groups).forEach((block) => {
      const frame = document.createElement("div"); frame.className = "frame"; h1.stage.appendChild(frame);
      const boxW = block.blockW + 16, boxH = block.blockH + 16;
      showFrame(frame, block.centerX - boxW/2, block.centerY - boxH/2, boxW, boxH);
    });
    h1.hint.innerHTML = "10枚ごとのまとまりを見ます。"; h1.hint.classList.add("show");
    speak("10枚ごとのまとまりを見ます。");
  }
  if (h1.step >= 2) {
    h1.coins10.forEach((node, i) => { const blockIndex = Math.floor(i / 10); node.style.opacity = blockIndex < groups ? 0 : 1; });
    h1.hint.innerHTML = `10が${count}こです。10枚ごとに100円玉へ変わります。`; h1.hint.classList.add("show");
    speak(`10が${numToHira(count)}こです。10まいごとに100円玉へかわります。`);
  }
  if (h1.step >= 3) {
    h1.eq.classList.add("show");
    h1.eqMain.textContent = `10が${count}こ → ${groups}個の100円玉`;
    h1.eqSub.textContent = rem > 0 ? `残りは10円玉${rem}枚です` : "残りはありません";
    h1.result.classList.add("show");
    h1.result.textContent = `10が${count}こ → ${groups}個の100円玉と${rem}枚の10円玉`;
    h1.final.classList.add("show");
    h1.finalMain.textContent = `１０を ${count}こ あつめたかずは ${count * 10}！`;
    speak(`10を${numToHira(count)}こあつめたかずは、${numToHira(count * 10)}！`);
    h1.finalSub.textContent = `${count * 10}は、１０を ${count}こ あつめたかず！`;
  }
}

function renderH2() {
  rebuildH2IfNeeded();
  const hc = h2.hundreds, t = h2.tens, yen = h2Yen();
  const stageW = h2.stage.clientWidth || 800;
  const stageH = h2.stage.clientHeight || 480;
  const layout = makeP2Layout(hc, t, stageW, stageH);
  [...h2.stage.querySelectorAll(".frame")].forEach(f => f.remove());
  h2.result.classList.remove("show"); h2.eq.classList.remove("show"); h2.final.classList.remove("show");
  h2.tag200.classList.remove("show"); h2.tag30.classList.remove("show"); h2.note.classList.remove("show");
  h2.hint.classList.remove("show"); h2.hint.textContent = "";
  if (h2.step === 0) {
    h2.hint.innerHTML = `100円玉が${hc}枚、10円玉が${t}枚あります。`; h2.hint.classList.add("show");
    if (h2.step === 0) speak(`100円玉が${numToHira(hc)}まい、10円玉が${numToHira(t)}まいあります。`);
    h2.hundredsCoins.forEach((node, i) => { const p = layout.hundredBlocks[i]; setPos(node, p.centerX, p.centerY, 1, 0, 1, 4); node.style.display = "block"; });
    h2.tensCoins.forEach((node, i) => { if (i < t) { const p = layout.tensGrid[i]; setPos(node, p.x, p.y, 1, 0, 1, 6); node.style.display = "block"; } else { node.style.display = "none"; } });
  }
  if (h2.step >= 1) {
    h2.hint.innerHTML = `100円玉${hc}枚を見ます。`; h2.hint.classList.add("show");
    speak(`100円玉${numToHira(hc)}まいを見ます。`);
    h2.hundredsCoins.forEach((node, i) => {
      const p = layout.hundredBlocks[i]; setPos(node, p.centerX, p.centerY, 1, 0, 1, 5); node.style.display = "block";
      const frame = document.createElement("div"); frame.className = "frame"; h2.stage.appendChild(frame);
      showFrame(frame, p.centerX - p.blockW / 2 - 8, p.centerY - p.blockH / 2 - 8, p.blockW + 16, p.blockH + 16);
    });
    h2.tensCoins.forEach((node, i) => { if (i < t) { const p = layout.tensGrid[i]; setPos(node, p.x, p.y, 1, 0, 1, 6); node.style.display = "block"; } });
    if (layout.hundredBlocks[0]) showTag(h2.tag200, layout.hundredBlocks[0].centerX - 14, layout.hundredBlocks[0].centerY - 84);
    if (layout.tensGrid[0]) showTag(h2.tag30, layout.tensGrid[0].x + 12, layout.tensGrid[0].y + 58);
  }
  if (h2.step >= 2) {
    h2.hint.innerHTML = "100円玉が10円玉10枚に変わります。"; h2.hint.classList.add("show");
    speak("100円玉が10円玉10まいにかわります。");
    h2.eq.classList.add("show");
    h2.eqMain.textContent = `100円玉${hc}枚 → 10円玉${hc * 10}こ`;
    h2.eqSub.textContent = `10円玉${t}枚とあわせて 10が${hc * 10 + t}こ`;
    if (layout.hundredBlocks[0]) showTag(h2.tag200, layout.hundredBlocks[0].centerX - 14, layout.hundredBlocks[0].centerY - 84);
    if (layout.tensGrid[0]) showTag(h2.tag30, layout.tensGrid[0].x + 12, layout.tensGrid[0].y + 58);
    h2.note.classList.add("show");
    h2.note.style.left = `${Math.min(stageW * 0.63, stageW - 290)}px`;
    h2.note.style.top = `${Math.max(78, (layout.hundredBlocks[0]?.centerY ?? 180) - 110)}px`;
    for (let i = 0; i < hc; i++) {
      const block = layout.hundredBlocks[i];
      const hNode = h2.hundredsCoins[i];
      setPos(hNode, block.centerX, block.centerY, 0.08, 0, 0, 2);
      for (let c = 0; c < 10; c++) {
        const idx = t + i * 10 + c;
        let node = h2.tensCoins[idx];
        if (!node) { node = createCoinWrapper("10", 46); h2.stage.appendChild(node); h2.tensCoins[idx] = node; }
        const x = block.centerX - block.blockW / 2 + (c % 5) * (layout.coin10 + layout.gapX) + layout.coin10 / 2;
        const y = block.centerY - block.blockH / 2 + Math.floor(c / 5) * (layout.coin10 + layout.gapY) + layout.coin10 / 2;
        node.style.display = "block"; setPos(node, x, y, 1, 0, 1, 7);
      }
    }
    for (let i = 0; i < t; i++) {
      const node = h2.tensCoins[i]; if (!node) continue;
      const p = layout.tensGrid[i]; node.style.display = "block"; setPos(node, p.x, p.y, 1, 0, 1, 6);
    }
  }
  if (h2.step >= 3) {
    h2.hint.innerHTML = `${yen}円を、100円と10円で見ます。`; h2.hint.classList.add("show");
    speak(`${numToHira(yen)}円を、10が${numToHira(hc * 10 + t)}こあつめたかずとして見ます。`);
    h2.result.classList.add("show");
    h2.result.style.right = "18px"; h2.result.style.top = "96px";
    h2.result.textContent = `10が${hc * 10 + t}こ`;
    h2.eq.classList.add("show");
    h2.eqMain.textContent = `${yen}円 = 10が${hc * 10 + t}こ`;
    h2.eqSub.textContent = `10を${hc * 10 + t}こあつめたかずは、${yen}円`;
    h2.final.classList.add("show");
    h2.finalMain.textContent = `${yen}は、１０を ${hc * 10 + t}こ あつめたかず！`;
    h2.finalSub.textContent = `１０を ${hc * 10 + t}こ あつめたかずは ${yen}！`;
  }
}

  h2.hundreds = hundreds; h2.tens = tens; h2.step = 0;
  h2.hundredsCoins = []; h2.tensCoins = [];
  document.getElementById("q2Text").textContent = `もんだい：${yen}は、　１０を　なんこ　あつめたかず？`;
  const inp = document.getElementById("q2Input");
  inp.value = "";
  inp.className = "quiz-input";
  inp.disabled = false;
  inp.focus();
  const fb = document.getElementById("q2Feedback");
  fb.textContent = "";
  fb.className = "quiz-feedback";
  document.getElementById("q2Check").textContent = "答え合わせ";
}

function checkQ1() {
  const inp = document.getElementById("q1Input");
  const fb = document.getElementById("q1Feedback");
  const btn = document.getElementById("q1Check");

  if (quiz1.checked) {
    // 2回目押し → 次の問題
    newQ1();
    return;
  }

  const val = parseInt(inp.value);
  if (isNaN(val)) { fb.textContent = "数字を入れてね！"; fb.className = "quiz-feedback wrong"; return; }

  if (val === quiz1.answer) {
    inp.className = "quiz-input correct";
    if (!quiz1.gotStar) {
      addStar();
      quiz1.gotStar = true;
      fb.innerHTML = `⭐ せいかい！${quiz1.answer} だよ！　★を１つゲット！`;
      speak(`せいかい！${numToHira(quiz1.answer)} だよ！　すごい！`);
    } else {
      fb.innerHTML = `⭐ せいかい！${quiz1.answer} だよ！`;
      speak(`せいかい！${numToHira(quiz1.answer)} だよ！`);
    }
    fb.className = "quiz-feedback correct";
    btn.textContent = "つぎの問題 →";
    quiz1.checked = true;
    inp.disabled = true;
  } else {
    inp.className = "quiz-input wrong";
    fb.textContent = `ざんねん！もう一度チャレンジしてね。（ヒントボタンを使ってみよう）`;
    fb.className = "quiz-feedback wrong";
    speak("ざんねん！もう いちど チャレンジしてね。");
    setTimeout(() => { inp.className = "quiz-input"; inp.value = ""; inp.focus(); }, 600);
  }
}

// ========== 音声読み上げ ==========
let voiceOn = true;

// 数字→ひらがな変換テーブル
const NUM_MAP = {
  0:'ぜろ', 1:'いち', 2:'に', 3:'さん', 4:'よん',
  5:'ご', 6:'ろく', 7:'なな', 8:'はち', 9:'きゅう',
  10:'じゅう', 11:'じゅういち', 12:'じゅうに', 13:'じゅうさん',
  14:'じゅうよん', 15:'じゅうご', 16:'じゅうろく', 17:'じゅうなな',
  18:'じゅうはち', 19:'じゅうきゅう',
  20:'にじゅう', 30:'さんじゅう', 40:'よんじゅう', 50:'ごじゅう',
  60:'ろくじゅう', 70:'ななじゅう', 80:'はちじゅう', 90:'きゅうじゅう',
  100:'ひゃく', 200:'にひゃく', 300:'さんびゃく', 400:'よんひゃく',
  500:'ごひゃく', 600:'ろっぴゃく', 700:'ななひゃく', 800:'はっぴゃく', 900:'きゅうひゃく',
  1000:'せん'
};

function numToHira(n) {
  if (NUM_MAP[n] !== undefined) return NUM_MAP[n];
  n = Math.abs(Math.round(n));
  let result = '';
  const thou = Math.floor(n / 1000);
  const hun  = Math.floor((n % 1000) / 100);
  const ten  = Math.floor((n % 100) / 10);
  const one  = n % 10;
  if (thou > 0) result += (thou === 1 ? '' : NUM_MAP[thou]) + 'せん';
  if (hun  > 0) result += NUM_MAP[hun * 100] || (NUM_MAP[hun] + 'ひゃく');
  if (ten  > 0) result += (ten === 1 ? 'じゅう' : NUM_MAP[ten] + 'じゅう');
  if (one  > 0) result += NUM_MAP[one];
  return result || 'ぜろ';
}

// テキスト中の半角・全角数字をひらがなに置換
function toHira(text) {
  return text.replace(/[0-9０-９]+/g, m => {
    const n = parseInt(m.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)));
    return numToHira(n);
  });
}

function speak(text) {
  if (!voiceOn) return;
  if (!window.speechSynthesis) return;
  const hira = toHira(text);
  const utt = new SpeechSynthesisUtterance(hira);
  utt.lang = 'ja-JP';
  utt.rate = 0.88;
  utt.pitch = 1.1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// ウォームアップ（無音で1音読み上げ）
function warmUpTTS() {
  if (!window.speechSynthesis) return;
  const utt = new SpeechSynthesisUtterance('　');
  utt.lang = 'ja-JP';
  utt.volume = 0;
  window.speechSynthesis.speak(utt);
}

// 音声ON/OFFボタン
const voiceBtn = document.getElementById('voiceToggle');
voiceBtn.addEventListener('click', () => {
  voiceOn = !voiceOn;
  voiceBtn.textContent = voiceOn ? '🔊' : '🔇';
  voiceBtn.classList.toggle('off', !voiceOn);
  if (!voiceOn) window.speechSynthesis && window.speechSynthesis.cancel();
});

// ========== 初期化 ==========
setStars(getStars());
newQ1();
newQ2();

// ウォームアップ：起動時に無音で1音読み上げ（iOS/Androidの音声エンジン初期化）
window.addEventListener("click", function initVoice() {
  warmUpTTS();
  window.removeEventListener("click", initVoice);
}, { once: true });
