<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>長さの加法・減法アニメーション</title>
  <style>
    :root{
      --bg:#f6f8fc;
      --panel:rgba(255,255,255,.92);
      --ink:#1f2937;
      --muted:#64748b;
      --cm:#ef4444;
      --mm:#2563eb;
      --line:#facc15;
      --shadow:0 18px 45px rgba(15,23,42,.12);
      --radius:22px;
      --px-per-mm:17;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      overflow:hidden;
      font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
      background:radial-gradient(circle at top,#ffffff 0%,var(--bg) 60%,#eaf0ff 100%);
      color:var(--ink);
    }
    .app{
      height:100vh;
      padding:10px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:10px;
    }
    .bar,.stage,.footer{
      background:var(--panel);
      border:1px solid rgba(148,163,184,.22);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
    }
    .bar{
      padding:10px 12px;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
    }
    .side{
      min-width:0;
      display:grid;
      grid-template-columns:auto 1fr;
      gap:8px;
      align-items:center;
    }
    .side.right{justify-self:end}
    .side-title{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.04em;
      white-space:nowrap;
      padding:0 2px;
    }
    .length-card{
      min-width:0;
      display:grid;
      grid-template-columns:1fr;
      gap:4px;
    }
    .length-preview{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-size:clamp(16px,1.8vw,22px);
      font-weight:900;
      line-height:1;
      white-space:nowrap;
    }
    .length-preview .cm{color:var(--cm)}
    .length-preview .mm{color:var(--mm)}
    .steppers{
      display:grid;
      grid-template-columns:repeat(4,auto);
      gap:6px;
      align-items:stretch;
    }
    .step-block{
      display:grid;
      grid-template-rows:auto auto auto;
      justify-items:center;
      gap:3px;
      min-width:54px;
    }
    .step-label{
      font-size:11px;
      color:var(--muted);
      font-weight:800;
      line-height:1;
    }
    .btn{
      border:none;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      transition:transform .08s ease, opacity .15s ease, background .15s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active{transform:translateY(1px)}
    .small{
      width:28px;
      height:24px;
      line-height:1;
      font-size:15px;
      background:#eef2ff;
      color:#1d4ed8;
    }
    .value{
      min-width:30px;
      text-align:center;
      font-size:16px;
      font-weight:900;
      padding:3px 0;
      border-radius:8px;
      background:#f8fafc;
      border:1px solid rgba(148,163,184,.18);
    }
    .op-wrap{
      display:grid;
      justify-items:center;
      gap:6px;
    }
    .op-btn{
      width:52px;
      height:52px;
      border-radius:999px;
      background:#111827;
      color:#fff;
      font-size:22px;
      box-shadow:0 12px 30px rgba(17,24,39,.15);
    }
    .action-row{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .action{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      background:#2563eb;
      color:#fff;
      box-shadow:0 12px 28px rgba(37,99,235,.16);
    }
    .secondary{
      background:#e5e7eb;
      color:#111827;
      box-shadow:none;
    }
    .sound-btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      font-size:18px;
      cursor:pointer;
      background:#f0fdf4;
      color:#16a34a;
      box-shadow:0 4px 12px rgba(22,163,74,.18);
      transition:transform .08s ease, background .2s ease, color .2s ease, box-shadow .2s ease;
      -webkit-tap-highlight-color:transparent;
      line-height:1;
    }
    .sound-btn.off{
      background:#f1f5f9;
      color:#94a3b8;
      box-shadow:none;
    }
    .sound-btn:active{transform:translateY(1px)}
    .stage{
      position:relative;
      overflow:hidden;
      min-height:0;
      display:flex;
      align-items:stretch;
      justify-content:stretch;
      padding:8px;
    }
    svg{
      width:100%;
      height:100%;
      display:block;
    }
    .footer{
      padding:8px 12px;
      display:grid;
      grid-template-columns:1fr;
      gap:6px;
    }
    .equation{
      display:flex;
      flex-wrap:wrap;
      gap:8px 14px;
      align-items:center;
      justify-content:center;
      font-size:clamp(15px,1.9vw,22px);
      font-weight:900;
      line-height:1.35;
      text-align:center;
    }
    .equation .cm{color:var(--cm)}
    .equation .mm{color:var(--mm)}
    .result{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      font-size:clamp(16px,2vw,24px);
      font-weight:900;
      min-height:1.4em;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      background:#f8fafc;
      border:1px solid rgba(148,163,184,.22);
      color:#334155;
      font-size:13px;
      font-weight:800;
    }
    .tiny{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      line-height:1.35;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="bar">
      <div class="side">
        <div class="side-title">左</div>
        <div class="length-card">
          <div class="length-preview" id="leftPreview"></div>
          <div class="steppers" id="leftSteppers"></div>
        </div>
      </div>

      <div class="op-wrap">
        <button class="btn op-btn" id="opBtn">＋</button>
        <div class="badge" id="modeBadge">加法</div>
      </div>

      <div class="side right">
        <div class="length-card">
          <div class="length-preview" id="rightPreview" style="justify-content:flex-end;"></div>
          <div class="steppers" id="rightSteppers" style="justify-content:flex-end;"></div>
        </div>
        <div class="side-title">右</div>
      </div>

      <div style="display:flex;flex-direction:column;justify-content:space-between;align-items:flex-end;align-self:stretch;">
        <div class="action-row">
          <button class="action" id="animateBtn">アニメ開始</button>
          <button class="btn secondary action" id="resetBtn" style="padding:10px 14px;">リセット</button>
          <button class="sound-btn" id="soundBtn" title="音のオン/オフ">🔊</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center;align-self:flex-start;">
          <button class="btn small" id="scaleDownBtn" style="width:28px;height:24px;font-size:16px;">－</button>
          <div id="scaleDisplay" style="min-width:46px;text-align:center;font-size:12px;font-weight:900;padding:3px 5px;border-radius:8px;background:#f8fafc;border:1px solid rgba(148,163,184,.25);color:#1f2937;">100%</div>
          <button class="btn small" id="scaleUpBtn" style="width:28px;height:24px;font-size:16px;">＋</button>
        </div>
      </div>
    </div>

    <div class="stage">
      <svg id="svg" viewBox="0 0 2200 760" aria-label="長さの加法・減法アニメーション">
        <defs>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity=".14"/>
          </filter>
          <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffe55b"/>
            <stop offset="100%" stop-color="#facc15"/>
          </linearGradient>
        </defs>

        <g id="sceneRoot">
          <g id="labels" font-family="system-ui,-apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif">
          </g>

          <g id="tracks"></g>
          <g id="units"></g>
          <g id="resultLayer"></g>
        </g>
      </svg>
    </div>

    <div class="footer">
      <div class="equation" id="equation"></div>
      <div class="result" id="resultText"></div>
      <div class="tiny">cm 部分は赤、mm 部分は青。区切り線と黄色いラインを単位ごとに分けて、下に集めるアニメーションです。</div>
    </div>
  </div>

<script>
/* =====================================================
   長さの加法アニメーション — 新仕様
   ===================================================== */
(() => {
  'use strict';

  /* ── 定数 ── */
  const PX   = 17;          // 1mm = 17px
  const CMpx = 10 * PX;    // 1cm = 170px
  const LX   = 60;          // 左の線 X
  const RX   = 1200;        // 右の線 X（横並びレイアウト）
  const TY   = 50;          // 上段 Y（左の線）
  const CX   = 60;          // まとめる場所 X
  const VB_W = 2200;        // SVG viewBox 幅
  const NS   = 'http://www.w3.org/2000/svg';
  const C    = { cm:'#ef4444', mm:'#2563eb' };

  // 左の線が7cm以上のとき上下レイアウトに切り替える
  const LAYOUT_THRESHOLD_CM = 7;
  const TY2      = 190;   // 右の線のY（上下レイアウト時）
  const CY_SIDE  = 210;   // まとめる場所 Y（横並びレイアウト）
  const CY_STACK = 340;   // まとめる場所 Y（上下レイアウト時）

  // viewBox高さ
  const VB_H_SIDE  = 640;
  const VB_H_STACK = 780;
  // 減法専用レイアウト定数
  const SUB_TY_TOP = 50;   // 上段（被減数）Y
  const SUB_TY_BOT = 210;  // 下段（減数）Y
  const VB_H_SUB   = 560;  // 減法viewBox高さ（まとめる場所不要で低め）

  // 現在のレイアウトに応じた値を返すヘルパー（加法用）
  const isStack = () => state.op === '−' || state.op === '差' || state.left.cm >= LAYOUT_THRESHOLD_CM;
  const getRX   = () => isStack() ? LX : RX;
  const getRY   = () => isStack() ? TY2 : TY;
  const getCY   = () => isStack() ? CY_STACK : CY_SIDE;

  // まとめる場所の線の合計幅(px)を計算し、はみ出す場合のスケールを返す
  // 合計16cmを超えると CX + totalMm*PX > VB_W になり得る
  function calcScale() {
    const totalMm = (state.left.cm + state.right.cm) * 10
                  + state.left.mm + state.right.mm;
    const endX = CX + totalMm * PX;
    const margin = 80; // 右端に少し余白
    const available = VB_W - margin;
    // 合計が18cmを超えたら縮小（18cm = 3060px、CX=60を足すと3120 > 2200）
    const MAX_FREE_CM = 18;
    const maxFreeEndX = CX + MAX_FREE_CM * CMpx; // 18cmまでは縮小しない
    if (endX <= maxFreeEndX) return 1;
    return available / endX;
  }

  /* ── state ── */
  const state = { left:{cm:3,mm:4}, right:{cm:2,mm:7}, op:'+', animating:false, manualScale:1.0 };

  /* ── DOM refs ── */
  const svg         = document.getElementById('svg');
  const sceneRoot   = document.getElementById('sceneRoot');
  const gTracks     = document.getElementById('tracks');
  const gUnits      = document.getElementById('units');
  const gResult     = document.getElementById('resultLayer');
  const leftPreview = document.getElementById('leftPreview');
  const rightPreview= document.getElementById('rightPreview');
  const leftSteppers= document.getElementById('leftSteppers');
  const rightSteppers=document.getElementById('rightSteppers');
  const opBtn       = document.getElementById('opBtn');
  const modeBadge   = document.getElementById('modeBadge');
  const animateBtn  = document.getElementById('animateBtn');
  const resetBtn    = document.getElementById('resetBtn');
  const equation    = document.getElementById('equation');
  const resultText  = document.getElementById('resultText');

  /* ── 音声エンジン ── */
  let soundOn = true;
  const soundBtn = document.getElementById('soundBtn');

  function updateSoundBtn() {
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    soundBtn.classList.toggle('off', !soundOn);
    soundBtn.title = soundOn ? '音をオフにする' : '音をオンにする';
  }
  soundBtn.addEventListener('click', () => { soundOn = !soundOn; updateSoundBtn(); });
  updateSoundBtn();

  // AudioContext（初回インタラクションで生成）
  let _ctx = null;
  let _masterGain = null;

  function getCtx() {
    if (!_ctx) {
      _ctx = new (window.AudioContext || window.webkitAudioContext)();
      _masterGain = _ctx.createGain();
      _masterGain.connect(_ctx.destination);
    }
    if (_ctx.state === 'suspended') _ctx.resume();
    return _ctx;
  }

  // 全効果音を即時停止
  function stopAllSound() {
    if (_masterGain) {
      _masterGain.gain.setValueAtTime(0, _ctx.currentTime);
      // 少し後に戻す（次の操作に備えて）
      setTimeout(() => { if (_masterGain) _masterGain.gain.setValueAtTime(1, _ctx.currentTime); }, 200);
    }
  }

  // 基本的なビープ音を生成
  function beep({ freq=440, type='sine', vol=0.18, dur=0.12, attack=0.01, decay=0.06 }={}) {
    if (!soundOn) return;
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(_masterGain);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + attack + decay + dur);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + attack + decay + dur + 0.05);
  }

  // コイン音（セグメント移動時）
  function playCoin() {
    beep({ freq:880, type:'triangle', vol:0.15, dur:0.06, attack:0.005, decay:0.09 });
  }

  // cmグループ移動音（少し太め）
  function playCm() {
    beep({ freq:440, type:'triangle', vol:0.18, dur:0.08, attack:0.008, decay:0.1 });
    setTimeout(()=>beep({ freq:550, type:'triangle', vol:0.12, dur:0.05, attack:0.005, decay:0.07 }), 50);
  }

  // mmグループ移動音（軽め高め）
  function playMm() {
    beep({ freq:660, type:'sine', vol:0.13, dur:0.05, attack:0.005, decay:0.07 });
  }

  // テキスト出現音
  function playPop() {
    beep({ freq:523, type:'sine', vol:0.14, dur:0.08, attack:0.01, decay:0.12 });
  }

  // 繰り上がり点滅音
  function playBlink() {
    beep({ freq:740, type:'square', vol:0.08, dur:0.04, attack:0.005, decay:0.05 });
  }

  // ぶー（操作ブロック時）
  function playBuzz() {
    beep({ freq:120, type:'sawtooth', vol:0.25, dur:0.30, attack:0.01, decay:0.25 });
    setTimeout(()=>beep({ freq:100, type:'sawtooth', vol:0.18, dur:0.20, attack:0.01, decay:0.20 }), 120);
  }

  // 単位グループを一瞬光らせる（移動着地後に呼ぶ）
  function flashUnit(g, color) {
    const paths = [...g.querySelectorAll('path')];
    const lines = [...g.querySelectorAll('line')];
    const origSw  = paths[0]?.getAttribute('stroke-width') ?? '7';
    const origFilt = paths[0]?.getAttribute('filter') ?? 'none';

    // 光らせる
    [...paths, ...lines].forEach(el => {
      el.setAttribute('stroke-width', String(Number(origSw) + 7));
      el.setAttribute('filter', 'url(#glowFilter)');
    });

    // 300ms 後にフェードアウトして元に戻す
    setTimeout(() => {
      [...paths, ...lines].forEach(el => {
        el.style.transition = 'stroke-width 250ms ease, opacity 250ms ease';
        el.setAttribute('stroke-width', origSw);
        el.removeAttribute('filter');
      });
    }, 300);
  }

  // 数字のみ読み上げ — SpeechSynthesisは遅延が大きいので
  // Web Audioで数字に対応した音程ビープを即時再生する
  const NUMBER_FREQS = [
    262, 294, 330, 349, 392, 440, 494, 523, 587, 659, 698 // 0〜10
  ];
  function speakNumber(n) {
    if (!soundOn) return;
    const freq = NUMBER_FREQS[Math.min(n, NUMBER_FREQS.length - 1)] || 440;
    beep({ freq, type:'sine', vol:0.22, dur:0.13, attack:0.008, decay:0.10 });
  }

  // 完成ファンファーレ
  function playFanfare() {
    if (!soundOn) return;
    const ctx = getCtx();
    const notes = [
      {freq:523.25, t:0},
      {freq:659.25, t:0.12},
      {freq:783.99, t:0.24},
      {freq:1046.5, t:0.38},
    ];
    notes.forEach(({freq, t})=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + t);
      gain.gain.setValueAtTime(0, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.28);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.32);
    });
  }

  // ── 読み上げ管理 ──
  // 中断用トークン：stopSpeech() だけが上げる。speakAndWait は読み取り専用で使う
  let _ttsGen = 0;
  let _ttsResolve = null; // 現在待機中の speakAndWait の resolve
  let _ttsDelayTimer = null; // 80ms遅延タイマー（stopSpeech でキャンセル）
  let _ttsEstTimer = null;   // 推定待機タイマー（stopSpeech でキャンセル）

  function getJaVoice() {
    if (!window.speechSynthesis) return null;
    const voices = window.speechSynthesis.getVoices();
    return voices.find(v=>v.lang==='ja-JP') || voices.find(v=>v.lang.startsWith('ja')) || null;
  }

  // 読み上げを即時停止し、待機中の speakAndWait を即 resolve して解放する
  function stopSpeech() {
    _ttsGen++;
    if (_ttsDelayTimer) { clearTimeout(_ttsDelayTimer); _ttsDelayTimer = null; }
    if (_ttsEstTimer)   { clearTimeout(_ttsEstTimer);   _ttsEstTimer = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (_ttsResolve) { _ttsResolve(); _ttsResolve = null; }
  }

  // 読み上げが終わるまで待つ Promise
  // ・stopSpeech() が呼ばれたら即 resolve（中断）
  // ・Chrome の「cancel 直後 onend 誤爆」を避けるため speak() は 80ms 遅延
  // ・フォールバック: maxMs 後に強制 resolve
  function speakAndWait(text, maxMs=5000) {
    return new Promise(resolve => {
      if (!soundOn || !window.speechSynthesis) { resolve(); return; }

      const myGen = _ttsGen;

      let settled = false;
      let timer = null;

      function done(reason) {
        if (settled) return;
        settled = true;
        if (timer) clearTimeout(timer);
        _ttsResolve = null;
        resolve();
      }

      _ttsResolve = () => done('stopSpeech');

      _ttsDelayTimer = setTimeout(() => {
        _ttsDelayTimer = null;
        if (myGen !== _ttsGen) { done('interrupted'); return; }

        const utt = new SpeechSynthesisUtterance(text);
        utt.lang   = 'ja-JP';
        utt.rate   = 1.0;
        utt.pitch  = 1.1;
        utt.volume = 0.9;
        const jaVoice = getJaVoice();
        if (jaVoice) utt.voice = jaVoice;

        // onend が発火すれば理想だが、Chrome(file://)では発火しないため
        // テキスト長から読み上げ時間を推定して待つ
        // 実測: 約160ms/文字 + 余裕500ms
        const estimatedMs = Math.max(1200, text.length * 160 + 500);
        utt.onend = () => done('onend');
        // onerror は無視（interrupted が誤爆するため）

        _ttsEstTimer = setTimeout(() => { _ttsEstTimer = null; done('estimated'); }, estimatedMs);
        timer = _ttsEstTimer;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utt);
      }, 80);
    });
  }

  // voiceschanged で音声リストをプリロード
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.addEventListener?.('voiceschanged', () => {
      window.speechSynthesis.getVoices();
    });
  }
  const el = (tag, attrs={}) => {
    const n = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs)) n.setAttribute(k, String(v));
    return n;
  };
  // sleep：state.animating が false になったら即 resolve（リセット時に中断）
  function sleep(ms) {
    return new Promise(r => {
      const t = setTimeout(r, ms);
      const check = setInterval(() => {
        if (!state.animating) { clearTimeout(t); clearInterval(check); r(); }
      }, 30);
      // 正常終了時もインターバルをクリア
      setTimeout(() => clearInterval(check), ms + 50);
    });
  }

  /* ── 単純計算 ── */
  const totMm  = s => s.cm*10 + s.mm;
  const resMm  = () => { const a=totMm(state.left),b=totMm(state.right); return state.op==='+'?a+b:a-b; };

  /* ── UI 更新 ── */
  function updateModeUI() {
    opBtn.textContent = state.op === '＋' ? '＋' : state.op === '−' ? '−' : state.op === '差' ? '差' : state.op;
    modeBadge.textContent = state.op === '+' ? '加法' : state.op === '−' ? '減法①' : '減法②';
    // operatorTextはbuildScene内で更新される
  }
  function setPreviewValues() {
    document.getElementById('leftCmVal').textContent  = state.left.cm;
    document.getElementById('leftMmVal').textContent  = state.left.mm;
    document.getElementById('rightCmVal').textContent = state.right.cm;
    document.getElementById('rightMmVal').textContent = state.right.mm;
  }
  function renderPreviewTexts() {
    leftPreview.innerHTML  = `<span class="cm">${state.left.cm}cm</span><span class="mm">${state.left.mm}mm</span>`;
    rightPreview.innerHTML = `<span class="cm">${state.right.cm}cm</span><span class="mm">${state.right.mm}mm</span>`;
    setPreviewValues();
  }
  function updateEquation() {
    const L=state.left, R=state.right, op=state.op;
    const lm=totMm(L), rm=totMm(R);
    const signed= op==='+'?lm+rm:lm-rm;
    const sign  = signed<0?'-':'';
    const abs   = Math.abs(signed);
    const rCm   = Math.floor(abs/10), rMm = abs%10;
    // 減法で答えのcmが0の場合は省略
    const subResultHtml = rCm > 0
      ? `${sign}<span class="cm">${rCm}cm</span><span class="mm">${rMm}mm</span>`
      : `${sign}<span class="mm">${rMm}mm</span>`;
    equation.innerHTML = op==='+'
      ? `<span><span class="cm">${L.cm}cm</span><span class="mm">${L.mm}mm</span> + <span class="cm">${R.cm}cm</span><span class="mm">${R.mm}mm</span></span><span>=</span><span class="cm">${Math.floor((lm+rm)/10)}cm</span><span class="mm">${(lm+rm)%10}mm</span>`
      : `<span><span class="cm">${L.cm}cm</span><span class="mm">${L.mm}mm</span> − <span class="cm">${R.cm}cm</span><span class="mm">${R.mm}mm</span></span><span>=</span><span>${subResultHtml}</span>`;
    const subAnswerHtml = rCm > 0
      ? `だから答えは <span class="cm">${sign}${rCm}cm</span><span class="mm">${rMm}mm</span>`
      : `だから答えは <span class="mm">${sign}${rMm}mm</span>`;
    resultText.innerHTML = op==='+'
      ? `だから合わせて <span class="cm">${rCm}cm</span><span class="mm">${rMm}mm</span>`
      : subAnswerHtml;
  }

  /* ── Steppers ── */
  function makeSteppers(container, side) {
    container.innerHTML = `
      <div class="step-block">
        <button class="btn small" data-side="${side}" data-unit="cm" data-delta="1">▲</button>
        <div class="value" id="${side}CmVal"></div>
        <button class="btn small" data-side="${side}" data-unit="cm" data-delta="-1">▼</button>
        <div class="step-label">cm</div>
      </div>
      <div class="step-block">
        <button class="btn small" data-side="${side}" data-unit="mm" data-delta="1">▲</button>
        <div class="value" id="${side}MmVal"></div>
        <button class="btn small" data-side="${side}" data-unit="mm" data-delta="-1">▼</button>
        <div class="step-label">mm</div>
      </div>`;
